document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

8b-82f2-4c27-a134-dc9ffebc754e\"><\u002Fscript>\n\n<style>\n  :root{\n    /* DaisyUI · dim — surfaces */\n    --base-100:     #2A303C;\n    --base-200:     #242933;\n    --base-300:     #20252E;\n    --neutral:      #1C212B;\n    --base-content: #B2CCD6;\n\n    /* DaisyUI · dim — semantic accents */\n    --primary:           #9FE88D;\n    --primary-content:   #1B2D1A;\n    --secondary:         #FF7D5C;\n    --secondary-content: #3B1408;\n    --accent:            #C792E9;\n    --accent-content:    #2E1843;\n    --info:              #28ADE5;\n    --success:           #2BB37A;\n    --warning:           #F1B05D;\n    --error:             #FF6D6D;\n\n    /* Sinra aliases */\n    --paper:    var(--base-200);\n    --surface:  var(--base-100);\n    --sunken:   var(--base-300);\n    --midnight: var(--neutral);\n\n    --ink:      var(--base-content);\n    --bone:     #E5EEF2;\n    --slate:    #8090A0;\n    --mist:     #5A6675;\n    --line:     rgba(178,204,214,0.16);\n\n    --signal:   var(--primary);\n\n    --display: \"Nunito\", \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n    --body:    \"Nunito\", \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n    --mono:    \"IBM Plex Mono\", ui-monospace, \"Menlo\", monospace;\n  }\n\n  html, body { margin:0; padding:0; background:#000; color:var(--ink); font-family: var(--body); }\n  deck-stage { background:#0a0a0a; }\n\n  section{\n    width:1920px; height:1080px;\n    background:var(--paper);\n    color:var(--ink);\n    position:relative;\n    overflow:hidden;\n    font-family: var(--body);\n    font-weight:400;\n  }\n\n  /* === Logo mark, mask-based so we can tint via color === */\n  .sinra-mark{\n    display:inline-block;\n    background-color: currentColor;\n    -webkit-mask: url(\"fe20f5a6-e88f-45ef-9f1a-3b898fd75b1e\") no-repeat center / contain;\n            mask: url(\"fe20f5a6-e88f-45ef-9f1a-3b898fd75b1e\") no-repeat center / contain;\n    width: 200px;\n    aspect-ratio: 678 / 721;\n  }\n\n  /* === Common === */\n  .chrome{\n    position:absolute; inset:0;\n    padding:56px 80px;\n    box-sizing:border-box;\n    pointer-events:none;\n    z-index:5;\n    display:flex; flex-direction:column; justify-content:space-between;\n    font-family:var(--mono);\n    font-size:13px;\n    letter-spacing:0.08em;\n    text-transform:uppercase;\n    color:var(--mist);\n  }\n  .chrome .row{ display:flex; justify-content:space-between; align-items:center; }\n  .chrome .brand{ display:flex; align-items:center; gap:12px; }\n  .chrome .brand .glyph{\n    width:18px;\n    aspect-ratio: 678 / 721;\n    background-color: var(--signal);\n    -webkit-mask: url(\"fe20f5a6-e88f-45ef-9f1a-3b898fd75b1e\") no-repeat center / contain;\n            mask: url(\"fe20f5a6-e88f-45ef-9f1a-3b898fd75b1e\") no-repeat center / contain;\n  }\n\n  h3, h2, h1, h4{ font-family:var(--display); font-weight:800; color:var(--bone); margin:0;}\n\n  .eyebrow{\n    font-family:var(--mono); font-size:13px; letter-spacing:0.16em;\n    text-transform:uppercase; color:var(--slate);\n  }\n  .label{\n    font-family:var(--mono); font-size:12px; letter-spacing:0.14em;\n    text-transform:uppercase; color:var(--slate);\n  }\n\n  /* ====== 01 — Cover ====== */\n  .s-cover{ display:grid; grid-template-columns: 1fr 1fr; background:var(--midnight);}\n  .s-cover .left{\n    padding:80px;\n    background:var(--paper);\n    display:flex; flex-direction:column; justify-content:space-between;\n    position:relative;\n  }\n  .s-cover h1{\n    font-family:var(--display); font-weight:900;\n    font-size:172px; line-height:0.88; letter-spacing:-0.045em;\n  }\n  .s-cover h1 em{ font-style:normal; color:var(--signal); }\n  .s-cover .meta{\n    display:grid; grid-template-columns:repeat(3, 1fr); gap:32px;\n    font-family:var(--mono); font-size:13px; letter-spacing:0.08em;\n    text-transform:uppercase; color:var(--slate);\n    border-top:1px solid var(--line); padding-top:24px; width:80%;\n  }\n  .s-cover .meta strong{ color:var(--bone); font-weight:600; display:block; margin-top:6px; letter-spacing:0.04em;}\n  .s-cover .right{\n    background:var(--midnight);\n    color:var(--bone);\n    display:flex; align-items:center; justify-content:center;\n    position:relative;\n  }\n  .s-cover .right .ring{\n    position:absolute; width:560px; height:560px; border-radius:50%;\n    border:1px dashed var(--signal); opacity:0.35;\n  }\n  .s-cover .right .ring.inner{ width:380px; height:380px; opacity:0.55;}\n  .s-cover .right .sinra-mark{ width:300px; color:var(--bone); z-index:2;}\n  .s-cover .right .corner{\n    position:absolute; bottom:80px; right:60px;\n    font-family:var(--mono); font-size:13px; letter-spacing:0.14em;\n    text-transform:uppercase; color:var(--mist);\n    text-align:right; line-height:1.7;\n  }\n  .s-cover .right .corner .sig{ color:var(--signal); display:block; }\n\n  /* ====== 02 — Foreword ====== */\n  .s-foreword{ padding:140px 180px; background:var(--paper);}\n  .s-foreword .quote{\n    font-family:var(--display); font-weight:600;\n    font-size:78px; line-height:1.06; letter-spacing:-0.025em;\n    max-width:1500px; color:var(--bone);\n  }\n  .s-foreword .quote em{ font-style:normal; color:var(--signal); font-weight:800;}\n  .s-foreword .sig{\n    margin-top:72px;\n    display:flex; gap:80px;\n    border-top:1px solid var(--line);\n    padding-top:32px;\n    max-width:1500px;\n  }\n  .s-foreword .sig .col{ font-family:var(--mono); font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:var(--slate); }\n  .s-foreword .sig .col strong{ color:var(--bone); display:block; margin-top:6px; font-weight:600; letter-spacing:0.04em;}\n\n  /* ====== 03 — Contents ====== */\n  .s-toc{ padding:140px 180px; background:var(--paper);}\n  .s-toc h2{\n    font-size:96px; line-height:0.9; letter-spacing:-0.035em; margin:0 0 56px;\n  }\n  .s-toc ol{\n    list-style:none; margin:0; padding:0;\n    column-count:2; column-gap:120px;\n  }\n  .s-toc li{\n    display:flex; justify-content:space-between; align-items:baseline;\n    padding:22px 0;\n    border-top:1px solid var(--line);\n    font-family:var(--display); font-size:32px; font-weight:600; letter-spacing:-0.01em;\n    color:var(--ink);\n    break-inside:avoid;\n  }\n  .s-toc li:last-child{ border-bottom:1px solid var(--line); }\n  .s-toc li .num{\n    font-family:var(--mono); font-size:14px; letter-spacing:0.12em;\n    color:var(--slate); text-transform:uppercase; font-weight:400;\n  }\n\n  /* ====== Section divider (reusable) ====== */\n  .s-divider{\n    background:var(--midnight); color:var(--bone);\n    display:grid; grid-template-columns: 1fr 1fr;\n  }\n  .s-divider .l{ padding:80px; display:flex; flex-direction:column; justify-content:space-between;}\n  .s-divider .l .num{\n    font-family:var(--mono); font-size:220px; line-height:0.85;\n    color:var(--bone); letter-spacing:-0.04em; font-weight:400;\n  }\n  .s-divider .l .num span{ color:var(--mist); }\n  .s-divider .l h2{\n    font-size:120px; line-height:0.9; letter-spacing:-0.035em;\n  }\n  .s-divider .l h2 em{ font-style:normal; color:var(--signal); }\n  .s-divider .r{\n    border-left:1px solid var(--line);\n    padding:80px;\n    display:flex; flex-direction:column; justify-content:flex-end;\n  }\n  .s-divider .r p{\n    font-family:var(--body); font-size:22px; line-height:1.55;\n    color:var(--ink); max-width:560px; margin:0; font-weight:500;\n  }\n  .s-divider .r .stats{\n    margin-top:48px;\n    display:grid; grid-template-columns:1fr 1fr; gap:32px;\n    border-top:1px solid var(--line); padding-top:32px;\n  }\n  .s-divider .r .stats div{\n    font-family:var(--mono); font-size:13px; letter-spacing:0.08em;\n    text-transform:uppercase; color:var(--mist);\n  }\n  .s-divider .r .stats div strong{\n    display:block; margin-top:8px; color:var(--bone);\n    font-family:var(--display); font-weight:800;\n    font-size:34px; letter-spacing:-0.01em; text-transform:none;\n  }\n\n  /* ====== 05 — The Mark ====== */\n  .s-mark{ display:grid; grid-template-columns: 1fr 1fr; background:var(--paper);}\n  .s-mark .info{\n    padding:120px 100px;\n    display:flex; flex-direction:column; justify-content:center; gap:32px;\n  }\n  .s-mark .info h3{\n    font-size:84px; line-height:0.95; letter-spacing:-0.03em;\n  }\n  .s-mark .info h3 em{ font-style:normal; color:var(--signal);}\n  .s-mark .info p{\n    font-size:20px; line-height:1.6; color:var(--ink);\n    max-width:560px; margin:0; font-weight:500;\n  }\n  .s-mark .info .specs{\n    margin-top:16px;\n    display:grid; grid-template-columns:1fr 1fr; gap:24px;\n    border-top:1px solid var(--line); padding-top:24px;\n    font-family:var(--mono); font-size:12px; letter-spacing:0.1em;\n    text-transform:uppercase; color:var(--mist); max-width:560px;\n  }\n  .s-mark .info .specs strong{ color:var(--bone); display:block; margin-top:6px; font-weight:600; letter-spacing:0.04em; font-size:14px; }\n  .s-mark .canvas{\n    background:var(--surface);\n    border-left:1px solid var(--line);\n    display:flex; align-items:center; justify-content:center;\n    position:relative;\n  }\n  .s-mark .canvas .sinra-mark{ width:60%; color:var(--bone);}\n  .s-mark .canvas .corners > i,\n  .s-mark .canvas .corners::before,\n  .s-mark .canvas .corners::after{\n    content:''; position:absolute; width:24px; height:24px; border:1px solid var(--mist);\n  }\n  .s-mark .canvas .corners{ position:absolute; inset:60px; pointer-events:none; }\n  .s-mark .canvas .corners::before{ top:0; left:0; border-right:none; border-bottom:none; }\n  .s-mark .canvas .corners::after{ bottom:0; right:0; border-left:none; border-top:none; }\n  .s-mark .canvas .corners > i:nth-child(1){ top:0; right:0; border-left:none; border-bottom:none; }\n  .s-mark .canvas .corners > i:nth-child(2){ bottom:0; left:0; border-right:none; border-top:none; }\n\n  /* ====== 06 — Reading the mark (3 strokes) ====== */\n  .s-reading{ padding:80px 100px; display:flex; flex-direction:column; gap:36px; background:var(--paper);}\n  .s-reading .head{ display:flex; justify-content:space-between; align-items:flex-end; gap:48px;}\n  .s-reading .head h3{ font-size:76px; line-height:0.95; letter-spacing:-0.03em;}\n  .s-reading .head h3 em{ font-style:normal; color:var(--signal);}\n  .s-reading .head .caption{ max-width:580px; color:var(--ink); font-size:18px; line-height:1.6; font-weight:500;}\n  .read-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:28px; flex:1; min-height:0;}\n  .read-card{\n    background:var(--surface); border:1px solid var(--line);\n    padding:36px 36px 32px;\n    display:grid; grid-template-rows: auto 1fr auto auto; gap:18px;\n    position:relative;\n  }\n  .read-card .step{\n    font-family:var(--mono); font-size:12px; letter-spacing:0.16em;\n    text-transform:uppercase; color:var(--signal); font-weight:600;\n  }\n  .read-card .stage{\n    display:flex; align-items:center; justify-content:center;\n    aspect-ratio: 1.4 / 1; background:var(--sunken); border:1px solid var(--line);\n    position:relative; overflow:hidden;\n  }\n  .read-card .stage .sinra-mark{ width:42%; color:var(--mist);}\n  .read-card .stage .sinra-mark.active{\n    position:absolute; inset:auto; left:50%; top:50%;\n    transform:translate(-50%,-50%);\n    color:var(--signal);\n    clip-path: var(--clip);\n  }\n  .read-card h4{\n    font-family:var(--display); font-weight:800;\n    font-size:30px; letter-spacing:-0.015em; color:var(--bone);\n  }\n  .read-card h4 .verb{ color:var(--signal);}\n  .read-card p{\n    font-size:15px; line-height:1.55; color:var(--ink); margin:0; font-weight:500;\n  }\n  .read-foot{\n    display:grid; grid-template-columns:repeat(3, 1fr); gap:28px;\n    font-family:var(--mono); font-size:12px; letter-spacing:0.12em;\n    text-transform:uppercase; color:var(--mist);\n  }\n  .read-foot strong{ display:block; margin-top:6px; color:var(--bone); font-weight:600; letter-spacing:0.04em; font-size:14px;}\n\n  /* ====== 07 — Wordmark & Naming ====== */\n  .s-wordmark{ padding:80px  book<\u002Fspan><\u002Fdiv><div>02 · Foreword<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div>Identity<\u002Fdiv><div>p. 02 / 17<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"eyebrow\" style=\"margin-bottom:40px;\">Foreword<\u002Fdiv>\n    <div class=\"quote\">\n      sinra is the project management tool built for teams that combine <em>V‑Model<\u002Fem> and <em>Agile.<\u002Fem>\n      Our mark says the same thing in one motion: a continuous <em>S<\u002Fem>, drawn in a single sweep,\n      flowing from plan to release without breaking stride.\n    <\u002Fdiv>\n    <div class=\"sig\">\n      <div class=\"col\">Author<strong>Brand Direction<\u002Fstrong><\u002Fdiv>\n      <div class=\"col\">Scope<strong>Identity, voice, applications<\u002Fstrong><\u002Fdiv>\n      <div class=\"col\">Revision<strong>Annual<\u002Fstrong><\u002Fdiv>\n      <div class=\"col\">Contact<strong>brand@sinra.dev<\u002Fstrong><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 — CONTENTS -->\n  <section data-screen-label=\"03 Contents\" class=\"s-toc\">\n    <div class=\"chrome\">\n      <div class=\"row\"><div class=\"brand\"><span class=\"glyph\"><\u002Fspan><span>sinra · brand book<\u002Fspan><\u002Fdiv><div>03 · Contents<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div>Index<\u002Fdiv><div>p. 03 / 17<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"eyebrow\" style=\"margin-bottom:24px;\">Contents<\u002Fdiv>\n    <h2>What's<br>inside.<\u002Fh2>\n    <ol>\n      <li><span>The mark, in motion<\u002Fspan><span class=\"num\">01 · p.04<\u002Fspan><\u002Fli>\n      <li><span>Reading the S<\u002Fspan><span class=\"num\">02 · p.05<\u002Fspan><\u002Fli>\n      <li><span>Wordmark &amp; naming<\u002Fspan><span class=\"num\">03 · p.06<\u002Fspan><\u002Fli>\n      <li><span>Construction &amp; clearspace<\u002Fspan><span class=\"num\">04 · p.07<\u002Fspan><\u002Fli>\n      <li><span>What sinra promises<\u002Fspan><span class=\"num\">05 · p.08<\u002Fspan><\u002Fli>\n      <li><span>Variations<\u002Fspan><span class=\"num\">06 · p.09<\u002Fspan><\u002Fli>\n      <li><span>Misuse<\u002Fspan><span class=\"num\">07 · p.10<\u002Fspan><\u002Fli>\n      <li><span>Primary palette<\u002Fspan><span class=\"num\">08 · p.11<\u002Fspan><\u002Fli>\n      <li><span>Surfaces &amp; ratios<\u002Fspan><span class=\"num\">09 · p.12<\u002Fspan><\u002Fli>\n      <li><span>Typography<\u002Fspan><span class=\"num\">10 · p.13<\u002Fspan><\u002Fli>\n      <li><span>Voice &amp; tone<\u002Fspan><span class=\"num\">11 · p.14<\u002Fspan><\u002Fli>\n      <li><span>Applications<\u002Fspan><span class=\"num\">12 · p.15<\u002Fspan><\u002Fli>\n      <li><span>Sign-off<\u002Fspan><span class=\"num\">13 · p.16<\u002Fspan><\u002Fli>\n    <\u002Fol>\n  <\u002Fsection>\n\n  <!-- 04 — SECTION DIVIDER : THE MARK -->\n  <section data-screen-label=\"04 The Mark\" class=\"s-divider\">\n    <div class=\"chrome\">\n      <div class=\"row\"><div class=\"brand\"><span class=\"glyph\"><\u002Fspan><span>sinra · brand book<\u002Fspan><\u002Fdiv><div>Section 01<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div>The Mark<\u002Fdiv><div>p. 04 / 17<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"l\">\n      <div class=\"num\">01<span>/17<\u002Fspan><\u002Fdiv>\n      <h2>The <em>mark.<\u002Fem><\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"r\">\n      <p>\n        The sinra mark is an <strong style=\"color:var(--signal);font-weight:600\">S<\u002Fstrong> drawn as a single continuous motion.\n        Three coordinated strokes flow into one shape: a main sweep that climbs from bottom to top,\n        an answering curve that turns and closes the form, and a leading accent that lifts the eye off the page.\n      <\u002Fp>\n      <p style=\"margin-top:20px;\">\n        One letter, one motion. It is the visual echo of what sinra does for a project:\n        keep the path from planning to release continuous, no scattered tools, no broken handoffs.\n      <\u002Fp>\n      <div class=\"stats\">\n        <div>Born<strong>2025<\u002Fstrong><\u002Fdiv>\n        <div>Strokes<strong>Three, joined<\u002Fstrong><\u002Fdiv>\n        <div>Motion<strong>Bottom‑left to top‑right<\u002Fstrong><\u002Fdiv>\n        <div>Native format<strong>SVG<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 — THE MARK (display) -->\n  <section data-screen-label=\"05 The Mark\" class=\"s-mark\">\n    <div class=\"chrome\">\n      <div class=\"row\"><div class=\"brand\"><span class=\"glyph\"><\u002Fspan><span>sinra · brand book<\u002Fspan><\u002Fdiv><div>05 · The Mark<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div>01 — Mark<\u002Fdiv><div>p. 05 / 17<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info\">\n      <div class=\"eyebrow\">01.1 · Monogram<\u002Fdiv>\n      <h3>One letter,<br><em>one motion.<\u002Fem><\u002Fh3>\n      <p>\n        The sinra monogram reads as an <strong style=\"color:var(--bone)\">S<\u002Fstrong> the moment you see it,\n        and as motion the moment you trace it. There is no static container, no rigid frame.\n        The shape is the gesture: a curve that keeps going.\n      <\u002Fp>\n      <p>\n        Use the monogram alone wherever the context permits: app icon, favicon, social avatar,\n        short signature, watermark.\n      <\u002Fp>\n      <div class=\"specs\">\n        <div>Family<strong>Monogram<\u002Fstrong><\u002Fdiv>\n        <div>Status<strong>Primary mark<\u002Fstrong><\u002Fdiv>\n        <div>Reference format<strong>Vector · SVG<\u002Fstrong><\u002Fdiv>\n        <div>Reference colour<strong>Bone #E5EEF2<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"canvas\">\n      <div class=\"corners\"><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n      <span class=\"sinra-mark\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 06 — READING THE MARK -->\n  <section data-screen-label=\"06 Reading the S\" class=\"s-reading\">\n    <div class=\"chrome\">\n      <div class=\"row\"><div class=\"brand\"><span class=\"glyph\"><\u002Fspan><span>sinra · brand book<\u002Fspan><\u002Fdiv><div>06 · Reading the S<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div>01 — Mark<\u002Fdiv><div>p. 06 / 17<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"head\">\n      <h3>Reading <em>the S.<\u002Fem><\u002Fh3>\n      <p class=\"caption\">\n        Three strokes, three roles, one continuous letter. Read together they are the brand.\n        Read separately they map onto the V‑Model heartbeat that sinra runs on: plan, execute, verify.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div class=\"read-grid\">\n      <div class=\"read-card\">\n        <div class=\"step\">Stroke 01<\u002Fdiv>\n        <div class=\"stage\">\n          <span class=\"sinra-mark\"><\u002Fspan>\n          <span class=\"sinra-mark active\" style=\"--clip: polygon(0 100%, 100% 0, 100% 30%, 0 100%);\"><\u002Fspan>\n        <\u002Fdiv>\n        <h4><span class=\"verb\">Plan.<\u002Fspan><\u002Fh4>\n        <p>The main sweep. The team agrees on what good looks like before a single ticket is opened. Specification rises from the ground up.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"read-card\">\n        <div class=\"step\">Stroke 02<\u002Fdiv>\n        <div class=\"stage\">\n          <span class=\"sinra-mark\"><\u002Fspan>\n          <span class=\"sinra-mark active\" style=\"--clip: polygon(0 100%, 100% 35%, 100% 100%, 0 100%);\"><\u002Fspan>\n        <\u002Fdiv>\n        <h4><span class=\"verb\">Execute.<\u002Fspan><\u002Fh4>\n        <p>The answering curve. Work flows in cycles, capacity is honest, blockers surface immediately. Execution always knows where it sits against the plan.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"read-card\">\n        <div class=\"step\">Stroke 03<\u002Fdiv>\n        <div class=\"stage\">\n          <span class=\"sinra-mark\"><\u002Fspan>\n          <span class=\"sinra-mark active\" style=\"--clip: polygon(60% 0, 100% 0, 100% 40%, 60% 40%);\"><\u002Fspan>\n        <\u002Fdiv>\n        <h4><span class=\"verb\">Verify.<\u002Fspan><\u002Fh4>\n        <p>The leading accent. Every release crosses the same readiness bar before shipping. Quality is built in, not bolted on at the end.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"read-foot\">\n      <div>Model<strong>V‑Model meets Agile<\u002Fstrong><\u002Fdiv>\n      <div>Reading order<strong>Plan, execute, verify<\u002Fstrong><\u002Fdiv>\n      <div>Property<strong>Continuous, not phased<\u002Fstrong><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 07 — WORDMARK & NAMING -->\n  <section data-screen-label=\"07 Wordmark\" class=\"s-wordmark\">\n    <div class=\"chrome\">\n      <div class=\"row\"><div class=\"brand\"><span class=\"glyph\"><\u002Fspan><span>sinra · brand book<\u002Fspan><\u002Fdiv><div>07 · Wordmark &amp; Naming<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div>01 — Mark<\u002Fdiv><div>p. 07 / 17<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"left\">\n      <div>\n        <div class=\"eyebrow\">01.3 · Wordmark &amp; Naming<\u002Fdiv>\n        <h3>It is <em>sinra.<\u002Fem><br>Always lowercase.<\u002Fh3>\n      <\u002Fdiv>\n      <p class=\"lead\">\n        The wordmark is set in Nunito 900, lowercase, tightly tracked. The name never takes a capital, not at the start of a sentence, not in headlines, not in product titles. The lowercase is the brand: quiet, level, deliberate. Nothing shouted, nothing forced.\n      <\u002Fp>\n      <div class=\"examples\">\n        <div class=\"ex-tile ok\"><span class=\"mark\">✓<\u002Fspan><span class=\"word\">sinra<\u002Fspan><span class=\"tag\">Correct<\u002Fspan><\u002Fdiv>\n        <div class=\"ex-tile ko\"><span class=\"mark\">✕<\u002Fspan><span class=\"word\">Sinra<\u002Fspan><span class=\"tag\">Capitalised<\u002Fspan><\u002Fdiv>\n        <div class=\"ex-tile ko\"><span class=\"mark\">✕<\u002Fspan><span class=\"word\">SINRA<\u002Fspan><span class=\"tag\">All caps<\u002Fspan><\u002Fdiv>\n        <div class=\"ex-tile ko\"><span class=\"mark\">✕<\u002Fspan><span class=\"word\">SiNrA<\u002Fspan><span class=\"tag\">Mixed case<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rule\">\n        <div>Casing<strong>Always lowercase<\u002Fstrong><\u002Fdiv>\n        <div>Wordmark face<strong>Nunito · 900<\u002Fstrong><\u002Fdiv>\n        <div>Tracking<strong>−7%<\u002Fstrong><\u002Fdiv>\n        <div>Mark to wordmark gap<strong>1 × mark height<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"canvas\">\n      <div class=\"baseline top\"><\u002Fdiv>\n      <div class=\"baseline bot\"><\u002Fdiv>\n      <span class=\"axis-tag top\">cap height<\u002Fspan>\n      <span class=\"axis-tag bot\">baseline<\u002Fspan>\n      <div class=\"lockup\">\n        <span class=\"sinra-mark\"><\u002Fspan>\n        <div class=\"wordmark\">sinra<\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"caption\">07.1 · Horizontal lockup, mark + wordmark<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 08 — CONSTRUCTION & CLEARSPACE -->\n  <section data-screen-label=\"08 Construction\" class=\"s-construction\">\n    <div class=\"chrome\">\n      <div class=\"row\"><div class=\"brand\"><span class=\"glyph\"><\u002Fspan><span>sinra · brand book<\u002Fspan><\u002Fdiv><div>08 · Construction<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div>01 — Mark<\u002Fdiv><div>p. 08 / 17<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"head\">\n      <h3>Construction<br>&amp; <em>clearspace.<\u002Fem><\u002Fh3>\n      <p class=\"caption\">\n        The mark is balanced on a 16×16 grid, centred on diagonals that match the natural direction\n        of the S. Clearspace equals <strong>½ × X<\u002Fstrong> on every side, where X is the mark's height.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div class=\"body\">\n      <div class=\"build-card\">\n        <div class=\"gridlines\"><\u002Fdiv>\n        <div class=\"axis h\"><\u002Fdiv>\n        <div class=\"axis v\"><\u002Fdiv>\n        <div class=\"axis d1\"><\u002Fdiv>\n        <div class=\"axis d2\"><\u002Fdiv>\n        <span class=\"sinra-mark\"><\u002Fspan>\n        <span class=\"tag tag-tr\">A · stroke 03<\u002Fspan>\n        <span class=\"tag tag-bl\">B · stroke 01<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"clear-card\">\n        <div class=\"frame-outer\"><\u002Fdiv>\n        <div class=\"frame-inner\"><\u002Fdiv>\n        <span class=\"sinra-mark\"><\u002Fspan>\n        <span class=\"x x-t\">½X<\u002Fspan>\n        <span class=\"x x-b\">½X<\u002Fspan>\n        <span class=\"x x-l\">½X<\u002Fspan>\n        <span class=\"x x-r\">½X<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"panel-foot\">\n      <div>08.1 · Grid<strong>16 × 16 units<\u002Fstrong><\u002Fdiv>\n      <div>08.2 · Centring<strong>Diagonals SW to NE<\u002Fstrong><\u002Fdiv>\n      <div>08.3 · Clearspace<strong>½ X on every side<\u002Fstrong><\u002Fdiv>\n      <div>08.4 · Minimum size<strong>24 px digital, 8 mm print<\u002Fstrong><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 09 — THE THREE PROMISES -->\n  <section data-screen-label=\"09 Promises\" class=\"s-promises\">\n    <div class=\"chrome\">\n      <div class=\"row\"><div class=\"brand\"><span class=\"glyph\"><\u002Fspan><span>sinra · brand book<\u002Fspan><\u002Fdiv><div>09 · What sinra promises<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div>02 — Method<\u002Fdiv><div>p. 09 / 17<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"head\">\n      <h3>What sinra <em>promises.<\u002Fem><\u002Fh3>\n      <p class=\"caption\">\n        Three commitments to the teams who pick sinra. They are the reason the product exists,\n        the reason the mark is one continuous motion, and the reason the lowercase is the lowercase.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div class=\"promises-grid\">\n      <div class=\"promise\">\n        <div class=\"step\">Promise 01<\u002Fdiv>\n        <h4>Total<br>visibility.<\u002Fh4>\n        <p>Specification, capacity, execution, releases. One screen, no scattered tools. Project leads see what is happening without asking three teams to update three boards.<\u002Fp>\n        <div class=\"figure\"><b>100%<\u002Fb><span>Project<br>visibility<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"promise\">\n        <div class=\"step\">Promise 02<\u002Fdiv>\n        <h4>Honest<br>capacity.<\u002Fh4>\n        <p>Plans are sized against real availability. Teams promise what they can deliver, not what someone wishes they could. Capacity stops being a fight and starts being a number.<\u002Fp>\n        <div class=\"figure\"><b>40%<\u002Fb><span>Less time<br>on coordination<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"promise\">\n        <div class=\"step\">Promise 03<\u002Fdiv>\n        <h4>Controlled<br>quality.<\u002Fh4>\n        <p>Every release crosses the same readiness gates. V‑Model verification is built into the daily cadence, not bolted on at the end of a phase.<\u002Fp>\n        <div class=\"figure\"><b>4&nbsp;→&nbsp;1<\u002Fb><span>Tools replaced<br>on average<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 10 — VARIATIONS -->\n  <section data-screen-label=\"10 Variations\" class=\"s-variations\">\n    <div class=\"chrome\">\n      <div class=\"row\"><div class=\"brand\"><span class=\"glyph\"><\u002Fspan><span>sinra · brand book<\u002Fspan><\u002Fdiv><div>10 · Variations<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div>03 — System<\u002Fdiv><div>p. 10 / 17<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"head\">\n      <h3>Variations.<\u002Fh3>\n      <p class=\"caption\">Four valid pairings on the dim palette. The mark is bone on the dark surfaces, and inverts to ink on the bright accents. No other coloured versions exist.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"tiles\">\n      <div class=\"var-tile surface\"><span class=\"sinra-mark\"><\u002Fspan><span class=\"l\">01 · Bone / Base‑100<\u002Fspan><\u002Fdiv>\n      <div class=\"var-tile midnight\"><span class=\"sinra-mark\"><\u002Fspan><span class=\"l\">02 · Bone / Neutral<\u002Fspan><\u002Fdiv>\n      <div class=\"var-tile primary\"><span class=\"sinra-mark\"><\u002Fspan><span class=\"l\">03 · Ink / Primary<\u002Fspan><\u002Fdiv>\n      <div class=\"var-tile secondary\"><span class=\"sinra-mark\"><\u002Fspan><span class=\"l\">04 · Ink / Secondary<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\">\n      <div>Version 01<strong>Default usage<\u002Fstrong><\u002Fdiv>\n      <div>Version 02<strong>Hero, cover<\u002Fstrong><\u002Fdiv>\n      <div>Version 03<strong>Campaigns only<\u002Fstrong><\u002Fdiv>\n      <div>Version 04<strong>Alerts, accents<\u002Fstrong><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 11 — MISUSE -->\n  <section data-screen-label=\"11 Misuse\" class=\"s-misuse\">\n    <div class=\"chrome\">\n      <div class=\"row\"><div class=\"brand\"><span class=\"glyph\"><\u002Fspan><span>sinra · brand book<\u002Fspan><\u002Fdiv><div>11 · Misuse<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div>03 — System<\u002Fdiv><div>p. 11 / 17<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"head\">\n      <h3>Misuse.<\u002Fh3>\n      <p class=\"caption\">The mark must never be stretched, recoloured outside palette, relit, outlined, or shrunk past the minimum. Always start from the master file.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"mis-grid\">\n      <div class=\"mis-tile mis-stretch\"><div class=\"cross\">✕<\u002Fdiv><span class=\"sinra-mark\"><\u002Fspan><span class=\"l\">Don't stretch<\u002Fspan><\u002Fdiv>\n      <div class=\"mis-tile mis-rotate\"><div class=\"cross\">✕<\u002Fdiv><span class=\"sinra-mark\"><\u002Fspan><span class=\"l\">Don't rotate<\u002Fspan><\u002Fdiv>\n      <div class=\"mis-tile mis-recolor\"><div class=\"cross\">✕<\u002Fdiv><span class=\"sinra-mark\"><\u002Fs
