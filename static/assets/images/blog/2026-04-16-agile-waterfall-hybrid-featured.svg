<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/><stop offset="60%" stop-color="#0a0f1a"/><stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#c792e9" stop-opacity="0.15"/><stop offset="100%" stop-color="#c792e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.10"/><stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- Yin-yang style split: left=waterfall (linear), right=agile (circular) -->
  <!-- Waterfall side (left) - stepped cascade -->
  <rect x="30" y="130" width="160" height="30" rx="4" fill="#c792e9" fill-opacity="0.12" stroke="#c792e9" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="110" y="151" text-anchor="middle" font-size="9" fill="#c792e9" font-weight="600">Cadrage</text>
  <rect x="55" y="178" width="160" height="30" rx="4" fill="#c792e9" fill-opacity="0.10" stroke="#c792e9" stroke-width="1" stroke-opacity="0.5"/>
  <text x="135" y="199" text-anchor="middle" font-size="9" fill="#c792e9" font-weight="600">Conception</text>
  <rect x="80" y="226" width="160" height="30" rx="4" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="160" y="247" text-anchor="middle" font-size="9" fill="#c792e9" font-weight="600">Développement</text>

  <!-- Agile sprints (right side of left panel) - circular iteration -->
  <circle cx="215" cy="340" r="55" fill="none" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="6,4"/>
  <circle cx="215" cy="340" r="35" fill="#a6f079" fill-opacity="0.07" stroke="#a6f079" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="215" y="334" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="700">Sprint</text>
  <text x="215" y="350" text-anchor="middle" font-size="9" fill="#a6f079" opacity="0.7">itératif</text>

  <!-- Connecting arrow between phases -->
  <line x1="215" y1="262" x2="215" y2="280" stroke="#8b9cbf" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="210,278 215,290 220,278" fill="#8b9cbf" fill-opacity="0.4"/>

  <!-- Deploy phase -->
  <rect x="55" y="415" width="320" height="30" rx="4" fill="#ff6b9d" fill-opacity="0.07" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.35"/>
  <text x="215" y="436" text-anchor="middle" font-size="9" fill="#ff6b9d" font-weight="600">Déploiement structuré</text>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">HYBRIDE · PRAGMATISME</text>
  <text x="500" y="258" font-size="40" font-weight="800" fill="#f8fafc" letter-spacing="-1">Agile-</text>
  <text x="500" y="312" font-size="40" font-weight="800" letter-spacing="-1"><tspan fill="#c792e9">Waterfall</tspan></text>
  <text x="500" y="356" font-size="16" font-weight="600" fill="#8b9cbf">Hybrid</text>
  <text x="500" y="395" font-size="15" fill="#475569">Rigueur structurelle + flexibilité itérative</text>
  <line x1="500" y1="418" x2="850" y2="418" stroke="#1e293b" stroke-width="1"/>
  <g><rect x="500" y="433" width="76" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
  <text x="538" y="452" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">Cadrage</text></g>
  <g><rect x="588" y="433" width="64" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
  <text x="620" y="452" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">Sprints</text></g>
  <g><rect x="664" y="433" width="96" height="28" rx="14" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.35"/>
  <text x="712" y="452" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="600" letter-spacing="0.5">Déploiement</text></g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
