<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/><stop offset="60%" stop-color="#0a0f1a"/><stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.15"/><stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.10"/><stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- Governance pyramid -->
  <!-- Top: Governance (EDM) -->
  <polygon points="215,110 120,220 310,220" fill="#ff6b9d" fill-opacity="0.12" stroke="#ff6b9d" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="215" y="180" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="700">Gouvernance</text>
  <text x="215" y="196" text-anchor="middle" font-size="8" fill="#ff6b9d" opacity="0.7">EDM (5)</text>

  <!-- Middle: Management top half -->
  <polygon points="120,220 60,310 370,310 310,220" fill="#c792e9" fill-opacity="0.09" stroke="#c792e9" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="215" y="262" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="700">APO · BAI</text>
  <text x="215" y="278" text-anchor="middle" font-size="8" fill="#c792e9" opacity="0.7">Aligner · Construire</text>

  <!-- Bottom: Management bottom half -->
  <polygon points="60,310 30,400 400,400 370,310" fill="#a6f079" fill-opacity="0.07" stroke="#a6f079" stroke-width="1" stroke-opacity="0.4"/>
  <text x="215" y="352" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="700">DSS · MEA</text>
  <text x="215" y="368" text-anchor="middle" font-size="8" fill="#a6f079" opacity="0.7">Livrer · Monitorer</text>

  <!-- Maturity levels label -->
  <text x="215" y="440" text-anchor="middle" font-size="10" fill="#8b9cbf" opacity="0.7">Maturité : 0 → 5 niveaux</text>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">GOUVERNANCE IT · ISACA</text>
  <text x="500" y="270" font-size="62" font-weight="800" fill="#f8fafc" letter-spacing="-2">COBIT</text>
  <text x="500" y="338" font-size="20" font-weight="600" fill="#8b9cbf">Control Objectives for</text>
  <text x="500" y="365" font-size="20" font-weight="600" fill="#8b9cbf">Information Technologies</text>
  <text x="500" y="400" font-size="16" fill="#475569">40 objectifs · gouvernance et management IT</text>
  <line x1="500" y1="425" x2="850" y2="425" stroke="#1e293b" stroke-width="1"/>
  <g><rect x="500" y="440" width="96" height="28" rx="14" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.35"/>
  <text x="548" y="459" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="600" letter-spacing="0.5">Gouvernance</text></g>
  <g><rect x="608" y="440" width="80" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
  <text x="648" y="459" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">Maturité</text></g>
  <g><rect x="700" y="440" width="80" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
  <text x="740" y="459" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">Valeur</text></g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
