<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#171b2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0a0f1a;stop-opacity:0.92" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g stroke="#2a3350" stroke-width="1" opacity="0.25">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <circle cx="120" cy="120" r="130" fill="#a6f079" opacity="0.05"/>
  <rect x="0" y="70" width="1200" height="3" fill="#a6f079" opacity="0.55"/>
  <rect x="0" y="70" width="340" height="3" fill="#a6f079"/>

  <!-- three stacked levels: project / release / cycle -->
  <rect x="280" y="140" width="640" height="60" rx="8" fill="#241a30" stroke="#c792e9" stroke-width="1.3" opacity="0.8"/>
  <text x="600" y="177" font-family="monospace" font-size="18" fill="#c792e9" text-anchor="middle">PROJECTS — vision long terme</text>

  <rect x="320" y="220" width="560" height="60" rx="8" fill="#1a2438" stroke="#64b5f6" stroke-width="1.3" opacity="0.8"/>
  <text x="600" y="257" font-family="monospace" font-size="18" fill="#64b5f6" text-anchor="middle">RELEASES — ce qui doit sortir</text>

  <rect x="360" y="300" width="480" height="60" rx="8" fill="#1a2a1a" stroke="#a6f079" stroke-width="1.3" opacity="0.9"/>
  <text x="600" y="337" font-family="monospace" font-size="18" fill="#a6f079" text-anchor="middle">CYCLES — travail de l'équipe</text>

  <text x="600" y="120" font-family="monospace" font-size="15" font-weight="bold" letter-spacing="3" text-anchor="middle" fill="#8b9cbf">3 NIVEAUX, PAS UN BACKLOG PLAT</text>

  <rect x="0" y="446" width="1200" height="184" fill="url(#band)"/>
  <rect x="0" y="446" width="1200" height="2" fill="#a6f079" opacity="0.55"/>
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="34" font-weight="bold" text-anchor="middle" fill="#e0e8ff">Structurer un Backlog Multi-Projets</text>
  <text x="600" y="548" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#c792e9">Plusieurs projets, une seule vue claire</text>
  <text x="1150" y="614" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="end" fill="#a6f079" opacity="0.7">sinra.app</text>
</svg>
