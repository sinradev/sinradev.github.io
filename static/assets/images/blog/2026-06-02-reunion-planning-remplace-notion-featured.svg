<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1320;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b9cbf" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Notion doc: full of comments, no decision -->
  <rect x="60" y="120" width="380" height="390" rx="10" fill="#1a1e30" stroke="#4a5580" stroke-width="1"/>
  <text x="250" y="155" font-family="monospace" font-size="12" fill="#4a5580" text-anchor="middle">📄 Plan Q3 - Notion</text>
  <line x1="90" y1="165" x2="410" y2="165" stroke="#2a3050" stroke-width="1"/>
  <!-- Text lines (simulated doc) -->
  <rect x="90" y="180" width="200" height="8" rx="2" fill="#2a3050" opacity="0.6"/>
  <rect x="90" y="196" width="280" height="8" rx="2" fill="#2a3050" opacity="0.5"/>
  <rect x="90" y="212" width="240" height="8" rx="2" fill="#2a3050" opacity="0.4"/>
  <!-- Comments floating -->
  <rect x="290" y="178" width="110" height="50" rx="5" fill="#1e2840" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
  <text x="345" y="198" font-family="monospace" font-size="8" fill="#ff6b6b" text-anchor="middle">@alice: mais...</text>
  <text x="345" y="213" font-family="monospace" font-size="8" fill="#ff6b6b" text-anchor="middle">qu'en est-il de X?</text>
  <rect x="90" y="235" width="120" height="45" rx="5" fill="#1e2840" stroke="#ffd54f" stroke-width="1" opacity="0.5"/>
  <text x="150" y="254" font-family="monospace" font-size="8" fill="#ffd54f" text-anchor="middle">@bob: 👍</text>
  <text x="150" y="269" font-family="monospace" font-size="8" fill="#ffd54f" text-anchor="middle">mais voir #47</text>
  <rect x="250" y="290" width="140" height="55" rx="5" fill="#1e2840" stroke="#c792e9" stroke-width="1" opacity="0.5"/>
  <text x="320" y="310" font-family="monospace" font-size="8" fill="#c792e9" text-anchor="middle">@carol: pas d'accord</text>
  <text x="320" y="325" font-family="monospace" font-size="8" fill="#c792e9" text-anchor="middle">si on fait A avant B</text>
  <text x="320" y="340" font-family="monospace" font-size="8" fill="#c792e9" text-anchor="middle">et que...</text>
  <!-- No decision badge -->
  <rect x="90" y="420" width="320" height="40" rx="6" fill="#2a1520" stroke="#ff6b6b" stroke-width="1" opacity="0.7"/>
  <text x="250" y="445" font-family="monospace" font-size="12" fill="#ff6b6b" text-anchor="middle">0 décision prise · 3 semaines</text>

  <!-- vs -->
  <text x="530" y="330" font-family="Georgia, serif" font-size="30" fill="#3a4570" text-anchor="middle">vs</text>
  <!-- Timer -->
  <text x="530" y="360" font-family="monospace" font-size="11" fill="#3a4570" text-anchor="middle">2h</text>

  <!-- Meeting: decisions made -->
  <rect x="660" y="120" width="480" height="390" rx="10" fill="#1a2030" stroke="#a6f079" stroke-width="1.5" opacity="0.7"/>
  <text x="900" y="155" font-family="monospace" font-size="12" fill="#a6f079" text-anchor="middle">Planning · Réunion synchrone</text>
  <line x1="690" y1="165" x2="1110" y2="165" stroke="#2a4030" stroke-width="1"/>
  <!-- People circles -->
  <circle cx="740" cy="230" r="24" fill="#1e3040" stroke="#64b5f6" stroke-width="1.5"/>
  <text x="740" y="235" font-family="monospace" font-size="10" fill="#64b5f6" text-anchor="middle">PM</text>
  <circle cx="820" cy="210" r="24" fill="#1e3040" stroke="#a6f079" stroke-width="1.5"/>
  <text x="820" y="215" font-family="monospace" font-size="10" fill="#a6f079" text-anchor="middle">Lead</text>
  <circle cx="900" cy="230" r="24" fill="#1e3040" stroke="#ffd54f" stroke-width="1.5"/>
  <text x="900" y="235" font-family="monospace" font-size="9" fill="#ffd54f" text-anchor="middle">Dev1</text>
  <circle cx="975" cy="210" r="24" fill="#1e3040" stroke="#c792e9" stroke-width="1.5"/>
  <text x="975" y="215" font-family="monospace" font-size="9" fill="#c792e9" text-anchor="middle">Dev2</text>
  <circle cx="1050" cy="230" r="24" fill="#1e3040" stroke="#64b5f6" stroke-width="1.5"/>
  <text x="1050" y="235" font-family="monospace" font-size="10" fill="#64b5f6" text-anchor="middle">UX</text>

  <!-- Decisions list -->
  <text x="900" y="295" font-family="monospace" font-size="12" fill="#a6f079" opacity="0.8" text-anchor="middle">Décisions actées :</text>
  <text x="700" y="320" font-family="monospace" font-size="11" fill="#a6f079">✓ A avant B : confirmed</text>
  <text x="700" y="342" font-family="monospace" font-size="11" fill="#a6f079">✓ Responsables assignés</text>
  <text x="700" y="364" font-family="monospace" font-size="11" fill="#a6f079">✓ Dépendances identifiées</text>
  <text x="700" y="386" font-family="monospace" font-size="11" fill="#a6f079">✓ Timeline validée</text>

  <!-- Decision badge -->
  <rect x="700" y="420" width="400" height="40" rx="6" fill="#1a3020" stroke="#a6f079" stroke-width="1" opacity="0.8"/>
  <text x="900" y="445" font-family="monospace" font-size="12" fill="#a6f079" text-anchor="middle">4 décisions · 2 heures</text>

  <text x="600" y="555" font-family="Georgia, serif" font-size="26" fill="#e0e8ff" text-anchor="middle" opacity="0.9">L'async documente. Le synchrone décide.</text>
</svg>
