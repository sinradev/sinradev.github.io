<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1320;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b9cbf" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Clock -->
  <circle cx="600" cy="230" r="110" fill="#181e30" stroke="#2a3560" stroke-width="2"/>
  <circle cx="600" cy="230" r="5" fill="#8b9cbf"/>
  <!-- Clock hands: 9:30 -->
  <line x1="600" y1="230" x2="560" y2="230" stroke="#8b9cbf" stroke-width="3" stroke-linecap="round"/>
  <line x1="600" y1="230" x2="600" y2="175" stroke="#8b9cbf" stroke-width="2" stroke-linecap="round"/>
  <!-- Tick marks -->
  <line x1="600" y1="126" x2="600" y2="140" stroke="#3a4570" stroke-width="2"/>
  <line x1="710" y1="230" x2="696" y2="230" stroke="#3a4570" stroke-width="2"/>
  <line x1="600" y1="334" x2="600" y2="320" stroke="#3a4570" stroke-width="2"/>
  <line x1="490" y1="230" x2="504" y2="230" stroke="#3a4570" stroke-width="2"/>
  <text x="600" y="288" font-family="monospace" font-size="13" fill="#4a5580" text-anchor="middle">9:30</text>

  <!-- Left side: BAD daily - status report -->
  <rect x="60" y="100" width="380" height="340" rx="10" fill="#1e1a28" stroke="#ff6b6b" stroke-width="1.5" opacity="0.6"/>
  <text x="250" y="135" font-family="monospace" font-size="12" fill="#ff6b6b" text-anchor="middle">Daily RAPPORT</text>
  <line x1="80" y1="145" x2="420" y2="145" stroke="#ff6b6b" stroke-width="0.5" opacity="0.3"/>

  <text x="90" y="175" font-family="monospace" font-size="11" fill="#6a3050">Alice :</text>
  <text x="90" y="193" font-family="monospace" font-size="10" fill="#5a2540">« J'ai travaillé sur la feature X.</text>
  <text x="90" y="210" font-family="monospace" font-size="10" fill="#5a2540">Aujourd'hui je continue. Pas de bloquant. »</text>

  <text x="90" y="240" font-family="monospace" font-size="11" fill="#6a3050">Bob :</text>
  <text x="90" y="258" font-family="monospace" font-size="10" fill="#5a2540">« J'avance sur les tests.</text>
  <text x="90" y="275" font-family="monospace" font-size="10" fill="#5a2540">Tout va bien. Pas de bloquant. »</text>

  <text x="90" y="305" font-family="monospace" font-size="11" fill="#6a3050">Carol :</text>
  <text x="90" y="323" font-family="monospace" font-size="10" fill="#5a2540">« Je revois les PRs d'hier.</text>
  <text x="90" y="340" font-family="monospace" font-size="10" fill="#5a2540">Rien à signaler. »</text>

  <rect x="80" y="375" width="320" height="48" rx="6" fill="#2a1520" stroke="#ff6b6b" stroke-width="1" opacity="0.7"/>
  <text x="240" y="396" font-family="monospace" font-size="11" fill="#ff6b6b" text-anchor="middle">0 collaboration générée</text>
  <text x="240" y="414" font-family="monospace" font-size="11" fill="#ff6b6b" text-anchor="middle">0 blocage réel détecté</text>

  <!-- Right side: GOOD daily -->
  <rect x="760" y="100" width="380" height="340" rx="10" fill="#1a2a1a" stroke="#a6f079" stroke-width="1.5" opacity="0.6"/>
  <text x="950" y="135" font-family="monospace" font-size="12" fill="#a6f079" text-anchor="middle">Daily SYNCHRONISATION</text>
  <line x1="780" y1="145" x2="1120" y2="145" stroke="#a6f079" stroke-width="0.5" opacity="0.3"/>

  <text x="780" y="175" font-family="monospace" font-size="11" fill="#4a7050">Alice :</text>
  <text x="780" y="193" font-family="monospace" font-size="10" fill="#507060">« Je suis bloquée sur le parsing</text>
  <text x="780" y="210" font-family="monospace" font-size="10" fill="#507060">des dates depuis hier matin. »</text>

  <!-- Help bubble -->
  <text x="780" y="232" font-family="monospace" font-size="11" fill="#a6f079">Bob :</text>
  <text x="780" y="250" font-family="monospace" font-size="10" fill="#6a9060">« J'ai eu le même bug la semaine</text>
  <text x="780" y="267" font-family="monospace" font-size="10" fill="#6a9060">dernière — on se parle après ? »</text>
  <text x="1090" y="258" font-family="monospace" font-size="18" fill="#a6f079" opacity="0.6">👋</text>

  <text x="780" y="295" font-family="monospace" font-size="11" fill="#4a7050">Carol :</text>
  <text x="780" y="313" font-family="monospace" font-size="10" fill="#507060">« Mon ticket dépend du endpoint</text>
  <text x="780" y="330" font-family="monospace" font-size="10" fill="#507060">de Bob. Réaliste cette semaine ? »</text>

  <rect x="780" y="375" width="320" height="48" rx="6" fill="#1a3020" stroke="#a6f079" stroke-width="1" opacity="0.7"/>
  <text x="940" y="396" font-family="monospace" font-size="11" fill="#a6f079" text-anchor="middle">1 aide proposée</text>
  <text x="940" y="414" font-family="monospace" font-size="11" fill="#a6f079" text-anchor="middle">1 dépendance identifiée</text>

  <!-- Timer label -->
  <text x="600" y="380" font-family="monospace" font-size="12" fill="#4a5580" text-anchor="middle">15 minutes</text>
  <text x="600" y="400" font-family="monospace" font-size="11" fill="#3a4570" text-anchor="middle">même durée</text>

  <text x="600" y="555" font-family="Georgia, serif" font-size="25" fill="#e0e8ff" text-anchor="middle" opacity="0.9">La forme ne fait pas l'utilité — le contenu, si</text>
</svg>
