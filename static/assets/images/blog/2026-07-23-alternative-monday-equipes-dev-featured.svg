<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#171b2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0a0f1a;stop-opacity:0.92" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g stroke="#2a3350" stroke-width="1" opacity="0.25">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <circle cx="120" cy="120" r="130" fill="#a6f079" opacity="0.05"/>
  <circle cx="1080" cy="150" r="120" fill="#8b5cf6" opacity="0.06"/>
  <rect x="0" y="70" width="1200" height="3" fill="#a6f079" opacity="0.55"/>
  <rect x="0" y="70" width="340" height="3" fill="#a6f079"/>

  <!-- blank board vs structured board -->
  <g>
    <rect x="130" y="150" width="380" height="230" rx="10" fill="#1a1a24" stroke="#e0a45c" stroke-width="1.5" opacity="0.6" stroke-dasharray="6 4"/>
    <text x="320" y="195" font-family="monospace" font-size="14" fill="#e0a45c" text-anchor="middle" opacity="0.85">TABLEAU VIERGE</text>
    <text x="320" y="270" font-family="Georgia, serif" font-size="40" fill="#e0a45c" text-anchor="middle" opacity="0.4">?</text>
    <text x="320" y="340" font-family="monospace" font-size="12" fill="#8b7a5c" text-anchor="middle">à vous de tout définir</text>
  </g>

  <text x="600" y="278" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#e0e8ff" text-anchor="middle" opacity="0.7">vs</text>

  <g>
    <rect x="690" y="150" width="380" height="230" rx="10" fill="#1a2a1a" stroke="#a6f079" stroke-width="1.5" opacity="0.85"/>
    <text x="880" y="190" font-family="monospace" font-size="14" fill="#a6f079" text-anchor="middle" opacity="0.9">SINRA</text>
    <text x="880" y="222" font-family="monospace" font-size="13" fill="#e0e8ff" text-anchor="middle">issues · capabilities</text>
    <text x="880" y="248" font-family="monospace" font-size="13" fill="#e0e8ff" text-anchor="middle">releases · cycles</text>
    <text x="880" y="274" font-family="monospace" font-size="13" fill="#e0e8ff" text-anchor="middle">dependencies · labels</text>
    <text x="880" y="340" font-family="monospace" font-size="12" fill="#6a8a6a" text-anchor="middle">déjà là, dès le premier jour</text>
  </g>

  <rect x="0" y="446" width="1200" height="184" fill="url(#band)"/>
  <rect x="0" y="446" width="1200" height="2" fill="#a6f079" opacity="0.55"/>
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="38" font-weight="bold" text-anchor="middle" fill="#e0e8ff">Alternative à Monday.com pour Équipes Dev</text>
  <text x="600" y="548" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#c792e9">Comparatif 2026</text>
  <text x="1150" y="614" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="end" fill="#a6f079" opacity="0.7">sinra.app</text>
</svg>
