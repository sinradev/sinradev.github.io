  <rect x="273" y="112" width="190" height="290" rx="12" fill="#1e293b" fill-opacity="0.4" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="368" y="138" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#a6f079" letter-spacing="1.5">EN COURS</text>
  <text x="368" y="155" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a6f079" opacity="0.7">WIP max : 3</text>

  <rect x="291" y="168" width="154" height="48" rx="8" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.4"/>
