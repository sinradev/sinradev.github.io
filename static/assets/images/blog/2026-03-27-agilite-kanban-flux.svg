  <text x="308" y="207" font-family="Inter, sans-serif" font-size="9" fill="#a6f079">60%</text>

  <rect x="291" y="226" width="154" height="48" rx="8" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.4"/>
