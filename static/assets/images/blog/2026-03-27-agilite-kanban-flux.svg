  <text x="500" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">Kanban</text>
  <text x="500" y="88" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#475569">Flux continu · Pas d'itérations · Limites WIP</text>

  <!-- Column 1: À Faire -->
  <rect x="40" y="112" width="190" height="290" rx="12" fill="#1e293b" fill-opacity="0.4" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.2"/>
  <text x="135" y="138" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#ff6b9d" letter-spacing="1.5">À FAIRE</text>
  <text x="135" y="155" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#334155">WIP illimité</text>
