  <text x="75" y="207" font-family="Inter, sans-serif" font-size="9" fill="#475569">Feature</text>

  <rect x="58" y="226" width="154" height="48" rx="8" fill="#ff6b9d" fill-opacity="0.06" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.25"/>
  <text x="75" y="248" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">Refactor API</text>
  <text x="75" y="265" font-family="Inter, sans-serif" font-size="9" fill="#475569">Bug fix</text>

  <rect x="58" y="284" width="154" height="48" rx="8" fill="#ff6b9d" fill-opacity="0.06" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.15"/>
  <text x="75" y="306" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">Update docs</text>
