  <rect x="506" y="112" width="190" height="290" rx="12" fill="#1e293b" fill-opacity="0.4" stroke="#c792e9" stroke-width="1" stroke-opacity="0.2"/>
  <text x="601" y="138" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#c792e9" letter-spacing="1.5">REVIEW</text>
  <text x="601" y="155" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#334155">WIP max : 2</text>

  <rect x="524" y="168" width="154" height="48" rx="8" fill="#c792e9" fill-opacity="0.06" stroke="#c792e9" stroke-width="1" stroke-opacity="0.3"/>
  <text x="541" y="190" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">API endpoint</text>
  <text x="541" y="207" font-family="Inter, sans-serif" font-size="9" fill="#475569">Code review</text>

  <!-- Arrow 3 -->
  <path d="M 706 265 L 731 265" stroke="#334155" stroke-width="1.5" fill="none"/>
  <polygon points="731,261 739,265 731,269" fill="#334155"/>

  <!-- Column 4: Done -->
  <rect x="739" y="112" width="220" height="290" rx="12" fill="#1e293b" fill-opacity="0.4" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.2"/>
  <text x="849" y="138" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#6ecf00" letter-spacing="1.5">TERMINÉ</text>
  <text x="849" y="155" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#334155">→ Production</text>

  <rect x="757" y="168" width="184" height="48" rx="8" fill="#6ecf00" fill-opacity="0.06" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.25"/>
  <text x="774" y="190" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">Auth system</text>
  <text x="774" y="207" font-family="Inter, sans-serif" font-size="9" fill="#6ecf00">Live</text>

  <rect x="757" y="226" width="184" height="48" rx="8" fill="#6ecf00" fill-opacity="0.06" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.25"/>
  <text x="774" y="248" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">Email service</text>
  <text x="774" y="265" font-family="Inter, sans-serif" font-size="9" fill="#6ecf00">Live</text>

  <!-- Bottom label -->
  <text x="500" y="428" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#334155" letter-spacing="2">FLUX CONTINU · PAS DE SPRINTS · AMÉLIORATION CONTINUE</text>
</svg>
