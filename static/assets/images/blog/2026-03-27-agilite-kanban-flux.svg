  <text x="308" y="265" font-family="Inter, sans-serif" font-size="9" fill="#a6f079">80%</text>

  <!-- Arrow 2 -->
  <path d="M 473 265 L 498 265" stroke="#334155" stroke-width="1.5" fill="none"/>
  <polygon points="498,261 506,265 498,269" fill="#334155"/>

