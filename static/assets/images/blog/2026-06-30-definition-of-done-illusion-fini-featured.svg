<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1320;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b9cbf" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="68" font-family="monospace" font-size="15" fill="#8b9cbf" text-anchor="middle" opacity="0.6">DEFINITION OF DONE</text>

  <!-- Checklist items - centered column -->
  <!-- Item 1: Code mergé - orange -->
  <rect x="320" y="92" width="560" height="54" rx="6" fill="#1e1a12" stroke="#c87d2a" stroke-width="1.5" opacity="0.85"/>
  <text x="370" y="124" font-family="monospace" font-size="20" fill="#c87d2a">✓</text>
  <text x="415" y="124" font-family="monospace" font-size="14" fill="#c87d2a">Code mergé</text>
  <text x="830" y="124" font-family="monospace" font-size="12" fill="#7a4d18" text-anchor="end">PR fusionnée</text>

  <!-- Item 2: Tests passés - yellow-orange -->
  <rect x="320" y="156" width="560" height="54" rx="6" fill="#1e1d12" stroke="#d4a020" stroke-width="1.5" opacity="0.85"/>
  <text x="370" y="188" font-family="monospace" font-size="20" fill="#d4a020">✓</text>
  <text x="415" y="188" font-family="monospace" font-size="14" fill="#d4a020">Tests passés</text>
  <text x="830" y="188" font-family="monospace" font-size="12" fill="#7a5e10" text-anchor="end">unit + intégration</text>

  <!-- Item 3: Staging validé - yellow-green -->
  <rect x="320" y="220" width="560" height="54" rx="6" fill="#1a1e12" stroke="#b8c430" stroke-width="1.5" opacity="0.85"/>
  <text x="370" y="252" font-family="monospace" font-size="20" fill="#b8c430">✓</text>
  <text x="415" y="252" font-family="monospace" font-size="14" fill="#b8c430">Déployé en staging</text>
  <text x="830" y="252" font-family="monospace" font-size="12" fill="#6a7418" text-anchor="end">validé manuellement</text>

  <!-- Item 4: En prod - light green -->
  <rect x="320" y="284" width="560" height="54" rx="6" fill="#152015" stroke="#80cc50" stroke-width="1.5" opacity="0.85"/>
  <text x="370" y="316" font-family="monospace" font-size="20" fill="#80cc50">✓</text>
  <text x="415" y="316" font-family="monospace" font-size="14" fill="#80cc50">Déployé en production</text>
  <text x="830" y="316" font-family="monospace" font-size="12" fill="#407830" text-anchor="end">rollback possible</text>

  <!-- Item 5: Monitoring -->
  <rect x="320" y="348" width="560" height="54" rx="6" fill="#122018" stroke="#50cc80" stroke-width="1.5" opacity="0.85"/>
  <text x="370" y="380" font-family="monospace" font-size="20" fill="#50cc80">✓</text>
  <text x="415" y="380" font-family="monospace" font-size="14" fill="#50cc80">Monitoring en place</text>
  <text x="830" y="380" font-family="monospace" font-size="12" fill="#307850" text-anchor="end">alertes configurées</text>

  <!-- Item 6: Docs - bright green -->
  <rect x="320" y="412" width="560" height="54" rx="6" fill="#102818" stroke="#a6f079" stroke-width="1.5" opacity="0.85"/>
  <text x="370" y="444" font-family="monospace" font-size="20" fill="#a6f079">✓</text>
  <text x="415" y="444" font-family="monospace" font-size="14" fill="#a6f079">Documentation mise à jour</text>
  <text x="830" y="444" font-family="monospace" font-size="12" fill="#508040" text-anchor="end">user + technique</text>

  <!-- Final FINI box - glowing green -->
  <rect x="320" y="484" width="560" height="66" rx="8" fill="#0d2a14" stroke="#a6f079" stroke-width="2.5"/>
  <rect x="322" y="486" width="556" height="62" rx="7" fill="none" stroke="#a6f079" stroke-width="0.5" opacity="0.3"/>
  <text x="600" y="526" font-family="monospace" font-size="22" fill="#a6f079" text-anchor="middle" font-weight="bold">FINI, vraiment ✓</text>

  <!-- Left label: "Merged ≠ Done" -->
  <text x="60" y="200" font-family="monospace" font-size="13" fill="#c87d2a" text-anchor="middle" opacity="0.8">code mergé</text>
  <text x="60" y="220" font-family="monospace" font-size="20" fill="#c87d2a" text-anchor="middle">≠</text>
  <text x="60" y="244" font-family="monospace" font-size="13" fill="#a6f079" text-anchor="middle" opacity="0.8">fini</text>
  <line x1="105" y1="222" x2="315" y2="300" stroke="#4a5580" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Right label: progress indicator -->
  <text x="1140" y="150" font-family="monospace" font-size="11" fill="#c87d2a" text-anchor="middle" opacity="0.7">début</text>
  <line x1="1140" y1="160" x2="1140" y2="510" stroke="#4a5580" stroke-width="1" opacity="0.2"/>
  <circle cx="1140" cy="119" r="4" fill="#c87d2a" opacity="0.7"/>
  <circle cx="1140" cy="183" r="4" fill="#d4a020" opacity="0.7"/>
  <circle cx="1140" cy="247" r="4" fill="#b8c430" opacity="0.7"/>
  <circle cx="1140" cy="311" r="4" fill="#80cc50" opacity="0.7"/>
  <circle cx="1140" cy="375" r="4" fill="#50cc80" opacity="0.7"/>
  <circle cx="1140" cy="439" r="4" fill="#a6f079" opacity="0.7"/>
  <circle cx="1140" cy="517" r="7" fill="#a6f079" opacity="0.9"/>
  <text x="1140" y="555" font-family="monospace" font-size="11" fill="#a6f079" text-anchor="middle" opacity="0.9">livré</text>

  <!-- Bottom tagline -->
  <text x="600" y="608" font-family="Georgia, serif" font-size="22" fill="#e0e8ff" text-anchor="middle" opacity="0.85">Un ticket « Done » qui n'est pas en prod n'est pas terminé</text>
</svg>
