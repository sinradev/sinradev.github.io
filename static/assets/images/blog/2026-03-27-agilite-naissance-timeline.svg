<svg viewBox="0 0 1000 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#161929"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0"/>
      <stop offset="20%" stop-color="#a6f079" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#c792e9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c792e9" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c792e9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c792e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ecf00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6ecf00" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="340" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="150" cy="180" rx="80" ry="60" fill="url(#glow2)" filter="url(#blur)"/>
  <ellipse cx="380" cy="180" rx="80" ry="60" fill="url(#glow1)" filter="url(#blur)"/>
  <ellipse cx="620" cy="180" rx="80" ry="60" fill="url(#glow3)" filter="url(#blur)"/>
  <ellipse cx="860" cy="180" rx="80" ry="60" fill="url(#glow4)" filter="url(#blur)"/>

  <!-- Timeline line -->
  <line x1="80" y1="175" x2="920" y2="175" stroke="url(#lineGrad)" stroke-width="1.5"/>

  <!-- === POINT 1: 1990s === -->
  <circle cx="150" cy="175" r="28" fill="#0f1117" stroke="#ff6b9d" stroke-width="1.5" opacity="0.8"/>
  <circle cx="150" cy="175" r="6" fill="#ff6b9d" filter="url(#softglow)"/>
  <!-- Label above -->
  <text x="150" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#ff6b9d" letter-spacing="2" opacity="0.9">1990s</text>
  <text x="150" y="136" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">Crise logicielle</text>
  <text x="150" y="153" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Projets qui échouent</text>
  <!-- Connector to dot -->
  <line x1="150" y1="157" x2="150" y2="147" stroke="#ff6b9d" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>

  <!-- === POINT 2: 2001 === -->
  <circle cx="380" cy="175" r="28" fill="#0f1117" stroke="#a6f079" stroke-width="1.5"/>
  <circle cx="380" cy="175" r="8" fill="#a6f079" filter="url(#softglow)"/>
  <!-- Label below -->
  <text x="380" y="218" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#a6f079" letter-spacing="2">2001</text>
  <text x="380" y="238" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">Manifeste Agile</text>
  <text x="380" y="255" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">17 experts, Utah</text>
  <line x1="380" y1="203" x2="380" y2="214" stroke="#a6f079" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>

  <!-- === POINT 3: 2000-2010 === -->
  <circle cx="620" cy="175" r="28" fill="#0f1117" stroke="#c792e9" stroke-width="1.5"/>
  <circle cx="620" cy="175" r="6" fill="#c792e9" filter="url(#softglow)"/>
  <!-- Label above -->
  <text x="620" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#c792e9" letter-spacing="1">2000 — 2010</text>
  <text x="620" y="136" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">Boom des frameworks</text>
  <text x="620" y="153" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Scrum, XP, Kanban, Lean</text>
  <line x1="620" y1="157" x2="620" y2="147" stroke="#c792e9" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>

  <!-- === POINT 4: 2015+ === -->
  <circle cx="860" cy="175" r="28" fill="#0f1117" stroke="#6ecf00" stroke-width="1.5"/>
  <circle cx="860" cy="175" r="6" fill="#6ecf00" filter="url(#softglow)"/>
  <!-- Label below -->
  <text x="860" y="218" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#6ecf00" letter-spacing="2">2015+</text>
  <text x="860" y="238" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">Hybrides modernes</text>
  <text x="860" y="255" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Shape Up, SAFe...</text>
  <line x1="860" y1="203" x2="860" y2="214" stroke="#6ecf00" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>

  <!-- Title -->
  <text x="500" y="308" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#334155" letter-spacing="3" font-weight="500">HISTOIRE DE L'AGILITÉ</text>
</svg>
