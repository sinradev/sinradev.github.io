<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#171b2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0a0f1a;stop-opacity:0.92" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g stroke="#2a3350" stroke-width="1" opacity="0.25">
    <line x1="0" y1="126" x2="1200" y2="126"/>
  </g>
  <circle cx="120" cy="500" r="130" fill="#8b5cf6" opacity="0.04"/>
  <rect x="0" y="70" width="1200" height="3" fill="#a6f079" opacity="0.55"/>
  <rect x="0" y="70" width="340" height="3" fill="#a6f079"/>

  <!-- three overlapping circles: dev, qa, pm meeting at Sinra -->
  <circle cx="450" cy="270" r="130" fill="#64b5f6" opacity="0.15" stroke="#64b5f6" stroke-width="1.5"/>
  <circle cx="600" cy="270" r="130" fill="#a6f079" opacity="0.15" stroke="#a6f079" stroke-width="1.5"/>
  <circle cx="750" cy="270" r="130" fill="#c792e9" opacity="0.15" stroke="#c792e9" stroke-width="1.5"/>
  <text x="400" y="230" font-family="monospace" font-size="16" fill="#64b5f6" text-anchor="middle" font-weight="bold">DEV</text>
  <text x="400" y="255" font-family="monospace" font-size="11" fill="#64b5f6" text-anchor="middle">issues</text>
  <text x="800" y="230" font-family="monospace" font-size="16" fill="#c792e9" text-anchor="middle" font-weight="bold">PM</text>
  <text x="800" y="255" font-family="monospace" font-size="11" fill="#c792e9" text-anchor="middle">releases</text>
  <text x="600" y="380" font-family="monospace" font-size="16" fill="#a6f079" text-anchor="middle" font-weight="bold">QA</text>
  <text x="600" y="405" font-family="monospace" font-size="11" fill="#a6f079" text-anchor="middle">testings</text>
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="14" fill="#e0e8ff" text-anchor="middle" font-weight="bold">Sinra</text>

  <rect x="0" y="446" width="1200" height="184" fill="url(#band)"/>
  <rect x="0" y="446" width="1200" height="2" fill="#a6f079" opacity="0.55"/>
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#e0e8ff">Outil PM pour Équipe Hybride Dev + QA + PM</text>
  <text x="600" y="548" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#c792e9">Comparatif des fonctionnalités qui comptent</text>
  <text x="1150" y="614" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="end" fill="#a6f079" opacity="0.7">sinra.app</text>
</svg>
