<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/><stop offset="60%" stop-color="#0a0f1a"/><stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#c792e9" stop-opacity="0.16"/><stop offset="100%" stop-color="#c792e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.10"/><stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- 4 phases as columns -->
  <g>
    <rect x="30" y="120" width="82" height="36" rx="5" fill="#a6f079" fill-opacity="0.1" stroke="#a6f079" stroke-width="1" stroke-opacity="0.5"/>
    <text x="71" y="143" text-anchor="middle" font-size="11" fill="#a6f079" font-weight="600">Inception</text>
    <rect x="122" y="120" width="82" height="36" rx="5" fill="#c792e9" fill-opacity="0.1" stroke="#c792e9" stroke-width="1" stroke-opacity="0.5"/>
    <text x="163" y="143" text-anchor="middle" font-size="11" fill="#c792e9" font-weight="600">Élaboration</text>
    <rect x="214" y="120" width="82" height="36" rx="5" fill="#6ecf00" fill-opacity="0.1" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.5"/>
    <text x="255" y="143" text-anchor="middle" font-size="11" fill="#6ecf00" font-weight="600">Construction</text>
    <rect x="306" y="120" width="82" height="36" rx="5" fill="#ff6b9d" fill-opacity="0.1" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.5"/>
    <text x="347" y="143" text-anchor="middle" font-size="11" fill="#ff6b9d" font-weight="600">Transition</text>
  </g>

  <!-- Discipline humps (simplified curves) -->
  <!-- Exigences hump - peaks early -->
  <path d="M30,420 Q71,220 122,300 Q163,370 255,430 Q300,450 388,460" fill="none" stroke="#a6f079" stroke-width="2" stroke-opacity="0.6"/>
  <text x="35" y="415" font-size="9" fill="#a6f079" opacity="0.8">Exigences</text>

  <!-- Architecture hump - peaks at elaboration -->
  <path d="M30,450 Q71,400 122,260 Q163,300 255,400 Q300,440 388,460" fill="none" stroke="#c792e9" stroke-width="2" stroke-opacity="0.6"/>
  <text x="35" y="445" font-size="9" fill="#c792e9" opacity="0.8">Conception</text>

  <!-- Implementation hump - peaks at construction -->
  <path d="M30,470 Q122,460 163,430 Q214,300 255,280 Q300,350 388,460" fill="none" stroke="#6ecf00" stroke-width="2" stroke-opacity="0.6"/>
  <text x="35" y="470" font-size="9" fill="#6ecf00" opacity="0.8">Impl.</text>

  <!-- Test hump -->
  <path d="M30,480 Q122,475 214,450 Q255,380 300,330 Q350,380 388,470" fill="none" stroke="#ff6b9d" stroke-width="2" stroke-opacity="0.5"/>
  <text x="35" y="490" font-size="9" fill="#ff6b9d" opacity="0.8">Tests</text>

  <!-- Phase dividers -->
  <line x1="121" y1="158" x2="121" y2="500" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="213" y1="158" x2="213" y2="500" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="305" y1="158" x2="305" y2="500" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,3"/>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">MÉTHODE ITÉRATIVE · FRAMEWORK</text>
  <text x="500" y="262" font-size="72" font-weight="800" fill="#f8fafc" letter-spacing="-3">RUP</text>
  <text x="500" y="340" font-size="22" font-weight="600" fill="#8b9cbf">Rational Unified Process</text>
  <text x="500" y="390" font-size="16" fill="#475569">4 phases · 9 disciplines · configurable</text>
  <line x1="500" y1="415" x2="850" y2="415" stroke="#1e293b" stroke-width="1"/>
  <g><rect x="500" y="430" width="96" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
  <text x="548" y="449" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">Itératif</text></g>
  <g><rect x="608" y="430" width="104" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
  <text x="660" y="449" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">Use Cases</text></g>
  <g><rect x="724" y="430" width="100" height="28" rx="14" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.35"/>
  <text x="774" y="449" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="600" letter-spacing="0.5">Configurable</text></g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
