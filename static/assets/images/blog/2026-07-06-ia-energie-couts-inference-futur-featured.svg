<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c18;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0c1020;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="20%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#ff6b00;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="80%" cy="40%" r="38%">
      <stop offset="0%" style="stop-color:#4a8fff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#4a8fff;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#334466"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00c87a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-left)"/>
  <rect width="1200" height="630" fill="url(#glow-right)"/>

  <!-- Grid -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- LEFT PANEL: Le problème - coût énergétique actuel -->

  <!-- GPU cluster boxes - representing current expensive compute -->
  <rect x="50" y="130" width="58" height="38" rx="4" fill="#1a1020" stroke="#ff6b00" stroke-width="1.2" opacity="0.85"/>
  <text x="79" y="154" font-family="monospace" font-size="9" fill="#ff6b00" text-anchor="middle">GPU</text>

  <rect x="118" y="130" width="58" height="38" rx="4" fill="#1a1020" stroke="#ff6b00" stroke-width="1.2" opacity="0.85"/>
  <text x="147" y="154" font-family="monospace" font-size="9" fill="#ff6b00" text-anchor="middle">GPU</text>

  <rect x="186" y="130" width="58" height="38" rx="4" fill="#1a1020" stroke="#ff6b00" stroke-width="1.2" opacity="0.85"/>
  <text x="215" y="154" font-family="monospace" font-size="9" fill="#ff6b00" text-anchor="middle">GPU</text>

  <rect x="50" y="180" width="58" height="38" rx="4" fill="#1a1020" stroke="#ff6b00" stroke-width="1.2" opacity="0.75"/>
  <text x="79" y="204" font-family="monospace" font-size="9" fill="#cc5500" text-anchor="middle">GPU</text>

  <rect x="118" y="180" width="58" height="38" rx="4" fill="#1a1020" stroke="#ff6b00" stroke-width="1.2" opacity="0.75"/>
  <text x="147" y="204" font-family="monospace" font-size="9" fill="#cc5500" text-anchor="middle">GPU</text>

  <rect x="186" y="180" width="58" height="38" rx="4" fill="#1a1020" stroke="#ff6b00" stroke-width="1.2" opacity="0.75"/>
  <text x="215" y="204" font-family="monospace" font-size="9" fill="#cc5500" text-anchor="middle">GPU</text>

  <!-- Data center label -->
  <text x="155" y="115" font-family="monospace" font-size="11" fill="#996633" text-anchor="middle" letter-spacing="2">DATA CENTER ACTUEL</text>

  <!-- Power / lightning bolt symbol -->
  <polygon points="155,235 140,265 152,265 137,295 170,258 157,258" fill="#ff6b00" opacity="0.85" filter="url(#glow-filter)"/>

  <!-- Cost labels -->
  <text x="155" y="320" font-family="monospace" font-size="12" fill="#ff8844" text-anchor="middle" font-weight="bold">$1M / jour</text>
  <text x="155" y="340" font-family="monospace" font-size="9" fill="#664422" text-anchor="middle">coût inférence GPT-4 (estimé)</text>

  <text x="155" y="365" font-family="monospace" font-size="10" fill="#996633" text-anchor="middle">~1 TWh / an</text>
  <text x="155" y="382" font-family="monospace" font-size="9" fill="#664422" text-anchor="middle">consommation datacenter IA</text>

  <!-- Cost breakdown pills -->
  <rect x="50" y="398" width="98" height="22" rx="11" fill="#1a0a00" stroke="#ff6b00" stroke-width="1" opacity="0.7"/>
  <text x="99" y="413" font-family="monospace" font-size="9" fill="#ff8844" text-anchor="middle">Compute</text>

  <rect x="158" y="398" width="98" height="22" rx="11" fill="#1a0a00" stroke="#cc4400" stroke-width="1" opacity="0.7"/>
  <text x="207" y="413" font-family="monospace" font-size="9" fill="#cc6622" text-anchor="middle">Electricité</text>

  <rect x="50" y="428" width="206" height="22" rx="11" fill="#1a0a00" stroke="#884400" stroke-width="1" opacity="0.6"/>
  <text x="153" y="443" font-family="monospace" font-size="9" fill="#996633" text-anchor="middle">Refroidissement + Maintenance</text>

  <!-- Section label -->
  <text x="155" y="480" font-family="monospace" font-size="16" fill="#ff6b00" text-anchor="middle" font-weight="bold" opacity="0.9">AUJOURD'HUI</text>
  <text x="155" y="500" font-family="monospace" font-size="10" fill="#664422" text-anchor="middle">IA = énergie</text>

  <!-- Divider -->
  <line x1="310" y1="80" x2="310" y2="560" stroke="#1e2a3a" stroke-width="1"/>

  <!-- CENTER: Arrow + x1000 reduction -->
  <text x="600" y="95" font-family="monospace" font-size="13" fill="#8b9cbf" text-anchor="middle" letter-spacing="3">UNCONVENTIONAL AI</text>
  <text x="600" y="118" font-family="monospace" font-size="10" fill="#445577" text-anchor="middle">Naveen Rao, ex-Chief AI Databricks - 2026</text>

  <!-- Big reduction arrow -->
  <line x1="340" y1="290" x2="530" y2="290" stroke="#334466" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Central x1000 badge -->
  <circle cx="600" cy="290" r="75" fill="#051020" stroke="#4a8fff" stroke-width="1.5" opacity="0.9"/>
  <circle cx="600" cy="290" r="70" fill="none" stroke="#4a8fff" stroke-width="0.5" opacity="0.3"/>
  <text x="600" y="272" font-family="monospace" font-size="13" fill="#6a9fff" text-anchor="middle" opacity="0.7">réduction</text>
  <text x="600" y="305" font-family="monospace" font-size="42" fill="#ffffff" text-anchor="middle" font-weight="bold" filter="url(#glow-filter)">÷1000</text>
  <text x="600" y="332" font-family="monospace" font-size="11" fill="#4a8fff" text-anchor="middle">consommation</text>

  <!-- Architecture label below -->
  <rect x="510" y="395" width="180" height="26" rx="4" fill="#051020" stroke="#4a8fff" stroke-width="1" opacity="0.8"/>
  <text x="600" y="413" font-family="monospace" font-size="10" fill="#4a8fff" text-anchor="middle">Architecture oscillateurs</text>

  <rect x="510" y="428" width="180" height="26" rx="4" fill="#051020" stroke="#334466" stroke-width="1" opacity="0.6"/>
  <text x="600" y="446" font-family="monospace" font-size="10" fill="#6a7aaa" text-anchor="middle">Modèle Un-0 · génération img</text>

  <!-- Arrow center -> right -->
  <line x1="670" y1="290" x2="860" y2="290" stroke="#00c87a" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Divider right -->
  <line x1="890" y1="80" x2="890" y2="560" stroke="#1e2a3a" stroke-width="1"/>

  <!-- RIGHT PANEL: Le futur - IA démocratisée -->
  <text x="1045" y="115" font-family="monospace" font-size="11" fill="#00a060" text-anchor="middle" letter-spacing="2">IA DÉMOCRATISÉE</text>

  <!-- New chip / oscillator representation -->
  <rect x="975" y="130" width="140" height="100" rx="8" fill="#051810" stroke="#00c87a" stroke-width="1.5" opacity="0.9"/>
  <text x="1045" y="155" font-family="monospace" font-size="11" fill="#00c87a" text-anchor="middle" font-weight="bold">PUCE OSCILLATEUR</text>
  <line x1="990" y1="165" x2="1130" y2="165" stroke="#00c87a" stroke-width="0.5" opacity="0.3"/>
  <!-- Oscillator wave pattern -->
  <path d="M 995 195 Q 1005 175 1015 195 Q 1025 215 1035 195 Q 1045 175 1055 195 Q 1065 215 1075 195 Q 1085 175 1095 195 Q 1105 215 1115 195 Q 1125 175 1130 195" fill="none" stroke="#00c87a" stroke-width="1.8" opacity="0.8"/>
  <text x="1045" y="222" font-family="monospace" font-size="9" fill="#007a48" text-anchor="middle">inférence physique</text>

  <!-- Green lightning = low energy -->
  <polygon points="1045,248 1032,272 1041,272 1028,296 1058,266 1048,266" fill="#00c87a" opacity="0.8" filter="url(#glow-filter)"/>

  <!-- Future cost labels -->
  <text x="1045" y="322" font-family="monospace" font-size="12" fill="#00e890" text-anchor="middle" font-weight="bold">Coûts ÷ 1000</text>
  <text x="1045" y="342" font-family="monospace" font-size="9" fill="#007a48" text-anchor="middle">inférence accessible à tous</text>

  <text x="1045" y="367" font-family="monospace" font-size="10" fill="#00a060" text-anchor="middle">Pas de datacenter géant</text>
  <text x="1045" y="384" font-family="monospace" font-size="9" fill="#006040" text-anchor="middle">edge computing · on-device</text>

  <!-- Future pills -->
  <rect x="940" y="398" width="90" height="22" rx="11" fill="#051810" stroke="#00c87a" stroke-width="1" opacity="0.7"/>
  <text x="985" y="413" font-family="monospace" font-size="9" fill="#00c87a" text-anchor="middle">Startups</text>

  <rect x="1040" y="398" width="110" height="22" rx="11" fill="#051810" stroke="#00a060" stroke-width="1" opacity="0.7"/>
  <text x="1095" y="413" font-family="monospace" font-size="9" fill="#00a060" text-anchor="middle">Pays émergents</text>

  <rect x="940" y="428" width="210" height="22" rx="11" fill="#051810" stroke="#007a48" stroke-width="1" opacity="0.6"/>
  <text x="1045" y="443" font-family="monospace" font-size="9" fill="#007a48" text-anchor="middle">Fin du monopole Big Tech IA</text>

  <!-- Section label -->
  <text x="1045" y="480" font-family="monospace" font-size="16" fill="#00c87a" text-anchor="middle" font-weight="bold" opacity="0.9">DEMAIN</text>
  <text x="1045" y="500" font-family="monospace" font-size="10" fill="#006040" text-anchor="middle">IA = oscillateurs</text>

  <!-- Bottom title band -->
  <rect x="0" y="555" width="1200" height="75" fill="#050810" opacity="0.9"/>
  <line x1="0" y1="555" x2="1200" y2="555" stroke="#1e2a3a" stroke-width="1"/>
  <text x="600" y="598" font-family="Georgia, serif" font-size="22" fill="#c0cadf" text-anchor="middle" font-weight="bold">L'énergie sera le défi fondamental de l'IA</text>
  <text x="600" y="622" font-family="monospace" font-size="11" fill="#445577" text-anchor="middle">Source : TechCrunch - Naveen Rao, Unconventional AI, juin 2026</text>
</svg>
