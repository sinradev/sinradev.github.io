  <line x1="288" y1="374" x2="288" y2="368" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="392" y1="374" x2="392" y2="368" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="496" y1="374" x2="496" y2="368" stroke="#ec4899" stroke-width="1.5" opacity="0.5"/>

