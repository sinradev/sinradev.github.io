  <rect x="352" y="200" width="80" height="22" rx="3" fill="#22c55e" opacity="0.15"/>
  <rect x="352" y="228" width="80" height="22" rx="3" fill="#22c55e" opacity="0.1"/>
  <rect x="352" y="256" width="80" height="22" rx="3" fill="#22c55e" opacity="0.08"/>
  <rect x="352" y="284" width="80" height="22" rx="3" fill="#22c55e" opacity="0.06"/>
  <rect x="352" y="312" width="80" height="34" rx="3" fill="#22c55e" opacity="0.18"/>
  <text x="392" y="333" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#22c55e" opacity="0.7">API</text>

