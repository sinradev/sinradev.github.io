  <rect x="0" y="414" width="1200" height="2" fill="#f97316" opacity="0.6"/>

  <!-- Main title -->
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="54" font-weight="bold" text-anchor="middle" fill="#f8f8f2">Modular Monolith</text>

  <!-- Subtitle -->
  <text x="600" y="535" font-family="Arial, sans-serif" font-size="26" font-weight="normal" text-anchor="middle" fill="#c792e9">Vertical Slice Architecture</text>

  <!-- Tagline -->
  <text x="600" y="578" font-family="Arial, sans-serif" font-size="19" font-weight="normal" text-anchor="middle" fill="#8b9cbf">L'architecture que tout le monde redécouvre</text>

  <!-- Branding -->
  <text x="1150" y="610" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="end" fill="#f97316" opacity="0.6">sinra.app</text>
