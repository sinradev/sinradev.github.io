  <rect x="700" y="140" width="180" height="34" rx="17" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <text x="790" y="162" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#6366f1" opacity="0.9">domain-first</text>

  <rect x="700" y="190" width="210" height="34" rx="17" fill="#f97316" opacity="0.12"/>
  <rect x="700" y="190" width="210" height="34" rx="17" fill="none" stroke="#f97316" stroke-width="1" opacity="0.4"/>
  <text x="805" y="212" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#f97316" opacity="0.9">vertical slice</text>

  <rect x="700" y="240" width="195" height="34" rx="17" fill="#22c55e" opacity="0.12"/>
  <rect x="700" y="240" width="195" height="34" rx="17" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
  <text x="797" y="262" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#22c55e" opacity="0.9">package by feature</text>

  <rect x="700" y="290" width="175" height="34" rx="17" fill="#ec4899" opacity="0.12"/>
  <rect x="700" y="290" width="175" height="34" rx="17" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.4"/>
  <text x="787" y="312" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#ec4899" opacity="0.9">bounded context</text>

  <rect x="700" y="340" width="165" height="34" rx="17" fill="#f59e0b" opacity="0.12"/>
  <rect x="700" y="340" width="165" height="34" rx="17" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <text x="782" y="362" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#f59e0b" opacity="0.9">1 seul déploiement</text>

