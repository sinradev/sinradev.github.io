  <circle cx="288" cy="374" r="3" fill="#f97316" opacity="0.7"/>
  <circle cx="392" cy="374" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="496" cy="374" r="3" fill="#ec4899" opacity="0.7"/>

