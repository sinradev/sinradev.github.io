<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141824;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad1)"/>

  <!-- Decorative elements -->
  <circle cx="150" cy="150" r="100" fill="#a6f079" opacity="0.06"/>
  <circle cx="1050" cy="480" r="140" fill="#8b5cf6" opacity="0.07"/>
  <circle cx="600" cy="80" r="60" fill="#c792e9" opacity="0.05"/>

  <!-- Top accent line -->
  <rect x="0" y="72" width="1200" height="3" fill="#a6f079" opacity="0.5"/>

  <!-- Title band -->
  <rect x="0" y="400" width="1200" height="230" fill="#0a0f1a" opacity="0.85"/>
  <rect x="0" y="399" width="1200" height="2" fill="#a6f079" opacity="0.6"/>

  <!-- KISS label -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="120" font-weight="bold" text-anchor="middle" fill="#a6f079" opacity="0.15">KISS</text>

  <!-- Main title -->
  <text x="600" y="470" font-family="Arial, sans-serif" font-size="64" font-weight="bold" text-anchor="middle" fill="#a6f079">KISS</text>

  <!-- Subtitle -->
  <text x="600" y="524" font-family="Arial, sans-serif" font-size="30" font-weight="normal" text-anchor="middle" fill="#c792e9">Keep It Simple, Stupid</text>

  <!-- Tagline -->
  <text x="600" y="566" font-family="Arial, sans-serif" font-size="20" font-weight="normal" text-anchor="middle" fill="#8b9cbf">Le principe que les entreprises tech oublient</text>

  <!-- Branding -->
  <text x="1140" y="610" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="end" fill="#a6f079" opacity="0.6">sinra.app</text>
</svg>
