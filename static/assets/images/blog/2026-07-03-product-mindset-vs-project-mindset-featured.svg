<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1320;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b9cbf" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Divider -->
  <line x1="600" y1="60" x2="600" y2="570" stroke="#2a3560" stroke-width="1" opacity="0.6" stroke-dasharray="6,4"/>

  <!-- LEFT: PROJECT MINDSET -->
  <text x="300" y="95" font-family="monospace" font-size="16" fill="#ff6b6b" text-anchor="middle" letter-spacing="3">PROJECT</text>

  <!-- Timeline: straight line start to end -->
  <line x1="80" y1="200" x2="500" y2="200" stroke="#ff6b6b" stroke-width="2.5" opacity="0.8"/>

  <!-- Start dot -->
  <circle cx="80" cy="200" r="8" fill="#ff6b6b" opacity="0.9"/>
  <text x="80" y="230" font-family="monospace" font-size="11" fill="#ff6b6b" text-anchor="middle">START</text>

  <!-- Milestones -->
  <circle cx="200" cy="200" r="5" fill="#cc4444" opacity="0.7"/>
  <line x1="200" y1="200" x2="200" y2="165" stroke="#cc4444" stroke-width="1" opacity="0.5"/>
  <text x="200" y="158" font-family="monospace" font-size="9" fill="#cc4444" text-anchor="middle">Milestone 1</text>

  <circle cx="340" cy="200" r="5" fill="#cc4444" opacity="0.7"/>
  <line x1="340" y1="200" x2="340" y2="165" stroke="#cc4444" stroke-width="1" opacity="0.5"/>
  <text x="340" y="158" font-family="monospace" font-size="9" fill="#cc4444" text-anchor="middle">Milestone 2</text>

  <!-- End flag -->
  <circle cx="500" cy="200" r="8" fill="#ff6b6b" opacity="0.9"/>
  <line x1="500" y1="192" x2="500" y2="155" stroke="#ff6b6b" stroke-width="2"/>
  <polygon points="500,155 530,165 500,175" fill="#ff6b6b" opacity="0.8"/>
  <text x="500" y="230" font-family="monospace" font-size="11" fill="#ff6b6b" text-anchor="middle">DONE</text>

  <!-- Project criteria -->
  <rect x="80" y="270" width="460" height="200" rx="8" fill="#1e1a28" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>
  <text x="105" y="300" font-family="monospace" font-size="11" fill="#ff6b6b">Critères de succès :</text>
  <line x1="100" y1="310" x2="520" y2="310" stroke="#ff6b6b" stroke-width="0.5" opacity="0.2"/>

  <text x="105" y="335" font-family="monospace" font-size="11" fill="#7a3040">✓  Livré dans les temps</text>
  <text x="105" y="358" font-family="monospace" font-size="11" fill="#7a3040">✓  Dans le budget</text>
  <text x="105" y="381" font-family="monospace" font-size="11" fill="#7a3040">✓  Périmètre respecté</text>
  <text x="105" y="404" font-family="monospace" font-size="11" fill="#4a2030">✗  Valeur pour l'utilisateur ?</text>
  <text x="105" y="427" font-family="monospace" font-size="11" fill="#4a2030">✗  Fonctionnalité utilisée ?</text>
  <text x="105" y="450" font-family="monospace" font-size="11" fill="#4a2030">✗  Apprentissage ?</text>

  <!-- RIGHT: PRODUCT MINDSET -->
  <text x="900" y="95" font-family="monospace" font-size="16" fill="#a6f079" text-anchor="middle" letter-spacing="3">PRODUCT</text>

  <!-- Continuous loop: releases as a cycle -->
  <!-- Release arcs -->
  <ellipse cx="900" cy="215" rx="190" ry="70" fill="none" stroke="#a6f079" stroke-width="2" opacity="0.25" stroke-dasharray="4,3"/>

  <!-- Release markers on the loop -->
  <!-- v1 -->
  <circle cx="720" cy="215" r="22" fill="#1a2a1a" stroke="#a6f079" stroke-width="1.5" opacity="0.85"/>
  <text x="720" y="212" font-family="monospace" font-size="10" fill="#a6f079" text-anchor="middle">v1</text>
  <text x="720" y="226" font-family="monospace" font-size="8" fill="#6a9060" text-anchor="middle">ship</text>

  <!-- arrow v1 -> v2 -->
  <path d="M 742 205 Q 810 155 858 195" fill="none" stroke="#a6f079" stroke-width="1.5" opacity="0.6" marker-end="url(#arr)"/>

  <!-- v2 -->
  <circle cx="880" cy="195" r="22" fill="#1a2a1a" stroke="#a6f079" stroke-width="1.5" opacity="0.85"/>
  <text x="880" y="192" font-family="monospace" font-size="10" fill="#a6f079" text-anchor="middle">v2</text>
  <text x="880" y="206" font-family="monospace" font-size="8" fill="#6a9060" text-anchor="middle">learn</text>

  <!-- arrow v2 -> v3 -->
  <path d="M 902 205 Q 950 240 942 248" fill="none" stroke="#a6f079" stroke-width="1.5" opacity="0.6" marker-end="url(#arr)"/>

  <!-- v3 -->
  <circle cx="940" cy="268" r="22" fill="#1a2a1a" stroke="#a6f079" stroke-width="1.5" opacity="0.85"/>
  <text x="940" y="265" font-family="monospace" font-size="10" fill="#a6f079" text-anchor="middle">v3</text>
  <text x="940" y="279" font-family="monospace" font-size="8" fill="#6a9060" text-anchor="middle">adjust</text>

  <!-- arrow v3 -> v4 -->
  <path d="M 920 278 Q 870 295 820 268" fill="none" stroke="#a6f079" stroke-width="1.5" opacity="0.6" marker-end="url(#arr)"/>

  <!-- v4 -->
  <circle cx="798" cy="258" r="22" fill="#1a2a1a" stroke="#a6f079" stroke-width="1.5" opacity="0.85"/>
  <text x="798" y="255" font-family="monospace" font-size="10" fill="#a6f079" text-anchor="middle">v4</text>
  <text x="798" y="269" font-family="monospace" font-size="8" fill="#6a9060" text-anchor="middle">iterate</text>

  <!-- arrow back to v1 area -->
  <path d="M 778 248 Q 740 238 718 236" fill="none" stroke="#a6f079" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a6f079" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Product criteria -->
  <rect x="660" y="320" width="460" height="200" rx="8" fill="#1a2a1a" stroke="#a6f079" stroke-width="1" opacity="0.5"/>
  <text x="685" y="350" font-family="monospace" font-size="11" fill="#a6f079">Critères de succès :</text>
  <line x1="680" y1="360" x2="1100" y2="360" stroke="#a6f079" stroke-width="0.5" opacity="0.2"/>

  <text x="685" y="385" font-family="monospace" font-size="11" fill="#507060">✓  Valeur créée pour l'utilisateur</text>
  <text x="685" y="408" font-family="monospace" font-size="11" fill="#507060">✓  Fonctionnalité adoptée</text>
  <text x="685" y="431" font-family="monospace" font-size="11" fill="#507060">✓  Hypothèses validées ou infirmées</text>
  <text x="685" y="454" font-family="monospace" font-size="11" fill="#507060">✓  Apprentissage intégré</text>
  <text x="685" y="477" font-family="monospace" font-size="11" fill="#507060">✓  Amélioration continue</text>

  <!-- Bottom title -->
  <text x="600" y="555" font-family="Georgia, serif" font-size="24" fill="#e0e8ff" text-anchor="middle" opacity="0.9">Optimiser la livraison - ou optimiser la valeur</text>
</svg>
