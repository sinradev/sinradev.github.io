  <rect x="80" y="222" width="130" height="52" rx="8" fill="#1e2d45" stroke="#3b5278" stroke-width="1.5"/>
  <text x="145" y="243" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#7dd3fc">DEV</text>
  <text x="145" y="260" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#94a3b8">feature terminée</text>

