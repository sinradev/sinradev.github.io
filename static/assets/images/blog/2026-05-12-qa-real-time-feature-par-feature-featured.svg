  <rect x="295" y="416" width="12" height="12" rx="2" fill="#fb923c" opacity="0.8"/>
  <text x="312" y="426" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Export images</text>

  <!-- Testings -->
