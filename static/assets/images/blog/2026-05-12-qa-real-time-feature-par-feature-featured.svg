  <text x="856" y="115" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#64748b">retrouver le contexte</text>

  <!-- Node 4: Fix long -->
  <rect x="951" y="70" width="140" height="52" rx="8" fill="#2d1515" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="1021" y="91" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#ef4444">FIX</text>
  <text x="1021" y="108" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#94a3b8">contexte perdu</text>

