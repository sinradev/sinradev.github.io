  <text x="1092" y="282" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fca5a5">✗ Décisions</text>
  <text x="1092" y="296" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fca5a5">✗ Edge cases</text>
