  <rect x="620" y="418" width="185" height="8" rx="4" fill="#1e2d45"/>
  <rect x="620" y="418" width="123" height="8" rx="4" fill="#22c55e" opacity="0.8"/>

  <text x="620" y="445" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Bugs ouverts</text>
