  <text x="165" y="462" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">✓ Rapport 50p</text>
  <text x="260" y="462" font-family="Arial, sans-serif" font-size="10" fill="#fb923c">⚠ Rapport 200p</text>
