<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1220;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14532d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient glows -->
  <circle cx="200" cy="160" r="200" fill="#dc2626" opacity="0.04"/>
  <circle cx="1000" cy="200" r="200" fill="#16a34a" opacity="0.05"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- TOP SECTION LABEL -->
  <!-- ═══════════════════════════════════════ -->
  <text x="80" y="58" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ef4444" opacity="0.9" letter-spacing="2">SANS QA EN TEMPS RÉEL</text>

  <!-- ── BAD TIMELINE (top) ── -->
  <!-- Node 1: Dev fini -->
  <rect x="80" y="70" width="130" height="52" rx="8" fill="#1e2d45" stroke="#3b5278" stroke-width="1.5"/>
  <text x="145" y="91" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#7dd3fc">DEV</text>
  <text x="145" y="108" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#94a3b8">feature terminée</text>

  <!-- Long wait arrow -->
  <line x1="212" y1="96" x2="395" y2="96" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)" opacity="0.8"/>
  <text x="302" y="88" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ef4444" opacity="0.9">2-3 semaines</text>
  <text x="302" y="115" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#64748b">contexte oublié...</text>

  <!-- Node 2: QA teste -->
  <rect x="397" y="70" width="130" height="52" rx="8" fill="#1e2d45" stroke="#3b5278" stroke-width="1.5"/>
  <text x="462" y="91" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#c4b5fd">QA</text>
  <text x="462" y="108" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#94a3b8">teste en urgence</text>

  <!-- Bug found arrow -->
  <line x1="529" y1="96" x2="632" y2="96" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)" opacity="0.8"/>

  <!-- Node 3: Bug trouvé -->
  <rect x="634" y="70" width="130" height="52" rx="8" fill="#2d1515" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="699" y="91" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#ef4444">BUG</text>
  <text x="699" y="108" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#94a3b8">remonté au dev</text>

