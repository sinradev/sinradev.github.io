  <rect x="951" y="134" width="140" height="24" rx="4" fill="#7f1d1d" opacity="0.6"/>
  <text x="1021" y="151" font-family="Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#fca5a5">⏱ 2-4h de débogage</text>

