<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/><stop offset="60%" stop-color="#0a0f1a"/><stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.15"/><stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#c792e9" stop-opacity="0.10"/><stop offset="100%" stop-color="#c792e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- 3 phases -->
  <!-- Water phase -->
  <rect x="20" y="150" width="120" height="280" rx="8" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="80" y="268" text-anchor="middle" font-size="22" fill="#a6f079" font-weight="800" opacity="0.8">W</text>
  <text x="80" y="300" text-anchor="middle" font-size="11" fill="#a6f079" font-weight="600">Water</text>
  <text x="80" y="318" text-anchor="middle" font-size="9" fill="#8b9cbf" opacity="0.8">Cadrage</text>
  <text x="80" y="333" text-anchor="middle" font-size="9" fill="#8b9cbf" opacity="0.8">Budget</text>
  <text x="80" y="348" text-anchor="middle" font-size="9" fill="#8b9cbf" opacity="0.8">Contrats</text>

  <!-- Arrow -->
  <line x1="142" y1="290" x2="158" y2="290" stroke="#a6f079" stroke-opacity="0.5" stroke-width="2"/>
  <polygon points="155,284 165,290 155,296" fill="#a6f079" fill-opacity="0.5"/>

  <!-- Scrum phase -->
  <rect x="162" y="150" width="120" height="280" rx="8" fill="#c792e9" fill-opacity="0.10" stroke="#c792e9" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="222" y="268" text-anchor="middle" font-size="22" fill="#c792e9" font-weight="800" opacity="0.8">S</text>
  <text x="222" y="300" text-anchor="middle" font-size="11" fill="#c792e9" font-weight="600">Scrum</text>
  <text x="222" y="318" text-anchor="middle" font-size="9" fill="#8b9cbf" opacity="0.8">Sprints</text>
  <text x="222" y="333" text-anchor="middle" font-size="9" fill="#8b9cbf" opacity="0.8">Backlog</text>
  <text x="222" y="348" text-anchor="middle" font-size="9" fill="#8b9cbf" opacity="0.8">Itératif</text>

  <!-- Arrow -->
  <line x1="284" y1="290" x2="300" y2="290" stroke="#c792e9" stroke-opacity="0.5" stroke-width="2"/>
  <polygon points="297,284 307,290 297,296" fill="#c792e9" fill-opacity="0.5"/>

  <!-- Fall phase -->
  <rect x="304" y="150" width="110" height="280" rx="8" fill="#ff6b9d" fill-opacity="0.07" stroke="#ff6b9d" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="359" y="268" text-anchor="middle" font-size="22" fill="#ff6b9d" font-weight="800" opacity="0.8">F</text>
  <text x="359" y="300" text-anchor="middle" font-size="11" fill="#ff6b9d" font-weight="600">Fall</text>
  <text x="359" y="318" text-anchor="middle" font-size="9" fill="#8b9cbf" opacity="0.8">Déploiement</text>
  <text x="359" y="333" text-anchor="middle" font-size="9" fill="#8b9cbf" opacity="0.8">CAB</text>
  <text x="359" y="348" text-anchor="middle" font-size="9" fill="#8b9cbf" opacity="0.8">Recette</text>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">HYBRIDE · RÉALITÉ EN ENTREPRISE</text>
  <text x="500" y="262" font-size="46" font-weight="800" fill="#f8fafc" letter-spacing="-2">Water-</text>
  <text x="500" y="320" font-size="46" font-weight="800" letter-spacing="-2"><tspan fill="#c792e9">Scrum</tspan><tspan fill="#f8fafc">-Fall</tspan></text>
  <text x="500" y="370" font-size="16" fill="#475569">Le modèle hybride dominant en grande entreprise</text>
  <line x1="500" y1="395" x2="850" y2="395" stroke="#1e293b" stroke-width="1"/>
  <g><rect x="500" y="410" width="80" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
  <text x="540" y="429" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">Cadrage</text></g>
  <g><rect x="592" y="410" width="72" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
  <text x="628" y="429" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">Sprints</text></g>
  <g><rect x="676" y="410" width="96" height="28" rx="14" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.35"/>
  <text x="724" y="429" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="600" letter-spacing="0.5">Déploiement</text></g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
