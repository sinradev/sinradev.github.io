<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1320;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b9cbf" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Myth: one giant person -->
  <text x="280" y="100" font-family="monospace" font-size="14" fill="#ff6b6b" opacity="0.7" text-anchor="middle">Le mythe</text>

  <!-- Giant developer silhouette -->
  <circle cx="280" cy="195" r="55" fill="#2a1020" stroke="#ff6b6b" stroke-width="2" opacity="0.7"/>
  <text x="280" y="202" font-family="monospace" font-size="16" fill="#ff6b6b" text-anchor="middle">10x</text>
  <!-- Body -->
  <rect x="230" y="250" width="100" height="130" rx="10" fill="#2a1020" stroke="#ff6b6b" stroke-width="1.5" opacity="0.5"/>
  <!-- Glow -->
  <circle cx="280" cy="195" r="80" fill="#ff6b6b" opacity="0.04"/>

  <!-- Small devs beneath (trampled) -->
  <circle cx="140" cy="390" r="22" fill="#1e1525" stroke="#5a3040" stroke-width="1"/>
  <text x="140" y="396" font-family="monospace" font-size="9" fill="#5a3040" text-anchor="middle">dev</text>
  <circle cx="200" cy="395" r="22" fill="#1e1525" stroke="#5a3040" stroke-width="1"/>
  <text x="200" y="401" font-family="monospace" font-size="9" fill="#5a3040" text-anchor="middle">dev</text>
  <circle cx="330" cy="388" r="22" fill="#1e1525" stroke="#5a3040" stroke-width="1"/>
  <text x="330" y="394" font-family="monospace" font-size="9" fill="#5a3040" text-anchor="middle">dev</text>
  <circle cx="390" cy="393" r="22" fill="#1e1525" stroke="#5a3040" stroke-width="1"/>
  <text x="390" y="399" font-family="monospace" font-size="9" fill="#5a3040" text-anchor="middle">dev</text>

  <text x="280" y="475" font-family="monospace" font-size="11" fill="#ff6b6b" opacity="0.6" text-anchor="middle">héros individuel · silos · toxicité</text>

  <!-- vs -->
  <text x="600" y="300" font-family="Georgia, serif" font-size="30" fill="#3a4570" text-anchor="middle">vs</text>

  <!-- Reality: team -->
  <text x="900" y="100" font-family="monospace" font-size="14" fill="#a6f079" opacity="0.7" text-anchor="middle">La réalité</text>

  <!-- Team of equal devs -->
  <circle cx="780" cy="230" r="35" fill="#1a2a1a" stroke="#a6f079" stroke-width="1.5"/>
  <text x="780" y="237" font-family="monospace" font-size="11" fill="#a6f079" text-anchor="middle">Dev A</text>

  <circle cx="860" cy="195" r="35" fill="#1a2a1a" stroke="#a6f079" stroke-width="1.5"/>
  <text x="860" y="202" font-family="monospace" font-size="11" fill="#a6f079" text-anchor="middle">Dev B</text>

  <circle cx="940" cy="230" r="35" fill="#1a2a1a" stroke="#a6f079" stroke-width="1.5"/>
  <text x="940" y="237" font-family="monospace" font-size="11" fill="#a6f079" text-anchor="middle">Dev C</text>

  <circle cx="820" cy="300" r="35" fill="#1a2a1a" stroke="#a6f079" stroke-width="1.5"/>
  <text x="820" y="307" font-family="monospace" font-size="11" fill="#a6f079" text-anchor="middle">Dev D</text>

  <circle cx="900" cy="300" r="35" fill="#1a2a1a" stroke="#a6f079" stroke-width="1.5"/>
  <text x="900" y="307" font-family="monospace" font-size="11" fill="#a6f079" text-anchor="middle">Dev E</text>

  <!-- Connection lines -->
  <line x1="815" y1="230" x2="825" y2="230" stroke="#a6f079" stroke-width="1.5" opacity="0.4"/>
  <line x1="860" y1="228" x2="860" y2="262" stroke="#a6f079" stroke-width="1.5" opacity="0.4"/>
  <line x1="895" y1="230" x2="865" y2="300" stroke="#a6f079" stroke-width="1.5" opacity="0.4"/>
  <line x1="845" y1="300" x2="865" y2="300" stroke="#a6f079" stroke-width="1.5" opacity="0.4"/>

  <!-- Team output -->
  <rect x="740" y="370" width="320" height="60" rx="8" fill="#1a3020" stroke="#a6f079" stroke-width="1"/>
  <text x="900" y="396" font-family="monospace" font-size="12" fill="#a6f079" text-anchor="middle">Productivité = propriété</text>
  <text x="900" y="416" font-family="monospace" font-size="12" fill="#a6f079" text-anchor="middle">d'équipe, pas individuelle</text>

  <text x="900" y="475" font-family="monospace" font-size="11" fill="#4a7050" opacity="0.8" text-anchor="middle">contexte · outils · culture · confiance</text>

  <text x="600" y="555" font-family="Georgia, serif" font-size="25" fill="#e0e8ff" text-anchor="middle" opacity="0.9">Les meilleures équipes n'ont pas les meilleurs individus</text>
</svg>
