<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/><stop offset="60%" stop-color="#0a0f1a"/><stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.14"/><stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#c792e9" stop-opacity="0.12"/><stop offset="100%" stop-color="#c792e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- Crystal gem shape - 4 facets -->
  <!-- Top facet -->
  <polygon points="215,120 160,220 270,220" fill="#a6f079" fill-opacity="0.12" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- Left facet -->
  <polygon points="160,220 80,330 215,290" fill="#c792e9" fill-opacity="0.09" stroke="#c792e9" stroke-width="1.2" stroke-opacity="0.6"/>
  <!-- Right facet -->
  <polygon points="270,220 215,290 350,330" fill="#6ecf00" fill-opacity="0.09" stroke="#6ecf00" stroke-width="1.2" stroke-opacity="0.6"/>
  <!-- Bottom facet -->
  <polygon points="80,330 215,290 350,330 215,430" fill="#ff6b9d" fill-opacity="0.07" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Center glow -->
  <circle cx="215" cy="290" r="18" fill="#a6f079" fill-opacity="0.25" filter="url(#glow)"/>
  <circle cx="215" cy="290" r="7" fill="#a6f079" filter="url(#glow)"/>

  <!-- Crystal labels -->
  <text x="215" y="178" text-anchor="middle" font-size="9" fill="#a6f079" font-weight="700">Clear</text>
  <text x="125" y="285" text-anchor="end" font-size="9" fill="#c792e9" font-weight="700">Yellow</text>
  <text x="305" y="285" font-size="9" fill="#6ecf00" font-weight="700">Orange</text>
  <text x="215" y="430" text-anchor="middle" font-size="9" fill="#ff6b9d" font-weight="700">Red</text>

  <!-- Scale label -->
  <text x="215" y="490" text-anchor="middle" font-size="10" fill="#8b9cbf" opacity="0.7">Taille équipe · criticité projet</text>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">FAMILLE AGILE · LÉGÈRETÉ</text>
  <text x="500" y="268" font-size="58" font-weight="800" fill="#f8fafc" letter-spacing="-2">Crystal</text>
  <text x="500" y="330" font-size="26" font-weight="700" fill="#8b9cbf">Methods</text>
  <text x="500" y="375" font-size="15" fill="#475569">Adaptée à la taille et à la criticité du projet</text>
  <line x1="500" y1="398" x2="850" y2="398" stroke="#1e293b" stroke-width="1"/>
  <g><rect x="500" y="413" width="56" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
  <text x="528" y="432" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">Clear</text></g>
  <g><rect x="568" y="413" width="64" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
  <text x="600" y="432" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">Yellow</text></g>
  <g><rect x="644" y="413" width="72" height="28" rx="14" fill="#6ecf00" fill-opacity="0.08" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.35"/>
  <text x="680" y="432" text-anchor="middle" font-size="10" fill="#6ecf00" font-weight="600" letter-spacing="0.5">Orange</text></g>
  <g><rect x="728" y="413" width="48" height="28" rx="14" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.35"/>
  <text x="752" y="432" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="600" letter-spacing="0.5">Red</text></g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
