<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/><stop offset="60%" stop-color="#0a0f1a"/><stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.15"/><stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.10"/><stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- PDCA circle -->
  <!-- P - Plan -->
  <path d="M215,290 L215,175 A115,115 0 0,1 330,290 Z" fill="#a6f079" fill-opacity="0.12" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="263" y="230" text-anchor="middle" font-size="13" fill="#a6f079" font-weight="700">P</text>
  <text x="263" y="248" text-anchor="middle" font-size="9" fill="#a6f079" opacity="0.8">Plan</text>

  <!-- D - Do -->
  <path d="M215,290 L330,290 A115,115 0 0,1 215,405 Z" fill="#c792e9" fill-opacity="0.10" stroke="#c792e9" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="275" y="358" text-anchor="middle" font-size="13" fill="#c792e9" font-weight="700">D</text>
  <text x="275" y="375" text-anchor="middle" font-size="9" fill="#c792e9" opacity="0.8">Do</text>

  <!-- C - Check -->
  <path d="M215,290 L215,405 A115,115 0 0,1 100,290 Z" fill="#6ecf00" fill-opacity="0.08" stroke="#6ecf00" stroke-width="1.5" stroke-opacity="0.45"/>
  <text x="163" y="358" text-anchor="middle" font-size="13" fill="#6ecf00" font-weight="700">C</text>
  <text x="163" y="375" text-anchor="middle" font-size="9" fill="#6ecf00" opacity="0.8">Check</text>

  <!-- A - Act -->
  <path d="M215,290 L100,290 A115,115 0 0,1 215,175 Z" fill="#ff6b9d" fill-opacity="0.07" stroke="#ff6b9d" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="163" y="230" text-anchor="middle" font-size="13" fill="#ff6b9d" font-weight="700">A</text>
  <text x="163" y="248" text-anchor="middle" font-size="9" fill="#ff6b9d" opacity="0.8">Act</text>

  <!-- Center -->
  <circle cx="215" cy="290" r="20" fill="#0a0f1a" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="215" y="295" text-anchor="middle" font-size="9" fill="#a6f079" font-weight="700">TQM</text>

  <!-- Rotation arrow hint -->
  <path d="M215,155 Q345,175 355,290" fill="none" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="4,3"/>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">QUALITÉ · CULTURE</text>
  <text x="500" y="262" font-size="56" font-weight="800" fill="#f8fafc" letter-spacing="-2">TQM</text>
  <text x="500" y="325" font-size="20" font-weight="600" fill="#8b9cbf">Total Quality</text>
  <text x="500" y="355" font-size="20" font-weight="600"><tspan fill="#a6f079">Management</tspan></text>
  <text x="500" y="395" font-size="16" fill="#475569">La qualité est la responsabilité de tous</text>
  <line x1="500" y1="420" x2="850" y2="420" stroke="#1e293b" stroke-width="1"/>
  <g><rect x="500" y="435" width="72" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
  <text x="536" y="454" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">PDCA</text></g>
  <g><rect x="584" y="435" width="80" height="28" rx="14" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.35"/>
  <text x="624" y="454" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="600" letter-spacing="0.5">Deming</text></g>
  <g><rect x="676" y="435" width="96" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
  <text x="724" y="454" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">Kaizen</text></g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
