<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1320;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b9cbf" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- SAFe pyramid -->
  <!-- Portfolio level -->
  <polygon points="600,90 320,200 880,200" fill="#1e1a30" stroke="#c792e9" stroke-width="1.5" opacity="0.7"/>
  <text x="600" y="158" font-family="monospace" font-size="12" fill="#c792e9" text-anchor="middle">PORTFOLIO</text>
  <text x="600" y="175" font-family="monospace" font-size="9" fill="#5a3080" text-anchor="middle">Epics · Value Streams · Budgets</text>

  <!-- Large Solution level -->
  <rect x="240" y="200" width="720" height="75" fill="#1e2040" stroke="#c792e9" stroke-width="1.5" opacity="0.5"/>
  <text x="600" y="231" font-family="monospace" font-size="12" fill="#9080c0" text-anchor="middle">LARGE SOLUTION</text>
  <text x="600" y="252" font-family="monospace" font-size="9" fill="#4a4080" text-anchor="middle">Solution Train · Architect · Management · Suppliers</text>

  <!-- ART level -->
  <rect x="160" y="275" width="880" height="75" fill="#1e2545" stroke="#64b5f6" stroke-width="1.5" opacity="0.6"/>
  <text x="600" y="306" font-family="monospace" font-size="12" fill="#64b5f6" text-anchor="middle">AGILE RELEASE TRAIN (ART)</text>
  <text x="600" y="328" font-family="monospace" font-size="9" fill="#3a5080" text-anchor="middle">Release Train Engineer · Product Mgmt · System Architect · Business Owners</text>

  <!-- Team level -->
  <rect x="80" y="350" width="1040" height="75" fill="#1a2040" stroke="#a6f079" stroke-width="1.5" opacity="0.5"/>
  <text x="600" y="381" font-family="monospace" font-size="12" fill="#a6f079" text-anchor="middle">ÉQUIPES AGILES</text>
  <text x="600" y="403" font-family="monospace" font-size="9" fill="#3a6040" text-anchor="middle">Scrum Master · Product Owner · Dev · QA · UX · Architecte...</text>

  <!-- Counter bubble: meetings -->
  <circle cx="200" cy="490" r="50" fill="#2a1520" stroke="#ff6b6b" stroke-width="1.5" opacity="0.8"/>
  <text x="200" y="482" font-family="monospace" font-size="11" fill="#ff6b6b" text-anchor="middle">PI Planning</text>
  <text x="200" y="500" font-family="monospace" font-size="9" fill="#ff6b6b" text-anchor="middle">2 jours / 10 sem</text>

  <circle cx="370" cy="490" r="40" fill="#2a1520" stroke="#ffd54f" stroke-width="1.5" opacity="0.7"/>
  <text x="370" y="484" font-family="monospace" font-size="10" fill="#ffd54f" text-anchor="middle">System</text>
  <text x="370" y="500" font-family="monospace" font-size="9" fill="#ffd54f" text-anchor="middle">Demo ×5</text>

  <circle cx="520" cy="490" r="35" fill="#2a1520" stroke="#c792e9" stroke-width="1.5" opacity="0.6"/>
  <text x="520" y="487" font-family="monospace" font-size="10" fill="#c792e9" text-anchor="middle">I&amp;A</text>
  <text x="520" y="502" font-family="monospace" font-size="9" fill="#c792e9" text-anchor="middle">workshop</text>

  <!-- Label -->
  <text x="800" y="475" font-family="monospace" font-size="12" fill="#8b9cbf">Overhead réunions :</text>
  <text x="800" y="500" font-family="Georgia, serif" font-size="30" fill="#ff6b6b" opacity="0.7">15-20%</text>
  <text x="800" y="525" font-family="monospace" font-size="11" fill="#5a6090">de la capacité de l'équipe</text>

  <text x="600" y="575" font-family="Georgia, serif" font-size="25" fill="#e0e8ff" text-anchor="middle" opacity="0.9">L'agilité à l'échelle peut devenir son propre obstacle</text>
</svg>
