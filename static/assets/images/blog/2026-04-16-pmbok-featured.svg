    <text x="308" y="388" text-anchor="middle" fill="#ff6b9d" opacity="0.9">Planification</text>
    <text x="215" y="422" text-anchor="middle" fill="#a6f079" opacity="0.8">Travail</text>
    <text x="122" y="388" text-anchor="middle" fill="#c792e9" opacity="0.8">Livraison</text>
