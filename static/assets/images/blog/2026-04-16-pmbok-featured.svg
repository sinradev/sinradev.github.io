  <g><rect x="500" y="443" width="60" height="28" rx="14" fill="#6ecf00" fill-opacity="0.08" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.35"/>
  <text x="530" y="462" text-anchor="middle" font-size="10" fill="#6ecf00" font-weight="600" letter-spacing="0.5">PMI</text></g>
  <g><rect x="572" y="443" width="64" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
  <text x="604" y="462" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">PMP</text></g>
