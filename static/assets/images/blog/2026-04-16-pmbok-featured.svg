  <text x="215" y="285" text-anchor="middle" font-size="8" fill="#6ecf00" font-weight="700">PMBOK</text>
  <text x="215" y="298" text-anchor="middle" font-size="7" fill="#6ecf00" opacity="0.8">v7</text>

