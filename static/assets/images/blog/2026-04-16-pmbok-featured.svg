    <line x1="215" y1="260" x2="215" y2="175"/>
    <line x1="215" y1="260" x2="293" y2="208"/>
    <line x1="215" y1="260" x2="318" y2="290"/>
    <line x1="215" y1="260" x2="293" y2="372"/>
    <line x1="215" y1="260" x2="215" y2="405"/>
    <line x1="215" y1="260" x2="137" y2="372"/>
    <line x1="215" y1="260" x2="112" y2="290"/>
    <line x1="215" y1="260" x2="137" y2="208"/>
