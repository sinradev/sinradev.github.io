<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/><stop offset="60%" stop-color="#0a0f1a"/><stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.14"/><stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.10"/><stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- ASD 3-phase cycle: Speculate → Collaborate → Learn (circular) -->
  <!-- Outer ring -->
  <circle cx="215" cy="290" r="140" fill="none" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Speculate arc (top) -->
  <path d="M215,150 A140,140 0 0,1 336,360" fill="none" stroke="#ff6b9d" stroke-width="2.5" stroke-opacity="0.7"/>
  <text x="305" y="195" text-anchor="middle" font-size="11" fill="#ff6b9d" font-weight="700">Spéculer</text>

  <!-- Collaborate arc (bottom-right) -->
  <path d="M336,360 A140,140 0 0,1 94,360" fill="none" stroke="#a6f079" stroke-width="2.5" stroke-opacity="0.7"/>
  <text x="215" y="435" text-anchor="middle" font-size="11" fill="#a6f079" font-weight="700">Collaborer</text>

  <!-- Learn arc (left) -->
  <path d="M94,360 A140,140 0 0,1 215,150" fill="none" stroke="#c792e9" stroke-width="2.5" stroke-opacity="0.7"/>
  <text x="105" y="245" text-anchor="middle" font-size="11" fill="#c792e9" font-weight="700">Apprendre</text>

  <!-- Center -->
  <circle cx="215" cy="290" r="30" fill="#ff6b9d" fill-opacity="0.10" stroke="#ff6b9d" stroke-width="1.5" stroke-opacity="0.5" filter="url(#glow)"/>
  <text x="215" y="285" text-anchor="middle" font-size="9" fill="#ff6b9d" font-weight="700">Chaos</text>
  <text x="215" y="300" text-anchor="middle" font-size="9" fill="#ff6b9d" font-weight="700">complexe</text>

  <!-- Arrow indicators -->
  <polygon points="333,352 342,365 325,362" fill="#a6f079" fill-opacity="0.6"/>
  <polygon points="97,368 84,360 98,352" fill="#c792e9" fill-opacity="0.6"/>
  <polygon points="210,152 220,152 215,140" fill="#ff6b9d" fill-opacity="0.6"/>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">COMPLEXITÉ · ADAPTATION</text>
  <text x="500" y="262" font-size="56" font-weight="800" fill="#f8fafc" letter-spacing="-2">ASD</text>
  <text x="500" y="322" font-size="20" font-weight="600" fill="#8b9cbf">Adaptive Software</text>
  <text x="500" y="350" font-size="20" font-weight="600" fill="#8b9cbf">Development</text>
  <text x="500" y="390" font-size="15" fill="#475569">Spéculer · Collaborer · Apprendre</text>
  <line x1="500" y1="413" x2="850" y2="413" stroke="#1e293b" stroke-width="1"/>
  <g><rect x="500" y="428" width="80" height="28" rx="14" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.35"/>
  <text x="540" y="447" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="600" letter-spacing="0.5">Spéculer</text></g>
  <g><rect x="592" y="428" width="88" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
  <text x="636" y="447" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">Collaborer</text></g>
  <g><rect x="692" y="428" width="88" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
  <text x="736" y="447" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">Apprendre</text></g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
