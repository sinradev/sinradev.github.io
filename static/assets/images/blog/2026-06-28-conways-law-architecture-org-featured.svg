<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1320;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b9cbf" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left side: ORG CHART -->
  <text x="200" y="72" font-family="monospace" font-size="13" fill="#8b9cbf" text-anchor="middle" opacity="0.7">ORGANISATION</text>

  <!-- CEO box -->
  <rect x="140" y="88" width="120" height="36" rx="6" fill="#1e2540" stroke="#3a4570" stroke-width="1.5"/>
  <text x="200" y="111" font-family="monospace" font-size="11" fill="#8b9cbf" text-anchor="middle">CTO</text>

  <!-- Line down from CEO -->
  <line x1="200" y1="124" x2="200" y2="148" stroke="#3a4570" stroke-width="1.5"/>
  <!-- Horizontal line -->
  <line x1="70" y1="148" x2="330" y2="148" stroke="#3a4570" stroke-width="1.5"/>

  <!-- Lines down to teams -->
  <line x1="70" y1="148" x2="70" y2="172" stroke="#3a4570" stroke-width="1.5"/>
  <line x1="200" y1="148" x2="200" y2="172" stroke="#3a4570" stroke-width="1.5"/>
  <line x1="330" y1="148" x2="330" y2="172" stroke="#3a4570" stroke-width="1.5"/>

  <!-- Team Frontend -->
  <rect x="22" y="172" width="96" height="36" rx="6" fill="#1e2a40" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="70" y="195" font-family="monospace" font-size="10" fill="#6a9fd8" text-anchor="middle">Frontend</text>

  <!-- Team Backend -->
  <rect x="152" y="172" width="96" height="36" rx="6" fill="#1e2a40" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="200" y="195" font-family="monospace" font-size="10" fill="#6a9fd8" text-anchor="middle">Backend</text>

  <!-- Team Mobile -->
  <rect x="282" y="172" width="96" height="36" rx="6" fill="#1e2a40" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="330" y="195" font-family="monospace" font-size="10" fill="#6a9fd8" text-anchor="middle">Mobile</text>

  <!-- Communication lines between teams (dotted) -->
  <line x1="118" y1="190" x2="152" y2="190" stroke="#4a6fa5" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="248" y1="190" x2="282" y2="190" stroke="#4a6fa5" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Members under frontend -->
  <circle cx="46" cy="264" r="14" fill="#1a2030" stroke="#4a6fa5" stroke-width="1"/>
  <text x="46" y="268" font-family="monospace" font-size="9" fill="#6a9fd8" text-anchor="middle">dev</text>
  <circle cx="70" cy="264" r="14" fill="#1a2030" stroke="#4a6fa5" stroke-width="1"/>
  <text x="70" y="268" font-family="monospace" font-size="9" fill="#6a9fd8" text-anchor="middle">dev</text>
  <circle cx="94" cy="264" r="14" fill="#1a2030" stroke="#4a6fa5" stroke-width="1"/>
  <text x="94" y="268" font-family="monospace" font-size="9" fill="#6a9fd8" text-anchor="middle">dev</text>
  <line x1="70" y1="208" x2="70" y2="250" stroke="#3a4570" stroke-width="1" opacity="0.5"/>

  <!-- Members under backend -->
  <circle cx="176" cy="264" r="14" fill="#1a2030" stroke="#4a6fa5" stroke-width="1"/>
  <text x="176" y="268" font-family="monospace" font-size="9" fill="#6a9fd8" text-anchor="middle">dev</text>
  <circle cx="200" cy="264" r="14" fill="#1a2030" stroke="#4a6fa5" stroke-width="1"/>
  <text x="200" y="268" font-family="monospace" font-size="9" fill="#6a9fd8" text-anchor="middle">dev</text>
  <circle cx="224" cy="264" r="14" fill="#1a2030" stroke="#4a6fa5" stroke-width="1"/>
  <text x="224" y="268" font-family="monospace" font-size="9" fill="#6a9fd8" text-anchor="middle">dev</text>
  <line x1="200" y1="208" x2="200" y2="250" stroke="#3a4570" stroke-width="1" opacity="0.5"/>

  <!-- Members under mobile -->
  <circle cx="306" cy="264" r="14" fill="#1a2030" stroke="#4a6fa5" stroke-width="1"/>
  <text x="306" y="268" font-family="monospace" font-size="9" fill="#6a9fd8" text-anchor="middle">dev</text>
  <circle cx="330" cy="264" r="14" fill="#1a2030" stroke="#4a6fa5" stroke-width="1"/>
  <text x="330" y="268" font-family="monospace" font-size="9" fill="#6a9fd8" text-anchor="middle">dev</text>
  <circle cx="354" cy="264" r="14" fill="#1a2030" stroke="#4a6fa5" stroke-width="1"/>
  <text x="354" y="268" font-family="monospace" font-size="9" fill="#6a9fd8" text-anchor="middle">dev</text>
  <line x1="330" y1="208" x2="330" y2="250" stroke="#3a4570" stroke-width="1" opacity="0.5"/>

  <!-- Center: arrows and Conway's Law label -->
  <text x="600" y="72" font-family="Georgia, serif" font-size="26" fill="#e0e8ff" text-anchor="middle" opacity="0.95">Conway's Law</text>
  <text x="600" y="100" font-family="monospace" font-size="11" fill="#4a5580" text-anchor="middle">« l'architecture reflète la structure de communication »</text>

  <!-- Big arrow left to right -->
  <line x1="430" y1="220" x2="750" y2="220" stroke="#a6f079" stroke-width="2.5" opacity="0.7"/>
  <polygon points="750,214 766,220 750,226" fill="#a6f079" opacity="0.7"/>

  <!-- Mirroring label -->
  <text x="600" y="210" font-family="monospace" font-size="11" fill="#a6f079" text-anchor="middle" opacity="0.8">produit</text>
  <text x="600" y="235" font-family="monospace" font-size="11" fill="#a6f079" text-anchor="middle" opacity="0.8">naturellement</text>

  <!-- Right side: ARCHITECTURE -->
  <text x="960" y="72" font-family="monospace" font-size="13" fill="#8b9cbf" text-anchor="middle" opacity="0.7">ARCHITECTURE</text>

  <!-- Service Frontend -->
  <rect x="800" y="130" width="320" height="60" rx="8" fill="#1e2a40" stroke="#6a9fd8" stroke-width="2"/>
  <text x="830" y="158" font-family="monospace" font-size="12" fill="#6a9fd8">[ Service Frontend ]</text>
  <text x="830" y="178" font-family="monospace" font-size="10" fill="#3a5070">React · CSS · assets statiques</text>

  <!-- Connector line -->
  <line x1="960" y1="190" x2="960" y2="216" stroke="#3a4570" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Service Backend -->
  <rect x="800" y="216" width="320" height="60" rx="8" fill="#1e302a" stroke="#a6f079" stroke-width="2"/>
  <text x="830" y="244" font-family="monospace" font-size="12" fill="#a6f079">[ Service Backend ]</text>
  <text x="830" y="264" font-family="monospace" font-size="10" fill="#3a5040">API REST · métier · base de données</text>

  <!-- Connector line -->
  <line x1="960" y1="276" x2="960" y2="302" stroke="#3a4570" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Service Mobile -->
  <rect x="800" y="302" width="320" height="60" rx="8" fill="#2a2040" stroke="#b088f0" stroke-width="2"/>
  <text x="830" y="330" font-family="monospace" font-size="12" fill="#b088f0">[ Service Mobile ]</text>
  <text x="830" y="350" font-family="monospace" font-size="10" fill="#504070">iOS · Android · notifications push</text>

  <!-- Interface labels between services -->
  <rect x="900" y="196" width="120" height="20" rx="4" fill="#0f1320" stroke="#3a4570" stroke-width="1"/>
  <text x="960" y="210" font-family="monospace" font-size="9" fill="#4a5580" text-anchor="middle">API / contrat d'interface</text>

  <rect x="900" y="282" width="120" height="20" rx="4" fill="#0f1320" stroke="#3a4570" stroke-width="1"/>
  <text x="960" y="296" font-family="monospace" font-size="9" fill="#4a5580" text-anchor="middle">API / contrat d'interface</text>

  <!-- Bottom quote -->
  <text x="600" y="440" font-family="Georgia, serif" font-size="15" fill="#6a7aaa" text-anchor="middle" opacity="0.8" font-style="italic">« Change l'organisation pour changer l'architecture »</text>
  <text x="600" y="462" font-family="monospace" font-size="11" fill="#3a4570" text-anchor="middle">Inverse Conway Maneuver</text>

  <!-- Bottom diagram: Inverse Conway -->
  <!-- Domain teams -->
  <rect x="160" y="490" width="100" height="34" rx="6" fill="#1e2a1e" stroke="#a6f079" stroke-width="1.5"/>
  <text x="210" y="512" font-family="monospace" font-size="10" fill="#a6f079" text-anchor="middle">Paiement</text>

  <rect x="295" y="490" width="100" height="34" rx="6" fill="#1e2a1e" stroke="#a6f079" stroke-width="1.5"/>
  <text x="345" y="512" font-family="monospace" font-size="10" fill="#a6f079" text-anchor="middle">Catalogue</text>

  <rect x="430" y="490" width="100" height="34" rx="6" fill="#1e2a1e" stroke="#a6f079" stroke-width="1.5"/>
  <text x="480" y="512" font-family="monospace" font-size="10" fill="#a6f079" text-anchor="middle">Livraison</text>

  <!-- Arrow right -->
  <line x1="550" y1="507" x2="615" y2="507" stroke="#a6f079" stroke-width="1.5" opacity="0.6"/>
  <polygon points="615,501 629,507 615,513" fill="#a6f079" opacity="0.6"/>

  <!-- Domain services -->
  <rect x="640" y="490" width="100" height="34" rx="6" fill="#1e2a1e" stroke="#6adf40" stroke-width="1.5"/>
  <text x="690" y="512" font-family="monospace" font-size="10" fill="#6adf40" text-anchor="middle">svc-payment</text>

  <rect x="760" y="490" width="100" height="34" rx="6" fill="#1e2a1e" stroke="#6adf40" stroke-width="1.5"/>
  <text x="810" y="512" font-family="monospace" font-size="10" fill="#6adf40" text-anchor="middle">svc-catalog</text>

  <rect x="880" y="490" width="100" height="34" rx="6" fill="#1e2a1e" stroke="#6adf40" stroke-width="1.5"/>
  <text x="930" y="512" font-family="monospace" font-size="10" fill="#6adf40" text-anchor="middle">svc-delivery</text>

  <text x="210" y="548" font-family="monospace" font-size="9" fill="#4a6050" text-anchor="middle">Equipes métier</text>
  <text x="810" y="548" font-family="monospace" font-size="9" fill="#4a6050" text-anchor="middle">Architecture domaine</text>

  <text x="600" y="600" font-family="monospace" font-size="12" fill="#2a3560" text-anchor="middle">sinra.dev</text>
</svg>
