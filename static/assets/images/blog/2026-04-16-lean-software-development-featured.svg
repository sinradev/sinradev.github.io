<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/><stop offset="60%" stop-color="#0a0f1a"/><stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.18"/><stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#6ecf00" stop-opacity="0.10"/><stop offset="100%" stop-color="#6ecf00" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- Value flow arrow left to right -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a6f079" opacity="0.7"/>
    </marker>
  </defs>
  <line x1="40" y1="270" x2="390" y2="270" stroke="#a6f079" stroke-width="3" stroke-opacity="0.5" marker-end="url(#arr)"/>

  <!-- Value boxes on flow -->
  <circle cx="100" cy="270" r="28" fill="#a6f079" fill-opacity="0.12" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="100" y="265" text-anchor="middle" font-size="9" fill="#a6f079" font-weight="700">Idée</text>
  <text x="100" y="278" text-anchor="middle" font-size="9" fill="#a6f079">Valeur</text>

  <circle cx="215" cy="270" r="28" fill="#a6f079" fill-opacity="0.15" stroke="#a6f079" stroke-width="2" stroke-opacity="0.7" filter="url(#glow)"/>
  <text x="215" y="265" text-anchor="middle" font-size="9" fill="#a6f079" font-weight="700">Dev</text>
  <text x="215" y="278" text-anchor="middle" font-size="9" fill="#a6f079">Livraison</text>

  <circle cx="335" cy="270" r="28" fill="#a6f079" fill-opacity="0.18" stroke="#a6f079" stroke-width="2" stroke-opacity="0.8" filter="url(#glow)"/>
  <text x="335" y="265" text-anchor="middle" font-size="9" fill="#a6f079" font-weight="700">Client</text>
  <text x="335" y="278" text-anchor="middle" font-size="9" fill="#a6f079">Valeur</text>

  <!-- Waste X cross-outs above -->
  <g opacity="0.7">
    <rect x="60" y="145" width="80" height="30" rx="4" fill="#ff6b9d" fill-opacity="0.1" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.4"/>
    <text x="100" y="165" text-anchor="middle" font-size="10" fill="#ff6b9d">Attente</text>
    <line x1="62" y1="147" x2="138" y2="173" stroke="#ff6b9d" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="138" y1="147" x2="62" y2="173" stroke="#ff6b9d" stroke-width="1.5" stroke-opacity="0.6"/>

    <rect x="165" y="145" width="100" height="30" rx="4" fill="#ff6b9d" fill-opacity="0.1" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.4"/>
    <text x="215" y="165" text-anchor="middle" font-size="10" fill="#ff6b9d">Surproduction</text>
    <line x1="167" y1="147" x2="263" y2="173" stroke="#ff6b9d" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="263" y1="147" x2="167" y2="173" stroke="#ff6b9d" stroke-width="1.5" stroke-opacity="0.6"/>

    <rect x="280" y="145" width="80" height="30" rx="4" fill="#ff6b9d" fill-opacity="0.1" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.4"/>
    <text x="320" y="165" text-anchor="middle" font-size="10" fill="#ff6b9d">Défauts</text>
    <line x1="282" y1="147" x2="358" y2="173" stroke="#ff6b9d" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="358" y1="147" x2="282" y2="173" stroke="#ff6b9d" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>

  <text x="215" y="130" text-anchor="middle" font-size="11" fill="#ff6b9d" font-weight="600" opacity="0.7">Gaspillages éliminés</text>

  <!-- 7 principles label -->
  <text x="215" y="360" text-anchor="middle" font-size="11" fill="#a6f079" font-weight="600" opacity="0.8">7 principes Lean</text>
  <text x="215" y="380" text-anchor="middle" font-size="10" fill="#8b9cbf" opacity="0.6">Toyota Production System</text>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">PHILOSOPHIE · VALEUR</text>
  <text x="500" y="262" font-size="60" font-weight="800" fill="#f8fafc" letter-spacing="-2">Lean</text>
  <text x="500" y="340" font-size="32" font-weight="700" letter-spacing="-1"><tspan fill="#a6f079">Software</tspan></text>
  <text x="500" y="380" font-size="32" font-weight="700" letter-spacing="-1" fill="#8b9cbf">Development</text>
  <text x="500" y="415" font-size="16" fill="#475569">Éliminer le gaspillage, livrer de la valeur</text>
  <line x1="500" y1="435" x2="850" y2="435" stroke="#1e293b" stroke-width="1"/>
  <g><rect x="500" y="450" width="96" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
  <text x="548" y="469" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">Muda</text></g>
  <g><rect x="608" y="450" width="80" height="28" rx="14" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.35"/>
  <text x="648" y="469" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="600" letter-spacing="0.5">Toyota</text></g>
  <g><rect x="700" y="450" width="80" height="28" rx="14" fill="#6ecf00" fill-opacity="0.08" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.35"/>
  <text x="740" y="469" text-anchor="middle" font-size="10" fill="#6ecf00" font-weight="600" letter-spacing="0.5">Kanban</text></g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
