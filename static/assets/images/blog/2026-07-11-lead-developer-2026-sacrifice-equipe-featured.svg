<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#171b2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111520;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowLead" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a6f079;stop-opacity:0.55" />
      <stop offset="100%" style="stop-color:#a6f079;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="nodeLead" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c6ff9a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dd44f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0a0f1a;stop-opacity:0.92" />
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Faint grid -->
  <g stroke="#2a3350" stroke-width="1" opacity="0.25">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Ambient blobs -->
  <circle cx="120" cy="120" r="130" fill="#a6f079" opacity="0.05"/>
  <circle cx="1080" cy="150" r="120" fill="#8b5cf6" opacity="0.07"/>
  <circle cx="1050" cy="380" r="90" fill="#c792e9" opacity="0.05"/>

  <!-- Code fragments, decorative background left -->
  <g font-family="'Courier New', monospace" font-size="15" fill="#3f4a6b" opacity="0.55">
    <text x="70" y="230">lead.mentor(dev)</text>
    <text x="70" y="258">team.forEach(grow)</text>
    <text x="70" y="286">own(failure)</text>
    <text x="70" y="314">credit(team)</text>
    <text x="70" y="342">guide() != solve()</text>
  </g>
  <g font-family="'Courier New', monospace" font-size="15" fill="#3f4a6b" opacity="0.45">
    <text x="930" y="250">shield(stress)</text>
    <text x="930" y="278">propose()</text>
    <text x="930" y="306">// not impose</text>
    <text x="930" y="334">product.sync()</text>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="70" width="1200" height="3" fill="#a6f079" opacity="0.55"/>
  <rect x="0" y="70" width="340" height="3" fill="#a6f079"/>

  <!-- Team network graph, center -->
  <g>
    <!-- Lead glow -->
    <circle cx="600" cy="170" r="90" fill="url(#glowLead)"/>

    <!-- Connections lead -> members -->
    <g stroke="#7dd44f" stroke-width="2.5" opacity="0.45">
      <line x1="600" y1="170" x2="410" y2="300"/>
      <line x1="600" y1="170" x2="510" y2="330"/>
      <line x1="600" y1="170" x2="600" y2="345"/>
      <line x1="600" y1="170" x2="690" y2="330"/>
      <line x1="600" y1="170" x2="790" y2="300"/>
    </g>
    <!-- Peer connections between members -->
    <g stroke="#8b9cbf" stroke-width="1.5" opacity="0.3">
      <line x1="410" y1="300" x2="510" y2="330"/>
      <line x1="510" y1="330" x2="600" y2="345"/>
      <line x1="600" y1="345" x2="690" y2="330"/>
      <line x1="690" y1="330" x2="790" y2="300"/>
    </g>

    <!-- Member nodes -->
    <circle cx="410" cy="300" r="22" fill="#c792e9" opacity="0.9"/>
    <circle cx="510" cy="330" r="22" fill="#8b5cf6" opacity="0.9"/>
    <circle cx="600" cy="345" r="22" fill="#a6f079" opacity="0.9"/>
    <circle cx="690" cy="330" r="22" fill="#8b5cf6" opacity="0.9"/>
    <circle cx="790" cy="300" r="22" fill="#c792e9" opacity="0.9"/>

    <!-- Lead node on top -->
    <circle cx="600" cy="170" r="40" fill="url(#nodeLead)"/>
    <circle cx="600" cy="170" r="40" fill="none" stroke="#d6ffb0" stroke-width="2" opacity="0.8"/>
    <!-- Lead crown / arrow mark -->
    <path d="M582 176 L600 154 L618 176 Z" fill="#12331c"/>
    <rect x="583" y="178" width="34" height="6" rx="3" fill="#12331c"/>
  </g>

  <!-- Title band -->
  <rect x="0" y="396" width="1200" height="234" fill="url(#band)"/>
  <rect x="0" y="396" width="1200" height="2" fill="#a6f079" opacity="0.55"/>

  <!-- Eyebrow -->
  <text x="600" y="446" font-family="Arial, sans-serif" font-size="18" font-weight="bold" letter-spacing="4" text-anchor="middle" fill="#8b9cbf">LEADERSHIP TECHNIQUE</text>

  <!-- Main title -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="54" font-weight="bold" text-anchor="middle" fill="#a6f079">Lead Developer en 2026</text>

  <!-- Subtitle -->
  <text x="600" y="544" font-family="Arial, sans-serif" font-size="26" font-weight="normal" text-anchor="middle" fill="#c792e9">Se sacrifier pour faire grandir son équipe</text>

  <!-- Tagline -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="18" font-weight="normal" text-anchor="middle" fill="#8b9cbf">Assumer les échecs, valoriser les victoires collectives</text>

  <!-- Branding -->
  <text x="1150" y="614" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="end" fill="#a6f079" opacity="0.6">sinra.app</text>
</svg>
