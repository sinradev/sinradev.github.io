<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/><stop offset="60%" stop-color="#0a0f1a"/><stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.15"/><stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.10"/><stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- MoSCoW blocks stacked -->
  <rect x="50" y="130" width="340" height="70" rx="6" fill="#a6f079" fill-opacity="0.15" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="75" y="158" font-size="18" fill="#a6f079" font-weight="800">M</text>
  <text x="100" y="158" font-size="13" fill="#a6f079" font-weight="600">ust have</text>
  <text x="75" y="182" font-size="10" fill="#8b9cbf" opacity="0.8">Non-négociable · indispensable</text>

  <rect x="50" y="212" width="340" height="62" rx="6" fill="#c792e9" fill-opacity="0.10" stroke="#c792e9" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="75" y="237" font-size="18" fill="#c792e9" font-weight="800">S</text>
  <text x="100" y="237" font-size="13" fill="#c792e9" font-weight="600">hould have</text>
  <text x="75" y="258" font-size="10" fill="#8b9cbf" opacity="0.8">Important mais pas vital</text>

  <rect x="50" y="286" width="340" height="62" rx="6" fill="#6ecf00" fill-opacity="0.08" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.4"/>
  <text x="75" y="311" font-size="18" fill="#6ecf00" font-weight="800">C</text>
  <text x="100" y="311" font-size="13" fill="#6ecf00" font-weight="600">ould have</text>
  <text x="75" y="332" font-size="10" fill="#8b9cbf" opacity="0.7">Si le temps le permet</text>

  <rect x="50" y="360" width="340" height="62" rx="6" fill="#ff6b9d" fill-opacity="0.06" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.3"/>
  <text x="75" y="385" font-size="18" fill="#ff6b9d" font-weight="800">W</text>
  <text x="100" y="385" font-size="13" fill="#ff6b9d" font-weight="600">on't have (this time)</text>
  <text x="75" y="406" font-size="10" fill="#8b9cbf" opacity="0.6">Hors scope · version future</text>

  <!-- Time fixed label -->
  <rect x="100" y="450" width="200" height="36" rx="18" fill="#ff6b9d" fill-opacity="0.1" stroke="#ff6b9d" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="200" y="473" text-anchor="middle" font-size="12" fill="#ff6b9d" font-weight="700">Temps fixe · Budget fixe</text>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">MÉTHODE AGILE · GOUVERNANCE</text>
  <text x="500" y="262" font-size="56" font-weight="800" fill="#f8fafc" letter-spacing="-2">DSDM</text>
  <text x="500" y="330" font-size="18" font-weight="600" fill="#8b9cbf">Dynamic Systems</text>
  <text x="500" y="358" font-size="18" font-weight="600" fill="#8b9cbf">Development Method</text>
  <text x="500" y="400" font-size="16" fill="#475569">Temps fixe, scope variable, qualité constante</text>
  <line x1="500" y1="425" x2="850" y2="425" stroke="#1e293b" stroke-width="1"/>
  <g><rect x="500" y="440" width="82" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
  <text x="541" y="459" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">MoSCoW</text></g>
  <g><rect x="594" y="440" width="96" height="28" rx="14" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.35"/>
  <text x="642" y="459" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="600" letter-spacing="0.5">Timeboxing</text></g>
  <g><rect x="702" y="440" width="80" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
  <text x="742" y="459" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">Agile</text></g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
