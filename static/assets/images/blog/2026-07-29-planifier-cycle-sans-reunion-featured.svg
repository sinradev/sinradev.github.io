<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#171b2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0a0f1a;stop-opacity:0.92" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g stroke="#2a3350" stroke-width="1" opacity="0.25">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
  </g>
  <circle cx="120" cy="120" r="130" fill="#a6f079" opacity="0.05"/>

  <rect x="0" y="70" width="1200" height="3" fill="#a6f079" opacity="0.55"/>
  <rect x="0" y="70" width="340" height="3" fill="#a6f079"/>

  <!-- clock: 2h meeting struck through, 45 min circled -->
  <circle cx="360" cy="270" r="120" fill="none" stroke="#e06c75" stroke-width="3" opacity="0.6"/>
  <line x1="360" y1="270" x2="360" y2="180" stroke="#e06c75" stroke-width="4" opacity="0.7"/>
  <line x1="360" y1="270" x2="430" y2="300" stroke="#e06c75" stroke-width="4" opacity="0.7"/>
  <text x="360" y="420" font-family="monospace" font-size="18" fill="#e06c75" text-anchor="middle">2h en réunion</text>

  <text x="600" y="285" font-family="Georgia, serif" font-size="34" fill="#e0e8ff" text-anchor="middle" opacity="0.6">→</text>

  <circle cx="840" cy="270" r="120" fill="none" stroke="#a6f079" stroke-width="3" opacity="0.85"/>
  <line x1="840" y1="270" x2="840" y2="200" stroke="#a6f079" stroke-width="4"/>
  <line x1="840" y1="270" x2="880" y2="280" stroke="#a6f079" stroke-width="4"/>
  <text x="840" y="420" font-family="monospace" font-size="18" fill="#a6f079" text-anchor="middle">40 min d'arbitrage</text>

  <rect x="0" y="446" width="1200" height="184" fill="url(#band)"/>
  <rect x="0" y="446" width="1200" height="2" fill="#a6f079" opacity="0.55"/>
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#e0e8ff">Planifier un Cycle Sans Réunion Inutile</text>
  <text x="600" y="548" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#c792e9">Préparer en amont, décider en réunion</text>
  <text x="1150" y="614" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="end" fill="#a6f079" opacity="0.7">sinra.app</text>
</svg>
