<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/>
      <stop offset="60%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#c792e9" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c792e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- Cascading steps -->
  <g opacity="0.9">
    <rect x="40" y="100" width="160" height="52" rx="6" fill="#a6f079" fill-opacity="0.12" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="120" y="132" text-anchor="middle" font-size="13" fill="#a6f079" font-weight="600">Besoins</text>
    <line x1="200" y1="126" x2="230" y2="126" stroke="#a6f079" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="230" y1="126" x2="230" y2="178" stroke="#a6f079" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="230" y1="178" x2="240" y2="178" stroke="#a6f079" stroke-opacity="0.4" stroke-width="1.5"/>

    <rect x="80" y="165" width="160" height="52" rx="6" fill="#a6f079" fill-opacity="0.09" stroke="#a6f079" stroke-width="1.2" stroke-opacity="0.4"/>
    <text x="160" y="197" text-anchor="middle" font-size="13" fill="#a6f079" font-weight="600">Conception</text>
    <line x1="240" y1="191" x2="270" y2="191" stroke="#a6f079" stroke-opacity="0.35" stroke-width="1.5"/>
    <line x1="270" y1="191" x2="270" y2="243" stroke="#a6f079" stroke-opacity="0.35" stroke-width="1.5"/>
    <line x1="270" y1="243" x2="280" y2="243" stroke="#a6f079" stroke-opacity="0.35" stroke-width="1.5"/>

    <rect x="120" y="230" width="160" height="52" rx="6" fill="#6ecf00" fill-opacity="0.07" stroke="#6ecf00" stroke-width="1.2" stroke-opacity="0.35"/>
    <text x="200" y="262" text-anchor="middle" font-size="13" fill="#6ecf00" font-weight="600">Développement</text>
    <line x1="280" y1="256" x2="310" y2="256" stroke="#6ecf00" stroke-opacity="0.3" stroke-width="1.5"/>
    <line x1="310" y1="256" x2="310" y2="308" stroke="#6ecf00" stroke-opacity="0.3" stroke-width="1.5"/>
    <line x1="310" y1="308" x2="320" y2="308" stroke="#6ecf00" stroke-opacity="0.3" stroke-width="1.5"/>

    <rect x="160" y="295" width="160" height="52" rx="6" fill="#c792e9" fill-opacity="0.07" stroke="#c792e9" stroke-width="1.2" stroke-opacity="0.35"/>
    <text x="240" y="327" text-anchor="middle" font-size="13" fill="#c792e9" font-weight="600">Tests</text>
    <line x1="320" y1="321" x2="350" y2="321" stroke="#c792e9" stroke-opacity="0.3" stroke-width="1.5"/>
    <line x1="350" y1="321" x2="350" y2="373" stroke="#c792e9" stroke-opacity="0.3" stroke-width="1.5"/>
    <line x1="350" y1="373" x2="360" y2="373" stroke="#c792e9" stroke-opacity="0.3" stroke-width="1.5"/>

    <rect x="200" y="360" width="160" height="52" rx="6" fill="#ff6b9d" fill-opacity="0.07" stroke="#ff6b9d" stroke-width="1.2" stroke-opacity="0.35"/>
    <text x="280" y="392" text-anchor="middle" font-size="13" fill="#ff6b9d" font-weight="600">Déploiement</text>
  </g>

  <!-- Waterfall cascade arrow -->
  <text x="215" y="470" text-anchor="middle" font-size="120" fill="#a6f079" opacity="0.03" font-weight="900">W</text>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">MÉTHODE CLASSIQUE · PRÉDICTIF</text>
  <text x="500" y="262" font-size="72" font-weight="800" fill="#f8fafc" letter-spacing="-3">Cycle en</text>
  <text x="500" y="352" font-size="72" font-weight="800" letter-spacing="-3">
    <tspan fill="#a6f079">Cascade</tspan>
  </text>
  <text x="500" y="406" font-size="16" fill="#475569">Waterfall - la méthode séquentielle fondatrice</text>
  <line x1="500" y1="432" x2="850" y2="432" stroke="#1e293b" stroke-width="1"/>
  <g>
    <rect x="500" y="450" width="100" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
    <text x="550" y="469" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">Séquentiel</text>
  </g>
  <g>
    <rect x="612" y="450" width="88" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
    <text x="656" y="469" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">Planifié</text>
  </g>
  <g>
    <rect x="712" y="450" width="96" height="28" rx="14" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.35"/>
    <text x="760" y="469" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="600" letter-spacing="0.5">Industriel</text>
  </g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
