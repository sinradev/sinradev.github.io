<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/><stop offset="60%" stop-color="#0a0f1a"/><stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#6ecf00" stop-opacity="0.15"/><stop offset="100%" stop-color="#6ecf00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#c792e9" stop-opacity="0.10"/><stop offset="100%" stop-color="#c792e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- 4 concentric arcs representing the 4 UP characteristics -->
  <path d="M50,480 Q215,100 390,480" fill="none" stroke="#6ecf00" stroke-width="2.5" stroke-opacity="0.7"/>
  <path d="M70,480 Q215,150 370,480" fill="none" stroke="#c792e9" stroke-width="2" stroke-opacity="0.6"/>
  <path d="M90,480 Q215,200 350,480" fill="none" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M110,480 Q215,250 330,480" fill="none" stroke="#ff6b9d" stroke-width="1.5" stroke-opacity="0.45"/>

  <!-- Labels on arcs -->
  <text x="68" y="340" font-size="10" fill="#6ecf00" font-weight="600" opacity="0.9" transform="rotate(-60,68,340)">Itératif</text>
  <text x="90" y="310" font-size="10" fill="#c792e9" font-weight="600" opacity="0.9" transform="rotate(-55,90,310)">Use Cases</text>
  <text x="115" y="290" font-size="10" fill="#a6f079" font-weight="600" opacity="0.9" transform="rotate(-48,115,290)">Architecture</text>
  <text x="140" y="270" font-size="10" fill="#ff6b9d" font-weight="600" opacity="0.9" transform="rotate(-42,140,270)">Risque</text>

  <!-- Center dot at base -->
  <circle cx="215" cy="480" r="8" fill="#6ecf00" fill-opacity="0.4" filter="url(#glow)"/>
  <circle cx="215" cy="480" r="4" fill="#6ecf00" filter="url(#glow)"/>

  <!-- Top label: foundation -->
  <text x="215" y="140" text-anchor="middle" font-size="11" fill="#6ecf00" font-weight="700" opacity="0.8">UP</text>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">FRAMEWORK GÉNÉRIQUE · BASE</text>
  <text x="500" y="262" font-size="60" font-weight="800" fill="#f8fafc" letter-spacing="-2">Unified</text>
  <text x="500" y="340" font-size="60" font-weight="800" letter-spacing="-2"><tspan fill="#6ecf00">Process</tspan></text>
  <text x="500" y="390" font-size="16" fill="#475569">La fondation du RUP, OpenUP et leurs dérivés</text>
  <line x1="500" y1="415" x2="850" y2="415" stroke="#1e293b" stroke-width="1"/>
  <g><rect x="500" y="430" width="96" height="28" rx="14" fill="#6ecf00" fill-opacity="0.08" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.35"/>
  <text x="548" y="449" text-anchor="middle" font-size="10" fill="#6ecf00" font-weight="600" letter-spacing="0.5">Itératif</text></g>
  <g><rect x="608" y="430" width="100" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
  <text x="658" y="449" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">Use Cases</text></g>
  <g><rect x="720" y="430" width="96" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
  <text x="768" y="449" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">Universel</text></g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
