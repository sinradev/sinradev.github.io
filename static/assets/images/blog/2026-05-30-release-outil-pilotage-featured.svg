<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1320;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b9cbf" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Timeline rail -->
  <line x1="100" y1="315" x2="1100" y2="315" stroke="#2a3050" stroke-width="3"/>

  <!-- Release nodes -->
  <!-- v2.2 past -->
  <circle cx="200" cy="315" r="22" fill="#1a2040" stroke="#4a5580" stroke-width="2"/>
  <text x="200" y="320" font-family="monospace" font-size="11" fill="#4a5580" text-anchor="middle">v2.2</text>
  <rect x="150" y="240" width="100" height="60" rx="6" fill="#1e2540" stroke="#4a5580" stroke-width="1" opacity="0.5"/>
  <text x="200" y="262" font-family="monospace" font-size="9" fill="#4a5580" text-anchor="middle">Livré</text>
  <text x="200" y="280" font-family="monospace" font-size="9" fill="#4a5580" text-anchor="middle">3 capabilities</text>

  <!-- v2.3 current -->
  <circle cx="480" cy="315" r="30" fill="#1e2a50" stroke="#64b5f6" stroke-width="2.5"/>
  <text x="480" y="320" font-family="monospace" font-size="12" fill="#64b5f6" text-anchor="middle">v2.3</text>
  <rect x="390" y="215" width="180" height="85" rx="8" fill="#1e2540" stroke="#64b5f6" stroke-width="1.5"/>
  <text x="480" y="240" font-family="monospace" font-size="11" fill="#64b5f6" text-anchor="middle">En cours</text>
  <text x="480" y="258" font-family="monospace" font-size="10" fill="#8b9cbf" text-anchor="middle">Export CSV</text>
  <text x="480" y="274" font-family="monospace" font-size="10" fill="#8b9cbf" text-anchor="middle">Notifications email</text>
  <text x="480" y="290" font-family="monospace" font-size="10" fill="#8b9cbf" text-anchor="middle">Rôles avancés</text>
  <line x1="480" y1="300" x2="480" y2="345" stroke="#64b5f6" stroke-width="1.5" opacity="0.6"/>

  <!-- v2.4 next -->
  <circle cx="760" cy="315" r="22" fill="#1a2040" stroke="#a6f079" stroke-width="2"/>
  <text x="760" y="320" font-family="monospace" font-size="11" fill="#a6f079" text-anchor="middle">v2.4</text>
  <rect x="670" y="240" width="180" height="65" rx="6" fill="#1e2540" stroke="#a6f079" stroke-width="1" opacity="0.6"/>
  <text x="760" y="262" font-family="monospace" font-size="9" fill="#a6f079" text-anchor="middle">Planifié · Juillet</text>
  <text x="760" y="278" font-family="monospace" font-size="9" fill="#8b9cbf" text-anchor="middle">API publique</text>
  <text x="760" y="294" font-family="monospace" font-size="9" fill="#8b9cbf" text-anchor="middle">Dashboard analytics</text>

  <!-- v2.5 future -->
  <circle cx="1000" cy="315" r="18" fill="#161c35" stroke="#3a4570" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="1000" y="320" font-family="monospace" font-size="10" fill="#3a4570" text-anchor="middle">v2.5</text>

  <!-- Label: périmètre -->
  <text x="480" y="420" font-family="monospace" font-size="13" fill="#64b5f6" opacity="0.7" text-anchor="middle">périmètre défini</text>
  <line x1="390" y1="410" x2="570" y2="410" stroke="#64b5f6" stroke-width="1" opacity="0.4"/>

  <!-- Glow -->
  <circle cx="480" cy="315" r="60" fill="#64b5f6" opacity="0.03"/>

  <!-- Title -->
  <text x="600" y="555" font-family="Georgia, serif" font-size="27" fill="#e0e8ff" text-anchor="middle" opacity="0.9">La release comme engagement de périmètre</text>
</svg>
