<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1320;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b9cbf" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Incident timeline -->
  <text x="600" y="95" font-family="monospace" font-size="13" fill="#8b9cbf" text-anchor="middle">Incident · Vendredi 18:47</text>
  <line x1="100" y1="120" x2="1100" y2="120" stroke="#2a3560" stroke-width="2"/>

  <!-- Events on timeline -->
  <circle cx="200" cy="120" r="8" fill="#ff6b6b" opacity="0.8"/>
  <text x="200" y="145" font-family="monospace" font-size="10" fill="#8b9cbf" text-anchor="middle">18:47</text>
  <text x="200" y="160" font-family="monospace" font-size="9" fill="#5a6590" text-anchor="middle">Alerte</text>

  <circle cx="420" cy="120" r="8" fill="#ffd54f" opacity="0.8"/>
  <text x="420" y="145" font-family="monospace" font-size="10" fill="#8b9cbf" text-anchor="middle">18:52</text>
  <text x="420" y="160" font-family="monospace" font-size="9" fill="#5a6590" text-anchor="middle">Investigation</text>

  <circle cx="640" cy="120" r="8" fill="#64b5f6" opacity="0.8"/>
  <text x="640" y="145" font-family="monospace" font-size="10" fill="#8b9cbf" text-anchor="middle">19:02</text>
  <text x="640" y="160" font-family="monospace" font-size="9" fill="#5a6590" text-anchor="middle">Cause identifiée</text>

  <circle cx="860" cy="120" r="8" fill="#a6f079" opacity="0.8"/>
  <text x="860" y="145" font-family="monospace" font-size="10" fill="#8b9cbf" text-anchor="middle">19:22</text>
  <text x="860" y="160" font-family="monospace" font-size="9" fill="#5a6590" text-anchor="middle">Service rétabli</text>

  <!-- Two post-mortem approaches -->
  <!-- Blaming (left) -->
  <rect x="80" y="185" width="460" height="300" rx="10" fill="#2a1520" stroke="#ff6b6b" stroke-width="1.5" opacity="0.7"/>
  <text x="310" y="220" font-family="monospace" font-size="13" fill="#ff6b6b" text-anchor="middle">Post-mortem BLAMING</text>
  <line x1="100" y1="230" x2="520" y2="230" stroke="#ff6b6b" stroke-width="0.5" opacity="0.3"/>
  <text x="110" y="260" font-family="monospace" font-size="11" fill="#804060">Cause : erreur de configuration</text>
  <text x="110" y="278" font-family="monospace" font-size="11" fill="#804060">de l'ingénieur Alex lors du</text>
  <text x="110" y="296" font-family="monospace" font-size="11" fill="#804060">déploiement de vendredi.</text>
  <text x="110" y="330" font-family="monospace" font-size="11" fill="#5a4050">Action : sensibiliser Alex à</text>
  <text x="110" y="348" font-family="monospace" font-size="11" fill="#5a4050">la procédure de migration.</text>
  <text x="110" y="400" font-family="monospace" font-size="11" fill="#ff6b6b" opacity="0.7">→ Causes systémiques ignorées</text>
  <text x="110" y="420" font-family="monospace" font-size="11" fill="#ff6b6b" opacity="0.7">→ Prochaine personne = même erreur</text>
  <text x="110" y="440" font-family="monospace" font-size="11" fill="#ff6b6b" opacity="0.7">→ Signaux non remontés ensuite</text>

  <!-- Blameless (right) -->
  <rect x="660" y="185" width="460" height="300" rx="10" fill="#1a2a1a" stroke="#a6f079" stroke-width="1.5" opacity="0.7"/>
  <text x="890" y="220" font-family="monospace" font-size="13" fill="#a6f079" text-anchor="middle">Post-mortem BLAMELESS</text>
  <line x1="680" y1="230" x2="1100" y2="230" stroke="#a6f079" stroke-width="0.5" opacity="0.3"/>
  <text x="680" y="260" font-family="monospace" font-size="11" fill="#5a8060">Pourquoi le système a permis</text>
  <text x="680" y="278" font-family="monospace" font-size="11" fill="#5a8060">cette config dangereuse sans</text>
  <text x="680" y="296" font-family="monospace" font-size="11" fill="#5a8060">validation ni avertissement ?</text>
  <text x="680" y="330" font-family="monospace" font-size="11" fill="#a6f079">✓ Ajouter validation pre-migration</text>
  <text x="680" y="350" font-family="monospace" font-size="11" fill="#a6f079">✓ Alert si migration > 10% tables</text>
  <text x="680" y="370" font-family="monospace" font-size="11" fill="#a6f079">✓ Rollback auto-test en CI</text>
  <text x="680" y="400" font-family="monospace" font-size="11" fill="#4a7050" opacity="0.9">→ Système plus résilient</text>
  <text x="680" y="420" font-family="monospace" font-size="11" fill="#4a7050" opacity="0.9">→ Prochaine erreur: impact limité</text>
  <text x="680" y="440" font-family="monospace" font-size="11" fill="#4a7050" opacity="0.9">→ Signaux remontés proactivement</text>

  <text x="600" y="555" font-family="Georgia, serif" font-size="25" fill="#e0e8ff" text-anchor="middle" opacity="0.9">Chercher les causes systémiques, pas les coupables</text>
</svg>
