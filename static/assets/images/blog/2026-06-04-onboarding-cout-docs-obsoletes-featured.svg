<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1320;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b9cbf" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- README file (stale) -->
  <rect x="80" y="100" width="340" height="400" rx="10" fill="#1e1a28" stroke="#ff6b6b" stroke-width="1.5" opacity="0.7"/>
  <text x="250" y="135" font-family="monospace" font-size="13" fill="#ff6b6b" opacity="0.7" text-anchor="middle">README.md</text>
  <text x="250" y="155" font-family="monospace" font-size="9" fill="#5a4060" text-anchor="middle">Dernière modification : 18 mois</text>
  <line x1="100" y1="165" x2="400" y2="165" stroke="#2a2040" stroke-width="1"/>

  <!-- Code blocks -->
  <rect x="100" y="178" width="300" height="22" rx="3" fill="#2a1e30"/>
  <text x="110" y="193" font-family="monospace" font-size="10" fill="#6a4070">$ npm install &amp;&amp; npm start</text>

  <rect x="100" y="210" width="300" height="22" rx="3" fill="#2a1e30"/>
  <text x="110" y="225" font-family="monospace" font-size="10" fill="#6a4070">$ node --version # requires 14.x</text>

  <text x="110" y="260" font-family="monospace" font-size="10" fill="#5a4060">Configure .env:</text>
  <text x="110" y="278" font-family="monospace" font-size="10" fill="#5a4060">DB_HOST=localhost:5432</text>
  <text x="110" y="296" font-family="monospace" font-size="10" fill="#5a4060">AUTH_SERVICE=http://auth.local</text>

  <!-- Error overlays -->
  <rect x="100" y="178" width="300" height="22" rx="3" fill="#ff000020"/>
  <text x="410" y="193" font-family="monospace" font-size="9" fill="#ff6b6b">✗ Node 14 EOL</text>

  <rect x="100" y="210" width="300" height="22" rx="3" fill="#ff000015"/>
  <text x="410" y="225" font-family="monospace" font-size="9" fill="#ff6b6b">✗ v20 requis</text>

  <text x="410" y="278" font-family="monospace" font-size="9" fill="#ff6b6b">✗ port changé</text>
  <text x="410" y="296" font-family="monospace" font-size="9" fill="#ff6b6b">✗ déprécié</text>

  <!-- Days counter: -->
  <rect x="100" y="370" width="300" height="110" rx="8" fill="#2a1520" stroke="#ff6b6b" stroke-width="1"/>
  <text x="250" y="400" font-family="monospace" font-size="12" fill="#ff6b6b" text-anchor="middle">Jours avant 1ère contribution</text>
  <text x="250" y="440" font-family="Georgia, serif" font-size="42" fill="#ff6b6b" opacity="0.7" text-anchor="middle">32</text>
  <text x="250" y="468" font-family="monospace" font-size="10" fill="#804060" text-anchor="middle">docs obsolètes · interruptions constantes</text>

  <!-- Arrow -->
  <line x1="450" y1="310" x2="530" y2="310" stroke="#a6f079" stroke-width="2.5" opacity="0.6"/>
  <polygon points="530,303 546,310 530,317" fill="#a6f079" opacity="0.6"/>

  <!-- Good onboarding -->
  <rect x="570" y="100" width="560" height="400" rx="10" fill="#1a2a1a" stroke="#a6f079" stroke-width="1.5" opacity="0.6"/>
  <text x="850" y="135" font-family="monospace" font-size="13" fill="#a6f079" opacity="0.7" text-anchor="middle">Onboarding-as-test</text>
  <text x="850" y="155" font-family="monospace" font-size="9" fill="#4a7050" text-anchor="middle">Le nouveau corrige la doc en avançant</text>
  <line x1="590" y1="165" x2="1110" y2="165" stroke="#2a4030" stroke-width="1"/>

  <text x="590" y="200" font-family="monospace" font-size="11" fill="#a6f079">✓ Commandes testées à chaque PR</text>
  <text x="590" y="222" font-family="monospace" font-size="11" fill="#a6f079">✓ Pièges connus documentés</text>
  <text x="590" y="244" font-family="monospace" font-size="11" fill="#a6f079">✓ Décisions archi + raisons</text>
  <text x="590" y="266" font-family="monospace" font-size="11" fill="#a6f079">✓ Propriétaire assigné par section</text>
  <text x="590" y="288" font-family="monospace" font-size="11" fill="#a6f079">✓ Revue mensuelle automatisée</text>

  <rect x="590" y="370" width="460" height="110" rx="8" fill="#1a3020" stroke="#a6f079" stroke-width="1"/>
  <text x="820" y="400" font-family="monospace" font-size="12" fill="#a6f079" text-anchor="middle">Jours avant 1ère contribution</text>
  <text x="820" y="440" font-family="Georgia, serif" font-size="42" fill="#a6f079" opacity="0.7" text-anchor="middle">4</text>
  <text x="820" y="468" font-family="monospace" font-size="10" fill="#4a7050" text-anchor="middle">doc vivante · autonomie rapide</text>

  <text x="600" y="560" font-family="Georgia, serif" font-size="26" fill="#e0e8ff" text-anchor="middle" opacity="0.9">La doc obsolète est une dette invisible</text>
</svg>
