<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1320;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b9cbf" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Epic left - vague, open ended -->
  <text x="270" y="110" font-family="monospace" font-size="14" fill="#c792e9" opacity="0.7" text-anchor="middle">EPIC</text>
  <rect x="80" y="130" width="380" height="310" rx="10" fill="#1e1a30" stroke="#c792e9" stroke-width="1" opacity="0.5"/>
  <text x="270" y="168" font-family="Georgia, serif" font-size="17" fill="#8b7cb0" text-anchor="middle">« Amélioration de</text>
  <text x="270" y="192" font-family="Georgia, serif" font-size="17" fill="#8b7cb0" text-anchor="middle">l'expérience utilisateur »</text>
  <!-- Fuzzy tickets inside -->
  <rect x="110" y="215" width="320" height="28" rx="4" fill="#2a2050" opacity="0.6"/>
  <text x="270" y="234" font-family="monospace" font-size="10" fill="#6a5a90" text-anchor="middle">Story #112 · Story #113 · Story #114...</text>
  <rect x="110" y="253" width="240" height="28" rx="4" fill="#2a2050" opacity="0.4"/>
  <text x="230" y="272" font-family="monospace" font-size="10" fill="#6a5a90" text-anchor="middle">Story #128 · Story #129...</text>
  <rect x="110" y="291" width="280" height="28" rx="4" fill="#2a2050" opacity="0.3"/>
  <text x="250" y="310" font-family="monospace" font-size="10" fill="#6a5a90" text-anchor="middle">Story #155 · Story #156...</text>
  <!-- Question mark: when is it done? -->
  <text x="270" y="380" font-family="Georgia, serif" font-size="48" fill="#c792e9" opacity="0.25" text-anchor="middle">?</text>
  <text x="270" y="420" font-family="monospace" font-size="11" fill="#c792e9" opacity="0.5" text-anchor="middle">Quand est-ce terminé ?</text>

  <!-- Arrow -->
  <line x1="500" y1="290" x2="580" y2="290" stroke="#64b5f6" stroke-width="2.5" opacity="0.6"/>
  <polygon points="580,283 596,290 580,297" fill="#64b5f6" opacity="0.6"/>

  <!-- Capability right - precise, binary -->
  <text x="860" y="110" font-family="monospace" font-size="14" fill="#a6f079" opacity="0.7" text-anchor="middle">CAPABILITY</text>
  <rect x="620" y="130" width="480" height="310" rx="10" fill="#1a2a1a" stroke="#a6f079" stroke-width="1.5" opacity="0.6"/>
  <text x="860" y="175" font-family="Georgia, serif" font-size="20" fill="#e0e8ff" text-anchor="middle">Export CSV des rapports</text>
  <line x1="660" y1="195" x2="1060" y2="195" stroke="#a6f079" stroke-width="0.5" opacity="0.3"/>
  <text x="860" y="225" font-family="monospace" font-size="12" fill="#8b9cbf" text-anchor="middle">Terminée quand :</text>
  <text x="860" y="250" font-family="monospace" font-size="12" fill="#a6f079" text-anchor="middle">✓ Export depuis toute vue rapport</text>
  <text x="860" y="272" font-family="monospace" font-size="12" fill="#a6f079" text-anchor="middle">✓ Format CSV valide</text>
  <text x="860" y="294" font-family="monospace" font-size="12" fill="#a6f079" text-anchor="middle">✓ Filtres inclus dans l'export</text>
  <text x="860" y="316" font-family="monospace" font-size="12" fill="#a6f079" text-anchor="middle">✓ Accessible sans droits spéciaux</text>
  <!-- Binary status -->
  <rect x="700" y="360" width="320" height="52" rx="8" fill="#1f3020" stroke="#a6f079" stroke-width="1" opacity="0.7"/>
  <text x="860" y="383" font-family="monospace" font-size="12" fill="#a6f079" text-anchor="middle">État : LIVRÉE ou PAS LIVRÉE</text>
  <text x="860" y="402" font-family="monospace" font-size="11" fill="#6a8a6a" text-anchor="middle">critère binaire, évaluable indépendamment</text>

  <!-- Title -->
  <text x="600" y="555" font-family="Georgia, serif" font-size="26" fill="#e0e8ff" text-anchor="middle" opacity="0.9">La précision du mot change la précision du travail</text>
</svg>
