<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/><stop offset="60%" stop-color="#0a0f1a"/><stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.15"/><stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#6ecf00" stop-opacity="0.10"/><stop offset="100%" stop-color="#6ecf00" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- Service Value Chain - 6 activities as connected blocks -->
  <g>
    <!-- Planifier -->
    <rect x="140" y="120" width="150" height="40" rx="5" fill="#a6f079" fill-opacity="0.10" stroke="#a6f079" stroke-width="1" stroke-opacity="0.5"/>
    <text x="215" y="145" text-anchor="middle" font-size="11" fill="#a6f079" font-weight="600">Planifier</text>
    <!-- Center hub -->
    <circle cx="215" cy="290" r="50" fill="#a6f079" fill-opacity="0.07" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="215" y="285" text-anchor="middle" font-size="9" fill="#a6f079" font-weight="700">Service</text>
    <text x="215" y="300" text-anchor="middle" font-size="9" fill="#a6f079" font-weight="700">Value</text>

    <!-- Améliorer -->
    <rect x="310" y="170" width="100" height="40" rx="5" fill="#c792e9" fill-opacity="0.09" stroke="#c792e9" stroke-width="1" stroke-opacity="0.45"/>
    <text x="360" y="195" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600">Améliorer</text>

    <!-- Engager -->
    <rect x="310" y="270" width="100" height="40" rx="5" fill="#6ecf00" fill-opacity="0.08" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.4"/>
    <text x="360" y="295" text-anchor="middle" font-size="10" fill="#6ecf00" font-weight="600">Engager</text>

    <!-- Concevoir -->
    <rect x="310" y="370" width="100" height="40" rx="5" fill="#ff6b9d" fill-opacity="0.07" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.35"/>
    <text x="360" y="395" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="600">Concevoir</text>

    <!-- Obtenir -->
    <rect x="90" y="270" width="90" height="40" rx="5" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.4"/>
    <text x="135" y="295" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600">Obtenir</text>

    <!-- Livrer -->
    <rect x="90" y="370" width="90" height="40" rx="5" fill="#c792e9" fill-opacity="0.07" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
    <text x="135" y="395" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600">Livrer</text>
  </g>

  <!-- Connecting lines to center -->
  <g stroke="#a6f079" stroke-opacity="0.2" stroke-width="1">
    <line x1="215" y1="160" x2="215" y2="240"/>
    <line x1="310" y1="190" x2="260" y2="265"/>
    <line x1="310" y1="290" x2="265" y2="290"/>
    <line x1="310" y1="390" x2="260" y2="315"/>
    <line x1="180" y1="290" x2="135" y2="290"/>
    <line x1="180" y1="315" x2="135" y2="390"/>
  </g>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">STANDARD · SERVICES IT</text>
  <text x="500" y="270" font-size="72" font-weight="800" fill="#f8fafc" letter-spacing="-2">ITIL 4</text>
  <text x="500" y="335" font-size="18" font-weight="600" fill="#8b9cbf">Information Technology</text>
  <text x="500" y="360" font-size="18" font-weight="600" fill="#8b9cbf">Infrastructure Library</text>
  <text x="500" y="398" font-size="16" fill="#475569">34 pratiques · Service Value System</text>
  <line x1="500" y1="422" x2="850" y2="422" stroke="#1e293b" stroke-width="1"/>
  <g><rect x="500" y="437" width="80" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
  <text x="540" y="456" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">Incidents</text></g>
  <g><rect x="592" y="437" width="80" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
  <text x="632" y="456" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">SLA/SLO</text></g>
  <g><rect x="684" y="437" width="72" height="28" rx="14" fill="#6ecf00" fill-opacity="0.08" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.35"/>
  <text x="720" y="456" text-anchor="middle" font-size="10" fill="#6ecf00" font-weight="600" letter-spacing="0.5">ITSM</text></g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
