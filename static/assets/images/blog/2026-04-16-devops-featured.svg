<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/><stop offset="60%" stop-color="#0a0f1a"/><stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.18"/><stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#c792e9" stop-opacity="0.12"/><stop offset="100%" stop-color="#c792e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- Infinity loop (DevOps symbol) -->
  <!-- Left lobe -->
  <path d="M215,290 Q160,210 105,230 Q50,250 50,290 Q50,330 105,350 Q160,370 215,290 Z" fill="none" stroke="#a6f079" stroke-width="2.5" stroke-opacity="0.7"/>
  <!-- Right lobe -->
  <path d="M215,290 Q270,210 325,230 Q380,250 380,290 Q380,330 325,350 Q270,370 215,290 Z" fill="none" stroke="#c792e9" stroke-width="2.5" stroke-opacity="0.7"/>

  <!-- Crossing glow -->
  <circle cx="215" cy="290" r="12" fill="#a6f079" fill-opacity="0.3" filter="url(#glow)"/>
  <circle cx="215" cy="290" r="5" fill="#a6f079" filter="url(#glow)"/>

  <!-- Dev / Ops labels -->
  <text x="110" y="282" text-anchor="middle" font-size="14" fill="#a6f079" font-weight="800">Dev</text>
  <text x="320" y="282" text-anchor="middle" font-size="14" fill="#c792e9" font-weight="800">Ops</text>

  <!-- Flow dots -->
  <circle cx="75" cy="270" r="4" fill="#a6f079" fill-opacity="0.7"/>
  <circle cx="100" cy="240" r="4" fill="#a6f079" fill-opacity="0.6"/>
  <circle cx="155" cy="220" r="4" fill="#a6f079" fill-opacity="0.5"/>
  <circle cx="355" cy="240" r="4" fill="#c792e9" fill-opacity="0.7"/>
  <circle cx="330" cy="320" r="4" fill="#c792e9" fill-opacity="0.6"/>
  <circle cx="270" cy="355" r="4" fill="#c792e9" fill-opacity="0.5"/>

  <!-- DORA metrics label -->
  <text x="215" y="410" text-anchor="middle" font-size="10" fill="#8b9cbf" opacity="0.7">Métriques DORA · CI/CD · IaC</text>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">CULTURE · ORGANISATION</text>
  <text x="500" y="270" font-size="72" font-weight="800" fill="#f8fafc" letter-spacing="-3">DevOps</text>
  <text x="500" y="340" font-size="18" font-weight="600" fill="#8b9cbf">Dev + Ops = une seule équipe</text>
  <text x="500" y="390" font-size="16" fill="#475569">Culture · Automatisation · Mesure · Partage</text>
  <line x1="500" y1="415" x2="850" y2="415" stroke="#1e293b" stroke-width="1"/>
  <g><rect x="500" y="430" width="56" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
  <text x="528" y="449" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">CI/CD</text></g>
  <g><rect x="568" y="430" width="64" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
  <text x="600" y="449" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">DORA</text></g>
  <g><rect x="644" y="430" width="56" height="28" rx="14" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.35"/>
  <text x="672" y="449" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="600" letter-spacing="0.5">SRE</text></g>
  <g><rect x="712" y="430" width="56" height="28" rx="14" fill="#6ecf00" fill-opacity="0.08" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.35"/>
  <text x="740" y="449" text-anchor="middle" font-size="10" fill="#6ecf00" font-weight="600" letter-spacing="0.5">IaC</text></g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
