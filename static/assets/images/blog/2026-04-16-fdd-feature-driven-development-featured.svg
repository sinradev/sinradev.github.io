<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/><stop offset="60%" stop-color="#0a0f1a"/><stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#6ecf00" stop-opacity="0.16"/><stop offset="100%" stop-color="#6ecf00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.10"/><stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- Feature tree structure -->
  <!-- Root -->
  <circle cx="215" cy="160" r="22" fill="#a6f079" fill-opacity="0.12" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.6" filter="url(#glow)"/>
  <text x="215" y="165" text-anchor="middle" font-size="9" fill="#a6f079" font-weight="700">Modèle</text>

  <!-- Trunk -->
  <line x1="215" y1="182" x2="215" y2="220" stroke="#a6f079" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Feature areas -->
  <line x1="215" y1="220" x2="100" y2="255" stroke="#6ecf00" stroke-opacity="0.35" stroke-width="1.2"/>
  <line x1="215" y1="220" x2="215" y2="255" stroke="#6ecf00" stroke-opacity="0.35" stroke-width="1.2"/>
  <line x1="215" y1="220" x2="330" y2="255" stroke="#6ecf00" stroke-opacity="0.35" stroke-width="1.2"/>

  <rect x="60" y="255" width="80" height="24" rx="4" fill="#6ecf00" fill-opacity="0.08" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.5"/>
  <text x="100" y="271" text-anchor="middle" font-size="8" fill="#6ecf00" font-weight="600">Feature A</text>
  <rect x="175" y="255" width="80" height="24" rx="4" fill="#6ecf00" fill-opacity="0.08" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.5"/>
  <text x="215" y="271" text-anchor="middle" font-size="8" fill="#6ecf00" font-weight="600">Feature B</text>
  <rect x="290" y="255" width="80" height="24" rx="4" fill="#6ecf00" fill-opacity="0.08" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.5"/>
  <text x="330" y="271" text-anchor="middle" font-size="8" fill="#6ecf00" font-weight="600">Feature C</text>

  <!-- Sub-features -->
  <line x1="100" y1="279" x2="70" y2="310" stroke="#a6f079" stroke-opacity="0.25" stroke-width="1"/>
  <line x1="100" y1="279" x2="130" y2="310" stroke="#a6f079" stroke-opacity="0.25" stroke-width="1"/>
  <circle cx="70" cy="318" r="10" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="0.8" stroke-opacity="0.4"/>
  <circle cx="130" cy="318" r="10" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="215" y1="279" x2="215" y2="310" stroke="#a6f079" stroke-opacity="0.25" stroke-width="1"/>
  <circle cx="215" cy="318" r="10" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="330" y1="279" x2="300" y2="310" stroke="#a6f079" stroke-opacity="0.25" stroke-width="1"/>
  <line x1="330" y1="279" x2="360" y2="310" stroke="#a6f079" stroke-opacity="0.25" stroke-width="1"/>
  <circle cx="300" cy="318" r="10" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="0.8" stroke-opacity="0.4"/>
  <circle cx="360" cy="318" r="10" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- 2-week build label -->
  <rect x="100" y="380" width="230" height="28" rx="6" fill="#c792e9" fill-opacity="0.07" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
  <text x="215" y="399" text-anchor="middle" font-size="9" fill="#c792e9" font-weight="600">Feature par feature · 2 semaines</text>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">AGILITÉ · FONCTIONNALITÉS</text>
  <text x="500" y="268" font-size="62" font-weight="800" fill="#f8fafc" letter-spacing="-2">FDD</text>
  <text x="500" y="330" font-size="18" font-weight="600" fill="#8b9cbf">Feature-Driven</text>
  <text x="500" y="356" font-size="18" font-weight="600" fill="#8b9cbf">Development</text>
  <text x="500" y="395" font-size="15" fill="#475569">Livraison feature par feature · cycles courts</text>
  <line x1="500" y1="418" x2="850" y2="418" stroke="#1e293b" stroke-width="1"/>
  <g><rect x="500" y="433" width="72" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
  <text x="536" y="452" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">Features</text></g>
  <g><rect x="584" y="433" width="64" height="28" rx="14" fill="#6ecf00" fill-opacity="0.08" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.35"/>
  <text x="616" y="452" text-anchor="middle" font-size="10" fill="#6ecf00" font-weight="600" letter-spacing="0.5">Modèle</text></g>
  <g><rect x="660" y="433" width="80" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
  <text x="700" y="452" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">Itératif</text></g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
