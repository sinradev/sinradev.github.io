<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0e17;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14532d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.25" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient glow - red left, amber right -->
  <circle cx="150" cy="200" r="220" fill="#dc2626" opacity="0.04"/>
  <circle cx="1050" cy="180" r="200" fill="#d97706" opacity="0.04"/>
  <circle cx="600" cy="280" r="300" fill="#1d4ed8" opacity="0.03"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- LEFT PANEL: "LIVE CODING" scene -->
  <!-- ══════════════════════════════════════════════════════════ -->

  <!-- Terminal window -->
  <rect x="55" y="42" width="500" height="330" rx="10" fill="#0f1623" stroke="#1e2d45" stroke-width="1.5"/>

  <!-- Terminal title bar -->
  <rect x="55" y="42" width="500" height="32" rx="10" fill="#161f2e"/>
  <rect x="55" y="58" width="500" height="16" fill="#161f2e"/>
  <!-- window buttons -->
  <circle cx="80" cy="58" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="100" cy="58" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="120" cy="58" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="305" y="63" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#475569">live_coding_test.py</text>

  <!-- LIVE badge -->
  <rect x="480" y="47" width="60" height="20" rx="4" fill="#dc2626" opacity="0.9"/>
  <circle cx="491" cy="57" r="4" fill="#ffffff" opacity="0.9"/>
  <text x="511" y="62" font-family="Arial, sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#ffffff">LIVE</text>

  <!-- Code content -->
  <text x="75" y="100" font-family="'Courier New', monospace" font-size="11" fill="#64748b"># Implement a balanced BST with O(log n) insert,</text>
  <text x="75" y="116" font-family="'Courier New', monospace" font-size="11" fill="#64748b"># delete, search + LRU cache + Dijkstra shortest path</text>
  <text x="75" y="132" font-family="'Courier New', monospace" font-size="11" fill="#64748b"># Thread-safe. No libraries. 20 minutes.</text>

  <text x="75" y="156" font-family="'Courier New', monospace" font-size="11" fill="#94a3b8">class <tspan fill="#7dd3fc">BalancedBST</tspan>:</text>
  <text x="75" y="172" font-family="'Courier New', monospace" font-size="11" fill="#94a3b8">    def <tspan fill="#a78bfa">__init__</tspan>(self):</text>
  <text x="75" y="188" font-family="'Courier New', monospace" font-size="11" fill="#64748b">        # TODO: implement everything in 20 min</text>
  <text x="75" y="204" font-family="'Courier New', monospace" font-size="11" fill="#94a3b8">        self.root = <tspan fill="#f87171">None</tspan>  <tspan fill="#64748b"># where to start??</tspan></text>

  <!-- Blinking cursor line -->
  <text x="75" y="220" font-family="'Courier New', monospace" font-size="11" fill="#94a3b8">        </text>
  <rect x="75" y="208" width="8" height="14" fill="#7dd3fc" opacity="0.8"/>

  <!-- Panic comments -->
  <text x="75" y="244" font-family="'Courier New', monospace" font-size="10" fill="#475569"># wait... AVL or Red-Black? they didn't say...</text>
  <text x="75" y="258" font-family="'Courier New', monospace" font-size="10" fill="#475569"># do I need to handle duplicates?</text>
  <text x="75" y="272" font-family="'Courier New', monospace" font-size="10" fill="#475569"># they're staring at me why are they staring</text>

  <!-- Stress bar -->
  <text x="75" y="300" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Stress level</text>
  <rect x="75" y="307" width="340" height="8" rx="4" fill="#1e2d45"/>
  <rect x="75" y="307" width="320" height="8" rx="4" fill="#ef4444" opacity="0.85"/>
  <text x="425" y="316" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" font-weight="700">97%</text>

  <!-- Timer -->
  <rect x="75" y="325" width="160" height="34" rx="6" fill="#1e2d45" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
  <text x="90" y="347" font-family="'Courier New', monospace" font-size="18" font-weight="700" fill="#ef4444" filter="url(#glow-red)">12:34</text>
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="10" fill="#64748b">/ 20:00</text>

  <!-- Interviewers watching -->
  <!-- Observer 1 -->
  <circle cx="390" cy="336" r="22" fill="#161f2e" stroke="#dc2626" stroke-width="1.5" opacity="0.9"/>
  <circle cx="390" cy="328" r="8" fill="#334155"/>
  <path d="M 372 348 Q 390 360 408 348" fill="#334155"/>
  <!-- eye glow -->
  <circle cx="387" cy="326" r="3" fill="#ef4444" opacity="0.9"/>
  <circle cx="393" cy="326" r="3" fill="#ef4444" opacity="0.9"/>

  <!-- Observer 2 -->
  <circle cx="440" cy="336" r="22" fill="#161f2e" stroke="#dc2626" stroke-width="1.5" opacity="0.9"/>
  <circle cx="440" cy="328" r="8" fill="#334155"/>
  <path d="M 422 348 Q 440 360 458 348" fill="#334155"/>
  <circle cx="437" cy="326" r="3" fill="#ef4444" opacity="0.9"/>
  <circle cx="443" cy="326" r="3" fill="#ef4444" opacity="0.9"/>

  <text x="414" y="372" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#dc2626" opacity="0.8">ils observent</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- RIGHT PANEL: Reality vs claimed comparison -->
  <!-- ══════════════════════════════════════════════════════════ -->

  <!-- Panel header -->
  <text x="625" y="62" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="2">LE PROCESSUS EN VRAI</text>

  <!-- Step 1: Phone screen -->
  <rect x="620" y="75" width="520" height="44" rx="8" fill="#111c30" stroke="#1e2d45" stroke-width="1"/>
  <rect x="620" y="75" width="4" height="44" rx="2" fill="#3b82f6"/>
  <text x="636" y="94" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#7dd3fc">01 · Screening RH</text>
  <text x="636" y="110" font-family="Arial, sans-serif" font-size="10" fill="#64748b">30 min pour vérifier que vous avez bien postulé</text>
  <rect x="1060" y="85" width="65" height="18" rx="4" fill="#1e3a5f" opacity="0.6"/>
  <text x="1092" y="98" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7dd3fc">30 min</text>

  <!-- Step 2: Tech intro -->
  <rect x="620" y="127" width="520" height="44" rx="8" fill="#111c30" stroke="#1e2d45" stroke-width="1"/>
  <rect x="620" y="127" width="4" height="44" rx="2" fill="#8b5cf6"/>
  <text x="636" y="146" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#c4b5fd">02 · Entretien technique</text>
  <text x="636" y="162" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Vérifier que vous savez ce qu'est une variable</text>
  <rect x="1060" y="137" width="65" height="18" rx="4" fill="#2e1065" opacity="0.6"/>
  <text x="1092" y="150" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#c4b5fd">1h</text>

  <!-- Step 3: Test maison -->
  <rect x="620" y="179" width="520" height="56" rx="8" fill="#1a0f0f" stroke="#7f1d1d" stroke-width="1.5"/>
  <rect x="620" y="179" width="4" height="56" rx="2" fill="#ef4444"/>
  <text x="636" y="198" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ef4444">03 · Test maison</text>
  <text x="636" y="214" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Annoncé : 3 heures max</text>
  <text x="636" y="227" font-family="Arial, sans-serif" font-size="10" fill="#fca5a5">Réalité : tout le weekend, non payé</text>
  <rect x="1035" y="189" width="90" height="18" rx="4" fill="#7f1d1d" opacity="0.7"/>
  <text x="1080" y="202" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fca5a5">48h réelles</text>
  <rect x="1035" y="213" width="90" height="18" rx="4" fill="#15803d" opacity="0.5"/>
  <text x="1080" y="226" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#86efac">3h claimées</text>

  <!-- Step 4: Code review live -->
  <rect x="620" y="243" width="520" height="44" rx="8" fill="#111c30" stroke="#1e2d45" stroke-width="1"/>
  <rect x="620" y="243" width="4" height="44" rx="2" fill="#f59e0b"/>
  <text x="636" y="262" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#fbbf24">04 · Revue de code en live</text>
  <text x="636" y="278" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Chercher des pièges dans votre weekend de travail</text>
  <rect x="1060" y="253" width="65" height="18" rx="4" fill="#451a03" opacity="0.6"/>
  <text x="1092" y="266" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fbbf24">1h30</text>

  <!-- Step 5: Culture fit -->
  <rect x="620" y="295" width="520" height="44" rx="8" fill="#111c30" stroke="#1e2d45" stroke-width="1"/>
  <rect x="620" y="295" width="4" height="44" rx="2" fill="#ec4899"/>
  <text x="636" y="314" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#f9a8d4">05 · Culture fit</text>
  <text x="636" y="330" font-family="Arial, sans-serif" font-size="10" fill="#64748b">"Are you aligned with our values?" (non définis)</text>
  <rect x="1060" y="305" width="65" height="18" rx="4" fill="#500724" opacity="0.6"/>
  <text x="1092" y="318" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#f9a8d4">1h</text>

  <!-- Total cost -->
  <rect x="620" y="348" width="520" height="28" rx="6" fill="#1a0909" stroke="#7f1d1d" stroke-width="1"/>
  <text x="636" y="366" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Total candidat :</text>
  <text x="780" y="366" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ef4444">15 à 25 heures</text>
  <text x="940" y="366" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">pour souvent...</text>
  <text x="1055" y="366" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ef4444">rien</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- BOTTOM MIDDLE: The fix -->
  <!-- ══════════════════════════════════════════════════════════ -->

  <!-- VS Arrow pointing down -->
  <text x="600" y="230" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#475569" opacity="0.4">VS</text>

  <!-- The fix panel -->
  <rect x="55" y="392" width="500" height="78" rx="10" fill="#0f2e1a" stroke="#15803d" stroke-width="1.5"/>
  <rect x="55" y="392" width="500" height="28" rx="10" fill="#14532d" opacity="0.6"/>
  <rect x="55" y="406" width="500" height="14" fill="#14532d" opacity="0.6"/>
  <text x="305" y="411" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#86efac" letter-spacing="1">LA PROPOSITION RAISONNABLE</text>

  <!-- Two interviews only -->
  <rect x="70" y="428" width="220" height="32" rx="6" fill="#052e16" stroke="#16a34a" stroke-width="1"/>
  <text x="180" y="443" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#22c55e">1 entretien technique</text>
  <text x="180" y="457" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#86efac">Problème réel du poste, 1h max</text>

  <text x="310" y="447" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#22c55e" opacity="0.7">+</text>

  <rect x="330" y="428" width="210" height="32" rx="6" fill="#052e16" stroke="#16a34a" stroke-width="1"/>
  <text x="435" y="443" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#22c55e">1 entretien RH</text>
  <text x="435" y="457" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#86efac">Conditions, attentes mutuelles, 1h</text>

  <!-- Period essai panel -->
  <rect x="620" y="392" width="520" height="78" rx="10" fill="#111c30" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="620" y="392" width="520" height="28" rx="10" fill="#1e3a8a" opacity="0.4"/>
  <rect x="620" y="406" width="520" height="14" fill="#1e3a8a" opacity="0.4"/>
  <text x="880" y="411" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#93c5fd" letter-spacing="1">LA PÉRIODE D'ESSAI FAIT LE RESTE</text>

  <text x="636" y="440" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">3 mois de travail réel</text>
  <text x="636" y="456" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Vrai contexte · Vrais collègues · Vrais problèmes</text>

  <!-- checkmarks -->
  <text x="830" y="440" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">✓ Prédictif</text>
  <text x="920" y="440" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">✓ Honnête</text>
  <text x="1010" y="440" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">✓ Contextuel</text>

  <text x="830" y="457" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Aucun entretien ne remplace ça.</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- TITLE BAND -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="0" y="490" width="1200" height="140" fill="#060a10" opacity="0.97"/>
  <rect x="0" y="489" width="1200" height="2" fill="#ef4444" opacity="0.4"/>

  <!-- Main title -->
  <text x="600" y="545" font-family="Arial, sans-serif" font-size="44" font-weight="bold" text-anchor="middle" fill="#ffffff" letter-spacing="-1">Le grand théâtre des entretiens tech</text>

  <!-- Subtitle -->
  <text x="600" y="582" font-family="Arial, sans-serif" font-size="20" font-weight="normal" text-anchor="middle" fill="#94a3b8">Tests irréalistes, live coding sous pression, 5 étapes pour rien</text>

  <!-- Tags -->
  <rect x="388" y="599" width="130" height="22" rx="11" fill="#ef4444" opacity="0.12"/>
  <text x="453" y="615" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ef4444">Work Culture</text>

  <rect x="530" y="599" width="145" height="22" rx="11" fill="#7dd3fc" opacity="0.1"/>
  <text x="602" y="615" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#7dd3fc">Recrutement Tech</text>

  <rect x="688" y="599" width="130" height="22" rx="11" fill="#a78bfa" opacity="0.1"/>
  <text x="753" y="615" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#a78bfa">Productivité</text>

  <!-- Branding -->
  <text x="1155" y="617" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="end" fill="#ef4444" opacity="0.4">sinra.app</text>
</svg>
