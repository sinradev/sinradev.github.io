  <rect x="0" y="70" width="340" height="3" fill="#a6f079"/>

  <!-- Peer network: circle of equal nodes, no hierarchy -->
  <g>
    <g stroke="#8b9cbf" stroke-width="1.8" opacity="0.4">
      <line x1="600" y1="200" x2="440" y2="270"/>
      <line x1="440" y1="270" x2="440" y2="360"/>
