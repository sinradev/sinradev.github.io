  <text x="600" y="540" font-family="Arial, sans-serif" font-size="50" font-weight="bold" text-anchor="middle" fill="#a6f079">Developer en 2026</text>

  <text x="600" y="582" font-family="Arial, sans-serif" font-size="24" font-weight="normal" text-anchor="middle" fill="#c792e9">Pas besoin d'un titre pour se sacrifier pour l'équipe</text>

  <text x="1150" y="614" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="end" fill="#a6f079" opacity="0.7">sinra.app</text>
