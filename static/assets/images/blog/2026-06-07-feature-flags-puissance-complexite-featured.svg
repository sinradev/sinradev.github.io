<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1320;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b9cbf" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Flag toggles panel -->
  <rect x="80" y="90" width="500" height="380" rx="10" fill="#181e30" stroke="#2a3560" stroke-width="1.5"/>
  <text x="330" y="125" font-family="monospace" font-size="13" fill="#8b9cbf" text-anchor="middle">Feature Flags · Production</text>
  <line x1="100" y1="135" x2="560" y2="135" stroke="#2a3560" stroke-width="1"/>

  <!-- Toggle rows -->
  <!-- Row 1: good flag -->
  <text x="110" y="165" font-family="monospace" font-size="12" fill="#a6f079">new_checkout_flow</text>
  <rect x="460" y="150" width="50" height="22" rx="11" fill="#1a3020" stroke="#a6f079" stroke-width="1.5"/>
  <circle cx="500" cy="161" r="9" fill="#a6f079"/>
  <text x="530" y="165" font-family="monospace" font-size="10" fill="#4a7050">ON · 100%</text>

  <!-- Row 2 -->
  <text x="110" y="200" font-family="monospace" font-size="12" fill="#64b5f6">payment_v2_beta</text>
  <rect x="460" y="185" width="50" height="22" rx="11" fill="#1a2540" stroke="#64b5f6" stroke-width="1.5"/>
  <circle cx="480" cy="196" r="9" fill="#64b5f6" opacity="0.7"/>
  <text x="530" y="200" font-family="monospace" font-size="10" fill="#4a6080">ON · 15%</text>

  <!-- Row 3: stale flag (red) -->
  <text x="110" y="235" font-family="monospace" font-size="12" fill="#ff6b6b">old_dashboard_redesign</text>
  <rect x="460" y="220" width="50" height="22" rx="11" fill="#2a1520" stroke="#ff6b6b" stroke-width="1.5"/>
  <circle cx="500" cy="231" r="9" fill="#ff6b6b" opacity="0.6"/>
  <text x="530" y="235" font-family="monospace" font-size="10" fill="#804060">ON · 100% · 9 mois</text>
  <text x="110" y="248" font-family="monospace" font-size="9" fill="#804060">⚠ propriétaire inconnu · à supprimer</text>

  <!-- Row 4: stale -->
  <text x="110" y="278" font-family="monospace" font-size="12" fill="#ffd54f">experiment_ab_2024_q2</text>
  <rect x="460" y="263" width="50" height="22" rx="11" fill="#251e10" stroke="#ffd54f" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="500" cy="274" r="9" fill="#ffd54f" opacity="0.4"/>
  <text x="530" y="278" font-family="monospace" font-size="10" fill="#806020">ON · exp. passée</text>

  <!-- Row 5 conflict -->
  <text x="110" y="313" font-family="monospace" font-size="12" fill="#ff6b6b">feature_auth_v3</text>
  <rect x="460" y="298" width="50" height="22" rx="11" fill="#2a1520" stroke="#ff6b6b" stroke-width="1.5"/>
  <circle cx="500" cy="309" r="9" fill="#ff6b6b" opacity="0.5"/>
  <text x="530" y="313" font-family="monospace" font-size="10" fill="#804060">ON · conflicte avec #3</text>

  <!-- Row 6 -->
  <text x="110" y="348" font-family="monospace" font-size="12" fill="#8b9cbf">...</text>
  <text x="160" y="348" font-family="monospace" font-size="12" fill="#4a5580">42 autres flags</text>

  <!-- Counter bottom -->
  <rect x="100" y="390" width="460" height="60" rx="6" fill="#1e1520" stroke="#ff6b6b" stroke-width="1"/>
  <text x="330" y="420" font-family="monospace" font-size="13" fill="#ff6b6b" text-anchor="middle">47 flags actifs · 5 documentés</text>
  <text x="330" y="440" font-family="monospace" font-size="11" fill="#804060" text-anchor="middle">3 orphelins · 2 conflictuels</text>

  <!-- Right: solutions -->
  <rect x="640" y="90" width="480" height="380" rx="10" fill="#1a2030" stroke="#a6f079" stroke-width="1.5" opacity="0.6"/>
  <text x="880" y="125" font-family="monospace" font-size="13" fill="#a6f079" text-anchor="middle">Règles de gestion saine</text>
  <line x1="660" y1="135" x2="1100" y2="135" stroke="#2a4030" stroke-width="1"/>

  <text x="660" y="175" font-family="monospace" font-size="12" fill="#a6f079">① Date d'expiration obligatoire</text>
  <text x="680" y="195" font-family="monospace" font-size="10" fill="#6a8060">Chaque flag a une date. Passée : supprimer ou renouveler.</text>

  <text x="660" y="230" font-family="monospace" font-size="12" fill="#a6f079">② Propriétaire assigné</text>
  <text x="680" y="250" font-family="monospace" font-size="10" fill="#6a8060">Qui est responsable de la suppression ?</text>

  <text x="660" y="285" font-family="monospace" font-size="12" fill="#a6f079">③ Inventaire mensuel</text>
  <text x="680" y="305" font-family="monospace" font-size="10" fill="#6a8060">Revue : encore nécessaire ? Action sous 2 semaines.</text>

  <text x="660" y="340" font-family="monospace" font-size="12" fill="#a6f079">④ Limite absolue</text>
  <text x="680" y="360" font-family="monospace" font-size="10" fill="#6a8060">Max 20 flags actifs. Créer = supprimer un ancien.</text>

  <rect x="660" y="390" width="440" height="60" rx="6" fill="#1a3020" stroke="#a6f079" stroke-width="1"/>
  <text x="880" y="420" font-family="monospace" font-size="12" fill="#a6f079" text-anchor="middle">Les flags sont une ressource à gérer</text>
  <text x="880" y="440" font-family="monospace" font-size="10" fill="#4a7050" text-anchor="middle">pas une fonctionnalité gratuite</text>

  <text x="600" y="548" font-family="Georgia, serif" font-size="26" fill="#e0e8ff" text-anchor="middle" opacity="0.9">La puissance des feature flags a un coût caché</text>
</svg>
