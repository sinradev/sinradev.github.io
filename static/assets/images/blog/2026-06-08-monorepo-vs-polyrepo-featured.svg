<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1320;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b9cbf" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Monorepo left -->
  <text x="270" y="105" font-family="monospace" font-size="16" fill="#64b5f6" text-anchor="middle">MONOREPO</text>
  <!-- Single big folder -->
  <rect x="160" y="125" width="220" height="30" rx="6" fill="#1e2a40" stroke="#64b5f6" stroke-width="2"/>
  <text x="270" y="145" font-family="monospace" font-size="12" fill="#64b5f6" text-anchor="middle">company/repo</text>
  <!-- Tree inside -->
  <line x1="210" y1="155" x2="210" y2="400" stroke="#2a3560" stroke-width="1.5"/>
  <line x1="210" y1="185" x2="250" y2="185" stroke="#2a3560" stroke-width="1.5"/>
  <rect x="250" y="172" width="130" height="24" rx="4" fill="#1a2540"/>
  <text x="315" y="188" font-family="monospace" font-size="10" fill="#4a6090" text-anchor="middle">service-auth/</text>

  <line x1="210" y1="225" x2="250" y2="225" stroke="#2a3560" stroke-width="1.5"/>
  <rect x="250" y="212" width="130" height="24" rx="4" fill="#1a2540"/>
  <text x="315" y="228" font-family="monospace" font-size="10" fill="#4a6090" text-anchor="middle">service-api/</text>

  <line x1="210" y1="265" x2="250" y2="265" stroke="#2a3560" stroke-width="1.5"/>
  <rect x="250" y="252" width="130" height="24" rx="4" fill="#1a2540"/>
  <text x="315" y="268" font-family="monospace" font-size="10" fill="#4a6090" text-anchor="middle">frontend/</text>

  <line x1="210" y1="305" x2="250" y2="305" stroke="#2a3560" stroke-width="1.5"/>
  <rect x="250" y="292" width="130" height="24" rx="4" fill="#1a2540"/>
  <text x="315" y="308" font-family="monospace" font-size="10" fill="#4a6090" text-anchor="middle">shared-lib/</text>

  <!-- Pros/cons mono -->
  <text x="110" y="375" font-family="monospace" font-size="11" fill="#a6f079">✓ Cohérence dépendances</text>
  <text x="110" y="395" font-family="monospace" font-size="11" fill="#a6f079">✓ Refacto cross-projet</text>
  <text x="110" y="415" font-family="monospace" font-size="11" fill="#a6f079">✓ Visibilité globale</text>
  <text x="110" y="440" font-family="monospace" font-size="11" fill="#ff6b6b">✗ Outils custom nécessaires</text>
  <text x="110" y="460" font-family="monospace" font-size="11" fill="#ff6b6b">✗ Conventions partagées</text>

  <!-- Center balance -->
  <line x1="590" y1="120" x2="590" y2="520" stroke="#2a3560" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="600" y="310" font-family="Georgia, serif" font-size="28" fill="#3a4570" text-anchor="middle" transform="rotate(0,600,310)">⚖</text>
  <text x="600" y="360" font-family="monospace" font-size="11" fill="#3a4570" text-anchor="middle">Dépend de</text>
  <text x="600" y="380" font-family="monospace" font-size="11" fill="#3a4570" text-anchor="middle">l'organisation</text>

  <!-- Polyrepo right -->
  <text x="900" y="105" font-family="monospace" font-size="16" fill="#c792e9" text-anchor="middle">POLYREPO</text>
  <!-- Multiple small folders -->
  <rect x="780" y="125" width="140" height="25" rx="5" fill="#251a40" stroke="#c792e9" stroke-width="1.5"/>
  <text x="850" y="141" font-family="monospace" font-size="10" fill="#c792e9" text-anchor="middle">service-auth</text>

  <rect x="780" y="165" width="140" height="25" rx="5" fill="#251a40" stroke="#c792e9" stroke-width="1.5"/>
  <text x="850" y="181" font-family="monospace" font-size="10" fill="#c792e9" text-anchor="middle">service-api</text>

  <rect x="780" y="205" width="140" height="25" rx="5" fill="#251a40" stroke="#c792e9" stroke-width="1.5"/>
  <text x="850" y="221" font-family="monospace" font-size="10" fill="#c792e9" text-anchor="middle">frontend</text>

  <rect x="780" y="245" width="140" height="25" rx="5" fill="#251a40" stroke="#c792e9" stroke-width="1.5"/>
  <text x="850" y="261" font-family="monospace" font-size="10" fill="#c792e9" text-anchor="middle">mobile-app</text>

  <rect x="780" y="285" width="140" height="25" rx="5" fill="#251a40" stroke="#c792e9" stroke-width="1.5"/>
  <text x="850" y="301" font-family="monospace" font-size="10" fill="#c792e9" text-anchor="middle">infra-terraform</text>

  <!-- Connection lines between repos showing drift -->
  <path d="M 920 143 Q 980 160 980 193 Q 980 225 920 218" fill="none" stroke="#c792e9" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
  <text x="985" y="185" font-family="monospace" font-size="9" fill="#5a3080" opacity="0.6">v3.2</text>
  <text x="985" y="213" font-family="monospace" font-size="9" fill="#ff6b6b" opacity="0.6">v2.8 !</text>

  <!-- Pros/cons poly -->
  <text x="760" y="375" font-family="monospace" font-size="11" fill="#a6f079">✓ Autonomie équipes</text>
  <text x="760" y="395" font-family="monospace" font-size="11" fill="#a6f079">✓ Outils standard</text>
  <text x="760" y="415" font-family="monospace" font-size="11" fill="#a6f079">✓ Périmètres clairs</text>
  <text x="760" y="440" font-family="monospace" font-size="11" fill="#ff6b6b">✗ Dérive dépendances</text>
  <text x="760" y="460" font-family="monospace" font-size="11" fill="#ff6b6b">✗ Refacto cross-repo</text>

  <text x="600" y="555" font-family="Georgia, serif" font-size="25" fill="#e0e8ff" text-anchor="middle" opacity="0.9">Le choix de repo est organisationnel, pas technique</text>
</svg>
