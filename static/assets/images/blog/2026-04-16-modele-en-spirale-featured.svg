<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/>
      <stop offset="60%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#c792e9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c792e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- Spiral circles growing -->
  <circle cx="215" cy="290" r="30" fill="none" stroke="#c792e9" stroke-width="2" stroke-opacity="0.7" filter="url(#glow)"/>
  <circle cx="215" cy="290" r="70" fill="none" stroke="#c792e9" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="215" cy="290" r="115" fill="none" stroke="#c792e9" stroke-width="1.2" stroke-opacity="0.35"/>
  <circle cx="215" cy="290" r="165" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="215" cy="290" r="10" fill="#c792e9" fill-opacity="0.6" filter="url(#glow)"/>

  <!-- Spiral quadrant labels -->
  <text x="215" y="240" text-anchor="middle" font-size="11" fill="#c792e9" font-weight="700" opacity="0.9">Objectifs</text>
  <text x="285" y="295" text-anchor="middle" font-size="11" fill="#ff6b9d" font-weight="700" opacity="0.9">Risques</text>
  <text x="215" y="350" text-anchor="middle" font-size="11" fill="#a6f079" font-weight="700" opacity="0.9">Dev</text>
  <text x="148" y="295" text-anchor="middle" font-size="11" fill="#6ecf00" font-weight="700" opacity="0.9">Planif.</text>

  <!-- Orbit dots -->
  <circle cx="215" cy="220" r="5" fill="#c792e9" filter="url(#glow)"/>
  <circle cx="285" cy="290" r="5" fill="#ff6b9d" filter="url(#glow)"/>
  <circle cx="215" cy="360" r="5" fill="#a6f079" filter="url(#glow)"/>
  <circle cx="145" cy="290" r="5" fill="#6ecf00" filter="url(#glow)"/>

  <!-- Spiral arm suggestion -->
  <circle cx="215" cy="175" r="5" fill="#c792e9" fill-opacity="0.5"/>
  <circle cx="350" cy="290" r="4" fill="#c792e9" fill-opacity="0.35"/>
  <circle cx="215" cy="405" r="4" fill="#c792e9" fill-opacity="0.25"/>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">MÉTHODE CLASSIQUE · RISQUES</text>
  <text x="500" y="262" font-size="72" font-weight="800" fill="#f8fafc" letter-spacing="-3">Modèle en</text>
  <text x="500" y="352" font-size="72" font-weight="800" letter-spacing="-3">
    <tspan fill="#c792e9">Spirale</tspan>
  </text>
  <text x="500" y="406" font-size="16" fill="#475569">Boehm - gestion du risque par cycles progressifs</text>
  <line x1="500" y1="432" x2="850" y2="432" stroke="#1e293b" stroke-width="1"/>
  <g>
    <rect x="500" y="450" width="82" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
    <text x="541" y="469" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">Itératif</text>
  </g>
  <g>
    <rect x="594" y="450" width="96" height="28" rx="14" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.35"/>
    <text x="642" y="469" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="600" letter-spacing="0.5">Gestion risque</text>
  </g>
  <g>
    <rect x="702" y="450" width="88" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
    <text x="746" y="469" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">Prototypage</text>
  </g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
