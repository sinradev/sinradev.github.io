<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#171b2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0a0f1a;stop-opacity:0.92" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g stroke="#2a3350" stroke-width="1" opacity="0.25">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <circle cx="1080" cy="150" r="120" fill="#8b5cf6" opacity="0.06"/>
  <rect x="0" y="70" width="1200" height="3" fill="#a6f079" opacity="0.55"/>
  <rect x="0" y="70" width="340" height="3" fill="#a6f079"/>

  <!-- milestone: flag on timeline, date only -->
  <line x1="150" y1="270" x2="520" y2="270" stroke="#5a6790" stroke-width="2" opacity="0.5"/>
  <circle cx="450" cy="270" r="8" fill="#e0a45c"/>
  <line x1="450" y1="270" x2="450" y2="200" stroke="#e0a45c" stroke-width="3"/>
  <polygon points="450,200 490,212 450,224" fill="#e0a45c"/>
  <text x="450" y="320" font-family="monospace" font-size="14" fill="#e0a45c" text-anchor="middle">MILESTONE</text>
  <text x="450" y="342" font-family="monospace" font-size="12" fill="#8b7a5c" text-anchor="middle">date atteinte, contenu ?</text>

  <!-- release: box with binary state -->
  <rect x="700" y="200" width="330" height="140" rx="10" fill="#1a2a1a" stroke="#a6f079" stroke-width="2" opacity="0.9"/>
  <text x="865" y="235" font-family="monospace" font-size="14" fill="#a6f079" text-anchor="middle" font-weight="bold">RELEASE</text>
  <text x="865" y="265" font-family="monospace" font-size="12" fill="#e0e8ff" text-anchor="middle">capabilities: 4/4 livrées</text>
  <rect x="740" y="285" width="250" height="34" rx="6" fill="#1f3020" stroke="#a6f079" stroke-width="1"/>
  <text x="865" y="307" font-family="monospace" font-size="12" fill="#a6f079" text-anchor="middle">PRÊTE</text>

  <rect x="0" y="446" width="1200" height="184" fill="url(#band)"/>
  <rect x="0" y="446" width="1200" height="2" fill="#a6f079" opacity="0.55"/>
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="40" font-weight="bold" text-anchor="middle" fill="#e0e8ff">Releases vs Milestones</text>
  <text x="600" y="548" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#c792e9">La différence concrète</text>
  <text x="1150" y="614" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="end" fill="#a6f079" opacity="0.7">sinra.app</text>
</svg>
