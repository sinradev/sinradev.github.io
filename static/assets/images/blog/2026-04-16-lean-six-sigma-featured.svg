<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/><stop offset="60%" stop-color="#0a0f1a"/><stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.15"/><stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#c792e9" stop-opacity="0.12"/><stop offset="100%" stop-color="#c792e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
  </g>

  <!-- Two overlapping circles (Lean + Six Sigma Venn) -->
  <circle cx="160" cy="290" r="130" fill="#a6f079" fill-opacity="0.07" stroke="#a6f079" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="280" cy="290" r="130" fill="#c792e9" fill-opacity="0.07" stroke="#c792e9" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Intersection highlight -->
  <ellipse cx="220" cy="290" rx="40" ry="95" fill="#6ecf00" fill-opacity="0.12" filter="url(#glow)"/>

  <text x="110" y="260" text-anchor="middle" font-size="14" fill="#a6f079" font-weight="700">Lean</text>
  <text x="110" y="282" text-anchor="middle" font-size="9" fill="#a6f079" opacity="0.8">Vitesse</text>
  <text x="110" y="298" text-anchor="middle" font-size="9" fill="#a6f079" opacity="0.8">Gaspillage</text>

  <text x="330" y="260" text-anchor="middle" font-size="14" fill="#c792e9" font-weight="700">Six Sigma</text>
  <text x="330" y="282" text-anchor="middle" font-size="9" fill="#c792e9" opacity="0.8">Qualité</text>
  <text x="330" y="298" text-anchor="middle" font-size="9" fill="#c792e9" opacity="0.8">Variation</text>

  <text x="220" y="285" text-anchor="middle" font-size="9" fill="#6ecf00" font-weight="700">DMAIC</text>
  <text x="220" y="300" text-anchor="middle" font-size="8" fill="#6ecf00" opacity="0.8">+Lean</text>

  <!-- Axes labels -->
  <text x="215" y="450" text-anchor="middle" font-size="11" fill="#8b9cbf" opacity="0.7">Rapide ET Fiable</text>

  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">QUALITÉ · PERFORMANCE</text>
  <text x="500" y="262" font-size="52" font-weight="800" fill="#f8fafc" letter-spacing="-2">Lean</text>
  <text x="500" y="330" font-size="52" font-weight="800" letter-spacing="-2"><tspan fill="#a6f079">Six</tspan> <tspan fill="#c792e9">Sigma</tspan></text>
  <text x="500" y="385" font-size="16" fill="#475569">Éliminer le gaspillage ET réduire les variations</text>
  <line x1="500" y1="410" x2="850" y2="410" stroke="#1e293b" stroke-width="1"/>
  <g><rect x="500" y="425" width="80" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
  <text x="540" y="444" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">Lean</text></g>
  <g><rect x="592" y="425" width="96" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
  <text x="640" y="444" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">Six Sigma</text></g>
  <g><rect x="700" y="425" width="80" height="28" rx="14" fill="#6ecf00" fill-opacity="0.08" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.35"/>
  <text x="740" y="444" text-anchor="middle" font-size="10" fill="#6ecf00" font-weight="600" letter-spacing="0.5">DMAIC</text></g>
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
