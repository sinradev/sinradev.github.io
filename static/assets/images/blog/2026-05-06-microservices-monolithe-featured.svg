<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141824;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad1)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="150" r="130" fill="#f97316" opacity="0.06"/>
  <circle cx="1100" cy="500" r="160" fill="#6366f1" opacity="0.07"/>
  <circle cx="600" cy="60" r="70" fill="#fb923c" opacity="0.04"/>

  <!-- Top accent line -->
  <rect x="0" y="72" width="1200" height="3" fill="#f97316" opacity="0.5"/>

  <!-- Monolith block (left, simple) -->
  <rect x="120" y="160" width="140" height="220" rx="6" fill="#22c55e" opacity="0.18"/>
  <rect x="130" y="170" width="120" height="200" rx="4" fill="#22c55e" opacity="0.25"/>
  <text x="190" y="280" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#22c55e" opacity="0.9">MONO</text>
  <text x="190" y="300" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#22c55e" opacity="0.9">LITHE</text>

  <!-- Arrow separating them -->
  <text x="290" y="275" font-family="Arial, sans-serif" font-size="36" text-anchor="middle" fill="#8b9cbf" opacity="0.5">vs</text>

  <!-- Microservices cloud (right, complex) -->
  <rect x="340" y="160" width="60" height="55" rx="5" fill="#f97316" opacity="0.25"/>
  <rect x="410" y="160" width="60" height="55" rx="5" fill="#6366f1" opacity="0.25"/>
  <rect x="480" y="160" width="60" height="55" rx="5" fill="#ec4899" opacity="0.25"/>
  <rect x="340" y="230" width="60" height="55" rx="5" fill="#06b6d4" opacity="0.25"/>
  <rect x="410" y="230" width="60" height="55" rx="5" fill="#f59e0b" opacity="0.25"/>
  <rect x="480" y="230" width="60" height="55" rx="5" fill="#22c55e" opacity="0.25"/>
  <rect x="340" y="300" width="60" height="55" rx="5" fill="#8b5cf6" opacity="0.25"/>
  <rect x="410" y="300" width="60" height="55" rx="5" fill="#f97316" opacity="0.25"/>
  <rect x="480" y="300" width="60" height="55" rx="5" fill="#ec4899" opacity="0.25"/>
  <!-- Connection lines between microservices -->
  <line x1="370" y1="215" x2="440" y2="230" stroke="#8b9cbf" stroke-width="1" opacity="0.3"/>
  <line x1="440" y1="215" x2="510" y2="230" stroke="#8b9cbf" stroke-width="1" opacity="0.3"/>
  <line x1="370" y1="285" x2="440" y2="230" stroke="#8b9cbf" stroke-width="1" opacity="0.3"/>
  <line x1="510" y1="285" x2="440" y2="300" stroke="#8b9cbf" stroke-width="1" opacity="0.3"/>
  <line x1="370" y1="285" x2="370" y2="300" stroke="#8b9cbf" stroke-width="1" opacity="0.3"/>
  <line x1="440" y1="285" x2="440" y2="300" stroke="#8b9cbf" stroke-width="1" opacity="0.3"/>
  <line x1="510" y1="285" x2="510" y2="300" stroke="#8b9cbf" stroke-width="1" opacity="0.3"/>

  <!-- Big background text watermark -->
  <text x="760" y="310" font-family="Arial, sans-serif" font-size="110" font-weight="bold" text-anchor="middle" fill="#f97316" opacity="0.06">HYPE</text>

  <!-- Title band -->
  <rect x="0" y="400" width="1200" height="230" fill="#0a0f1a" opacity="0.85"/>
  <rect x="0" y="399" width="1200" height="2" fill="#f97316" opacity="0.6"/>

  <!-- Main title -->
  <text x="600" y="466" font-family="Arial, sans-serif" font-size="58" font-weight="bold" text-anchor="middle" fill="#f97316">Vous N'Etes Pas Netflix</text>

  <!-- Subtitle -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="28" font-weight="normal" text-anchor="middle" fill="#c792e9">Microservices vs Monolithe : la mode contre la raison</text>

  <!-- Tagline -->
  <text x="600" y="562" font-family="Arial, sans-serif" font-size="20" font-weight="normal" text-anchor="middle" fill="#8b9cbf">90% des projets n'ont pas les problemes de Netflix</text>

  <!-- Branding -->
  <text x="1140" y="610" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="end" fill="#f97316" opacity="0.6">sinra.app</text>
</svg>
