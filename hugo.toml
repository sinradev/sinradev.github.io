baseURL                       = 'https://sinra.dev/'
defaultContentLanguage        = 'en'
defaultContentLanguageInSubdir = false
enableRobotsTXT = true

[params]
  author        = "Sinra"
  twitterHandle = "@sinra_app"
  ogImage       = "/assets/images/og-image.png"

  [params.jsonld]
    type                = "SoftwareApplication"
    name                = "Sinra"
    operatingSystem     = "Web"
    applicationCategory = "BusinessApplication"

[taxonomies]
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = 'monthly'
  priority   = 1.0
  filename   = 'sitemap.xml'

# ── English (default — served at /) ──────────────────────────────────────────
[languages.en]
  languageCode = 'en'
  languageName = 'English'
  title        = 'Sinra'
  weight       = 1

  [languages.en.params]
    description = "The only project management tool built for teams combining V-Model and Agile. Complete visibility. Unified platform. Controlled quality."
    locale      = "en_US"

  [[languages.en.menus.main]]
    name   = 'About'
    url    = '/about/'
    weight = 10
  [[languages.en.menus.main]]
    name   = 'Pricing'
    url    = '/pricing/'
    weight = 20
  [[languages.en.menus.main]]
    name   = 'Blog'
    url    = '/blog/'
    weight = 30
  [[languages.en.menus.main]]
    name   = 'Contact'
    url    = '/contact/'
    weight = 40
  [[languages.en.menus.main]]
    name   = 'Login'
    url    = 'https://app.sinra.dev/users/sign_in'
    weight = 50
    [languages.en.menus.main.params]
      external = true
  [[languages.en.menus.main]]
    name   = 'Sign up'
    url    = 'https://app.sinra.dev/users/sign_up'
    weight = 60
    [languages.en.menus.main.params]
      external = true
      cta      = true

