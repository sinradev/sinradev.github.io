<!DOCTYPE html>
<html lang="{{ site.LanguageCode }}" data-theme="dim">
<head>
  {{ partial "head.html" . }}
</head>
<body class="min-h-screen flex flex-col bg-base-100">
  {{ partial "navbar.html" . }}
  <main class="flex-1">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{ if .Params.load_swiper }}
  <script src="/assets/js/swiper-bundle.min.js" defer></script>
  {{ end }}
  {{ $js := resources.Get "js/script.js" | resources.Minify | resources.Fingerprint }}
  <script src="{{ $js.Permalink }}" integrity="{{ $js.Data.Integrity }}" crossorigin="anonymous" defer></script>

</body>
</html>
