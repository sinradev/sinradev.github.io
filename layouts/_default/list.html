{{ define "main" }}
<section class="py-16 bg-base-100">
  <div class="container mx-auto px-6 max-w-5xl">
    <h1 class="text-4xl font-bold mb-8 text-center">{{ .Title }}</h1>

    {{ if .Pages }}
    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
      {{ range .Pages }}
      <a href="{{ .Permalink }}" class="bg-base-200 rounded-xl p-4 text-center hover:bg-base-300 transition-colors">
        <div class="font-semibold">{{ .Title }}</div>
      </a>
      {{ end }}
    </div>
    {{ else if .Data.Terms }}
    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
      {{ range .Data.Terms.Alphabetical }}
      <a href="{{ .Page.Permalink }}" class="bg-base-200 rounded-xl p-4 text-center hover:bg-base-300 transition-colors">
        <div class="font-semibold capitalize">{{ .Page.Title }}</div>
        <div class="text-sm text-base-content/60 mt-1">{{ .Count }} articles</div>
      </a>
      {{ end }}
    </div>
    {{ end }}
  </div>
</section>
{{ end }}
