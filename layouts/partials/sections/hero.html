{{ $lang := .Language.Lang }}
{{ $strings := index hugo.Data $lang "strings" }}
<section class="hero py-20 bg-base-100">
  <div class="container mx-auto px-6 max-w-6xl">
    <div class="text-center">
      <h1 class="text-4xl md:text-6xl font-bold mb-6 leading-tight">{{ $strings.hero.title | safeHTML }}</h1>
      <p class="text-xl text-base-content/80 mb-8 max-w-3xl mx-auto">{{ $strings.hero.body | safeHTML }}</p>
      <div class="flex justify-center">
        <a href="https://app.sinra.dev/users/sign_up" class="btn btn-primary btn-lg" target="_blank" rel="noopener noreferrer">
          {{ $strings.hero.button }}
        </a>
      </div>
      <div class="mt-12">
        <picture>
          <source srcset="/assets/images/sinra-overview.webp" type="image/webp" />
          <img src="/assets/images/sinra-overview.png" alt="{{ $strings.hero.alt_image }}" class="rounded-xl shadow-2xl mx-auto" width="752" height="478" />
        </picture>
      </div>
    </div>
  </div>
</section>
