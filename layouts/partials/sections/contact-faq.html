{{ $lang := .Language.Lang }}
{{ $faqs := index hugo.Data $lang "contact_faq" }}
{{ if $faqs }}
<section class="contact-faq py-20 bg-base-100">
  <div class="container mx-auto px-6 max-w-4xl">
    <h2 class="text-3xl font-bold text-center mb-12">{{ i18n "contact_faq_title" }}</h2>
    <div class="space-y-4">
      {{ range $faqs }}
      <div class="collapse collapse-plus bg-base-200 rounded-xl">
        <input type="checkbox" />
        <div class="collapse-title text-lg font-semibold">
          {{ .question }}
        </div>
        <div class="collapse-content">
          <p class="text-base-content/80">{{ .answer }}</p>
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
