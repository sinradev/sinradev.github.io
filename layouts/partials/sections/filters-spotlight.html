{{ $lang := .Language.Lang }}
{{ $strings := index hugo.Data $lang "strings" }}
{{ $s := $strings.filters_spotlight }}

<section class="filters-spotlight py-20 bg-base-100">
  <div class="container mx-auto px-6 max-w-6xl">
    <div class="flex flex-col lg:flex-row items-center gap-12">

      <!-- Screenshot -->
      <div class="lg:w-3/5">
        <picture>
          <source srcset="/assets/images/screenshots/09-issue-filters.webp" type="image/webp" />
          <img
            src="/assets/images/screenshots/09-issue-filters.png"
            alt="{{ $s.image_alt }}"
            class="w-full rounded-xl"
            loading="lazy"
          />
        </picture>
      </div>

      <!-- Text -->
      <div class="lg:w-2/5">
        <div class="text-sm font-semibold text-primary uppercase tracking-wider mb-3">{{ $s.tag }}</div>
        <h2 class="text-2xl md:text-3xl font-bold mb-4">{{ $s.title | safeHTML }}</h2>
        <p class="text-base-content/80 mb-6">{{ $s.body }}</p>

        <ul class="space-y-3">
          {{ range $s.points }}
          <li class="flex items-start gap-3">
            <span class="text-primary mt-0.5 shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
              </svg>
            </span>
            <span class="text-base-content/80">{{ . | safeHTML }}</span>
          </li>
          {{ end }}
        </ul>
      </div>

    </div>
  </div>
</section>
