{{ $footerData := index hugo.Data .Language.Lang "footer" }}
<footer class="bg-base-200 text-base-content border-neutral py-16">
  {{ if $footerData }}
  <div class="container mx-auto px-6 max-w-6xl">
    <div class="grid grid-cols-3 gap-10 mb-10 justify-items-center">
      {{ range $footerData }}
      <nav class="flex flex-col gap-2 items-center">
        {{ range .links }}
        <a href="{{ if (hasPrefix .link "http") }}{{ .link }}{{ else }}{{ relLangURL .link }}{{ end }}"
           {{ if eq .target "_blank" }}target="_blank" rel="noopener noreferrer"{{ end }}
           class="link link-hover">
          {{ .name }}
        </a>
        {{ end }}
      </nav>
      {{ end }}
    </div>
  </div>
  {{ end }}
  <div class="text-center text-base-content/60 text-sm border-neutral pt-6">
    <p>&copy; {{ now.Year }} Sinra</p>
  </div>
</footer>
