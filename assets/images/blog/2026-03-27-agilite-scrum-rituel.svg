<svg viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#161929"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>

  <rect width="1000" height="520" fill="url(#bg)"/>

  <!-- Center ambient glow -->
  <circle cx="370" cy="265" r="160" fill="url(#centerGlow)" filter="url(#blur)"/>

  <!-- Header -->
  <text x="500" y="38" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#475569" letter-spacing="3" font-weight="500">FRAMEWORK</text>
  <text x="500" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">Scrum</text>

  <!-- Sprint ring -->
  <circle cx="370" cy="265" r="130" fill="none" stroke="#a6f079" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="4,8"/>
  <circle cx="370" cy="265" r="90" fill="none" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.25"/>
  <!-- Sprint label inside -->
  <text x="370" y="258" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b" letter-spacing="1">SPRINT</text>
  <text x="370" y="277" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#a6f079">2 sem.</text>

  <!-- Ritual nodes placed around the circle -->
  <!-- Top: Sprint Planning -->
  <g>
    <circle cx="370" cy="115" r="34" fill="#0f1117" stroke="#a6f079" stroke-width="1.5"/>
    <text x="370" y="109" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#a6f079" letter-spacing="0.5">SPRINT</text>
    <text x="370" y="123" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#a6f079">PLANNING</text>
    <text x="370" y="82" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#475569">Lundi · 2-4h</text>
  </g>
  <!-- Right: Review -->
  <g>
    <circle cx="510" cy="195" r="34" fill="#0f1117" stroke="#6ecf00" stroke-width="1.5"/>
    <text x="510" y="189" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#6ecf00">SPRINT</text>
    <text x="510" y="203" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#6ecf00">REVIEW</text>
    <text x="554" y="192" font-family="Inter, sans-serif" font-size="9" fill="#475569">Fin sprint · 1h</text>
  </g>
  <!-- Bottom-right: Retro -->
  <g>
    <circle cx="490" cy="345" r="34" fill="#0f1117" stroke="#ff6b9d" stroke-width="1.5"/>
    <text x="490" y="341" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ff6b9d">RÉTRO-</text>
    <text x="490" y="355" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ff6b9d">SPECTIVE</text>
    <text x="490" y="396" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#475569">Fin sprint · 1.5h</text>
  </g>
  <!-- Bottom-left: Refinement -->
  <g>
    <circle cx="250" cy="345" r="34" fill="#0f1117" stroke="#c792e9" stroke-width="1.5"/>
    <text x="250" y="341" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#c792e9">BACK.</text>
    <text x="250" y="355" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#c792e9">REFINE.</text>
    <text x="250" y="396" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#475569">1-2h / semaine</text>
  </g>
  <!-- Left: Daily -->
  <g>
    <circle cx="230" cy="195" r="34" fill="#0f1117" stroke="#8b9cbf" stroke-width="1.5"/>
    <text x="230" y="189" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#8b9cbf">DAILY</text>
    <text x="230" y="203" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#8b9cbf">STANDUP</text>
    <text x="170" y="192" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#475569">Chaque jour · 15m</text>
  </g>

  <!-- Connecting arcs -->
  <path d="M 370 149 Q 420 150 483 168" stroke="#a6f079" stroke-width="1" fill="none" stroke-opacity="0.3"/>
  <path d="M 506 229 Q 510 285 502 311" stroke="#6ecf00" stroke-width="1" fill="none" stroke-opacity="0.3"/>
  <path d="M 458 365 Q 380 382 282 368" stroke="#ff6b9d" stroke-width="1" fill="none" stroke-opacity="0.3"/>
  <path d="M 218 311 Q 212 250 218 229" stroke="#c792e9" stroke-width="1" fill="none" stroke-opacity="0.3"/>
  <path d="M 254 163 Q 298 140 336 130" stroke="#8b9cbf" stroke-width="1" fill="none" stroke-opacity="0.3"/>

  <!-- Right panel: Roles -->
  <text x="760" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#475569" letter-spacing="2" font-weight="500">3 RÔLES</text>

  <g>
    <rect x="650" y="148" width="220" height="70" rx="10" fill="#a6f079" fill-opacity="0.04" stroke="#a6f079" stroke-width="1" stroke-opacity="0.2"/>
    <text x="670" y="175" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#a6f079">Product Owner</text>
    <text x="670" y="195" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Priorise, valide, représente</text>
  </g>
  <g>
    <rect x="650" y="232" width="220" height="70" rx="10" fill="#c792e9" fill-opacity="0.04" stroke="#c792e9" stroke-width="1" stroke-opacity="0.2"/>
    <text x="670" y="259" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#c792e9">Scrum Master</text>
    <text x="670" y="279" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Facilite, lève les blocages</text>
  </g>
  <g>
    <rect x="650" y="316" width="220" height="70" rx="10" fill="#ff6b9d" fill-opacity="0.04" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.2"/>
    <text x="670" y="343" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#ff6b9d">Équipe Dev</text>
    <text x="670" y="363" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Auto-organisée, livre</text>
  </g>

  <!-- Separator -->
  <line x1="622" y1="110" x2="622" y2="430" stroke="#1e293b" stroke-width="1"/>
</svg>
