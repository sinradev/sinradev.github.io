<svg viewBox="0 0 1000 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141824;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="550" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="26" font-weight="bold" fill="#6ecf00">
    XP (Extreme Programming)
  </text>

  <!-- Subtitle -->
  <text x="500" y="65" text-anchor="middle" font-size="13" fill="#8b9cbf">
    Des pratiques de développement rigide pour la qualité du code
  </text>

  <!-- Core Practice: Pair Programming -->
  <rect x="50" y="100" width="180" height="140" rx="6" fill="#6ecf00" opacity="0.2" stroke="#6ecf00" stroke-width="2" filter="url(#glow)"/>
  <circle cx="105" cy="135" r="8" fill="#6ecf00" opacity="0.3"/>
  <circle cx="135" cy="135" r="8" fill="#6ecf00" opacity="0.3"/>
  <line x1="110" y1="145" x2="130" y2="145" stroke="#6ecf00" stroke-width="1.5"/>
  <text x="140" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#6ecf00">Pair</text>
  <text x="140" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#6ecf00">Programming</text>
  <text x="140" y="205" text-anchor="middle" font-size="9" fill="#8b9cbf">2 devs sur 1</text>
  <text x="140" y="218" text-anchor="middle" font-size="9" fill="#8b9cbf">ordinateur</text>
  <text x="140" y="228" text-anchor="middle" font-size="8" fill="#8b9cbf" opacity="0.8">Conducteur + Navigateur</text>

  <!-- TDD -->
  <rect x="260" y="100" width="180" height="140" rx="6" fill="#6ecf00" opacity="0.2" stroke="#6ecf00" stroke-width="2" filter="url(#glow)"/>
  <circle cx="320" cy="130" r="6" fill="#6ecf00" opacity="0.3"/>
  <circle cx="335" cy="130" r="6" fill="#6ecf00" opacity="0.3"/>
  <path d="M 312 145 L 345 145" stroke="#6ecf00" stroke-width="1.5"/>
  <path d="M 320 155 L 335 155" stroke="#6ecf00" stroke-width="1.5"/>
  <text x="350" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#6ecf00">TDD (Test</text>
  <text x="350" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#6ecf00">Driven Dev)</text>
  <text x="350" y="205" text-anchor="middle" font-size="9" fill="#8b9cbf">Tests d'abord</text>
  <text x="350" y="218" text-anchor="middle" font-size="9" fill="#8b9cbf">Puis le code</text>
  <text x="350" y="228" text-anchor="middle" font-size="8" fill="#8b9cbf" opacity="0.8">Red-Green-Refactor</text>

  <!-- Continuous Integration -->
  <rect x="470" y="100" width="180" height="140" rx="6" fill="#6ecf00" opacity="0.2" stroke="#6ecf00" stroke-width="2" filter="url(#glow)"/>
  <circle cx="530" cy="135" r="6" fill="#6ecf00" opacity="0.3"/>
  <rect x="545" y="128" width="20" height="14" rx="2" fill="#6ecf00" opacity="0.3"/>
  <path d="M 540 145 L 560 145" stroke="#6ecf00" stroke-width="1.5"/>
  <text x="560" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#6ecf00">Continuous</text>
  <text x="560" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#6ecf00">Integration</text>
  <text x="560" y="205" text-anchor="middle" font-size="9" fill="#8b9cbf">Push tous les jours</text>
  <text x="560" y="218" text-anchor="middle" font-size="9" fill="#8b9cbf">Build automatique</text>
  <text x="560" y="228" text-anchor="middle" font-size="8" fill="#8b9cbf" opacity="0.8">Tests continus</text>

  <!-- Code Review / Collective Code Ownership -->
  <rect x="680" y="100" width="180" height="140" rx="6" fill="#6ecf00" opacity="0.2" stroke="#6ecf00" stroke-width="2" filter="url(#glow)"/>
  <circle cx="735" cy="130" r="6" fill="#6ecf00" opacity="0.3"/>
  <circle cx="755" cy="130" r="6" fill="#6ecf00" opacity="0.3"/>
  <circle cx="775" cy="130" r="6" fill="#6ecf00" opacity="0.3"/>
  <path d="M 735 145 L 775 145" stroke="#6ecf00" stroke-width="1.5"/>
  <text x="770" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#6ecf00">Collective Code</text>
  <text x="770" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#6ecf00">Ownership</text>
  <text x="770" y="205" text-anchor="middle" font-size="9" fill="#8b9cbf">Tout le monde</text>
  <text x="770" y="218" text-anchor="middle" font-size="9" fill="#8b9cbf">peut toucher le code</text>
  <text x="770" y="228" text-anchor="middle" font-size="8" fill="#8b9cbf" opacity="0.8">Partagé, pas silos</text>

  <!-- Refactoring -->
  <rect x="50" y="280" width="180" height="140" rx="6" fill="#a6f079" opacity="0.2" stroke="#a6f079" stroke-width="2" filter="url(#glow)"/>
  <rect x="90" y="315" width="20" height="35" rx="2" fill="#a6f079" opacity="0.3"/>
  <rect x="115" y="310" width="20" height="40" rx="2" fill="#a6f079" opacity="0.3"/>
  <rect x="140" y="320" width="20" height="30" rx="2" fill="#a6f079" opacity="0.3"/>
  <text x="140" y="375" text-anchor="middle" font-size="12" font-weight="bold" fill="#a6f079">Refactoring</text>
  <text x="140" y="395" text-anchor="middle" font-size="9" fill="#8b9cbf">Nettoyer le code</text>
  <text x="140" y="408" text-anchor="middle" font-size="9" fill="#8b9cbf">Sans changer le comportement</text>
  <text x="140" y="418" text-anchor="middle" font-size="8" fill="#8b9cbf" opacity="0.8">Continuellement</text>

  <!-- Simple Design -->
  <rect x="260" y="280" width="180" height="140" rx="6" fill="#a6f079" opacity="0.2" stroke="#a6f079" stroke-width="2" filter="url(#glow)"/>
  <circle cx="320" cy="320" r="20" fill="#a6f079" opacity="0.2"/>
  <circle cx="320" cy="320" r="12" fill="none" stroke="#a6f079" stroke-width="1.5"/>
  <text x="350" y="375" text-anchor="middle" font-size="12" font-weight="bold" fill="#a6f079">Simple Design</text>
  <text x="350" y="395" text-anchor="middle" font-size="9" fill="#8b9cbf">« Simple as possible »</text>
  <text x="350" y="408" text-anchor="middle" font-size="9" fill="#8b9cbf">Pas d'overengineering</text>
  <text x="350" y="418" text-anchor="middle" font-size="8" fill="#8b9cbf" opacity="0.8">YAGNI - You Ain't</text>

  <!-- Frequent Releases -->
  <rect x="470" y="280" width="180" height="140" rx="6" fill="#a6f079" opacity="0.2" stroke="#a6f079" stroke-width="2" filter="url(#glow)"/>
  <rect x="510" y="315" width="30" height="30" rx="3" fill="#a6f079" opacity="0.3"/>
  <rect x="550" y="315" width="30" height="30" rx="3" fill="#a6f079" opacity="0.3"/>
  <path d="M 535 340 L 545 350" stroke="#a6f079" stroke-width="1"/>
  <text x="560" y="375" text-anchor="middle" font-size="12" font-weight="bold" fill="#a6f079">Frequent</text>
  <text x="560" y="392" text-anchor="middle" font-size="12" font-weight="bold" fill="#a6f079">Releases</text>
  <text x="560" y="415" text-anchor="middle" font-size="9" fill="#8b9cbf">Deploy plusieurs fois</text>
  <text x="560" y="428" text-anchor="middle" font-size="9" fill="#8b9cbf">par semaine / jour</text>

  <!-- Communication -->
  <rect x="680" y="280" width="180" height="140" rx="6" fill="#a6f079" opacity="0.2" stroke="#a6f079" stroke-width="2" filter="url(#glow)"/>
  <circle cx="740" cy="320" r="8" fill="#a6f079" opacity="0.3"/>
  <circle cx="750" cy="320" r="8" fill="#a6f079" opacity="0.3"/>
  <path d="M 740 330 L 750 330" stroke="#a6f079" stroke-width="1.5"/>
  <path d="M 740 340 L 745 345" stroke="#a6f079" stroke-width="1.5"/>
  <path d="M 750 340 L 745 345" stroke="#a6f079" stroke-width="1.5"/>
  <text x="770" y="375" text-anchor="middle" font-size="12" font-weight="bold" fill="#a6f079">Communication</text>
  <text x="770" y="392" text-anchor="middle" font-size="12" font-weight="bold" fill="#a6f079">& Feedback</text>
  <text x="770" y="415" text-anchor="middle" font-size="9" fill="#8b9cbf">Retours clients</text>
  <text x="770" y="428" text-anchor="middle" font-size="9" fill="#8b9cbf">rapides et réguliers</text>

  <!-- Philosophy text -->
  <text x="500" y="480" text-anchor="middle" font-size="13" font-weight="bold" fill="#6ecf00">
    XP pousse l'agilité vers ses extrêmes : qualité du code maximale
  </text>
  <text x="500" y="510" text-anchor="middle" font-size="11" fill="#8b9cbf">
    C'est très demandant pour l'équipe mais produit un code très robuste et maintenable
  </text>
</svg>