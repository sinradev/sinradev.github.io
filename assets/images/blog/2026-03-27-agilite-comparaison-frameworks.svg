<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#161929"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="1000" height="560" fill="url(#bg)"/>
  <circle cx="500" cy="320" r="280" fill="#8b5cf6" opacity="0.02" filter="url(#blur)"/>

  <!-- Header -->
  <text x="500" y="38" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#475569" letter-spacing="3">COMPARAISON</text>
  <text x="500" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">Quel Framework Choisir?</text>

  <!-- Table header -->
  <rect x="30" y="90" width="940" height="36" rx="8" fill="#1e293b"/>
  <text x="100" y="113" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" letter-spacing="1">FRAMEWORK</text>
  <text x="260" y="113" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" letter-spacing="1">ITÉRATION</text>
  <text x="400" y="113" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" letter-spacing="1">COMPLEXITÉ</text>
  <text x="540" y="113" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" letter-spacing="1">ÉQUIPE</text>
  <text x="780" y="113" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" letter-spacing="1">MEILLEUR POUR</text>

  <!-- Row 1: Scrum -->
  <rect x="30" y="134" width="940" height="64" rx="8" fill="#a6f079" fill-opacity="0.03" stroke="#a6f079" stroke-width="1" stroke-opacity="0.12"/>
  <text x="100" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#a6f079">Scrum</text>
  <text x="100" y="178" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#475569">Le plus populaire</text>
  <text x="260" y="167" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">2-4 semaines</text>
  <!-- Complexity dots: high -->
  <circle cx="378" cy="167" r="5" fill="#a6f079"/>
  <circle cx="396" cy="167" r="5" fill="#a6f079"/>
  <circle cx="414" cy="167" r="5" fill="#a6f079" opacity="0.3"/>
  <text x="540" y="167" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">6-15 devs</text>
  <text x="780" y="162" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Projets medium, client engagé</text>
  <text x="780" y="178" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">structure claire recherchée</text>

  <!-- Row 2: Kanban -->
  <rect x="30" y="206" width="940" height="64" rx="8" fill="#c792e9" fill-opacity="0.03" stroke="#c792e9" stroke-width="1" stroke-opacity="0.12"/>
  <text x="100" y="232" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#c792e9">Kanban</text>
  <text x="100" y="250" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#475569">Flux continu</text>
  <text x="260" y="239" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">Aucune</text>
  <!-- Complexity dots: low -->
  <circle cx="378" cy="239" r="5" fill="#c792e9"/>
  <circle cx="396" cy="239" r="5" fill="#c792e9" opacity="0.3"/>
  <circle cx="414" cy="239" r="5" fill="#c792e9" opacity="0.3"/>
  <text x="540" y="239" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">Toute taille</text>
  <text x="780" y="234" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Support, maintenance, DevOps</text>
  <text x="780" y="250" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">travail continu et variable</text>

  <!-- Row 3: Shape Up -->
  <rect x="30" y="278" width="940" height="64" rx="8" fill="#ff6b9d" fill-opacity="0.03" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.12"/>
  <text x="100" y="304" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#ff6b9d">Shape Up</text>
  <text x="100" y="322" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#475569">Basecamp</text>
  <text x="260" y="311" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">6 semaines</text>
  <!-- Complexity dots: medium -->
  <circle cx="378" cy="311" r="5" fill="#ff6b9d"/>
  <circle cx="396" cy="311" r="5" fill="#ff6b9d"/>
  <circle cx="414" cy="311" r="5" fill="#ff6b9d" opacity="0.3"/>
  <text x="540" y="311" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">8-12 devs</text>
  <text x="780" y="306" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">SaaS, produits digitaux</text>
  <text x="780" y="322" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">besoin de design solide amont</text>

  <!-- Row 4: XP -->
  <rect x="30" y="350" width="940" height="64" rx="8" fill="#6ecf00" fill-opacity="0.03" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.12"/>
  <text x="100" y="376" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#6ecf00">XP</text>
  <text x="100" y="394" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#475569">Extreme Programming</text>
  <text x="260" y="383" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">1-2 semaines</text>
  <!-- Complexity dots: very high -->
  <circle cx="378" cy="383" r="5" fill="#6ecf00"/>
  <circle cx="396" cy="383" r="5" fill="#6ecf00"/>
  <circle cx="414" cy="383" r="5" fill="#6ecf00"/>
  <text x="540" y="383" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">3-8 devs experts</text>
  <text x="780" y="378" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Code critique, haute qualité</text>
  <text x="780" y="394" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">finance, healthcare, infra</text>

  <!-- Row 5: Lean -->
  <rect x="30" y="422" width="940" height="64" rx="8" fill="#8b9cbf" fill-opacity="0.03" stroke="#8b9cbf" stroke-width="1" stroke-opacity="0.12"/>
  <text x="100" y="448" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#8b9cbf">Lean</text>
  <text x="100" y="466" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#475569">Philosophie</text>
  <text x="260" y="455" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">Variable</text>
  <!-- Complexity dots: low -->
  <circle cx="378" cy="455" r="5" fill="#8b9cbf"/>
  <circle cx="396" cy="455" r="5" fill="#8b9cbf" opacity="0.3"/>
  <circle cx="414" cy="455" r="5" fill="#8b9cbf" opacity="0.3"/>
  <text x="540" y="455" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">Toute taille</text>
  <text x="780" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Optimisation globale</text>
  <text x="780" y="466" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">réduction du gaspillage</text>

  <!-- Legend -->
  <text x="340" y="517" font-family="Inter, sans-serif" font-size="9" fill="#475569">Complexité :</text>
  <circle cx="420" cy="513" r="4" fill="#64748b"/>
  <text x="428" y="517" font-family="Inter, sans-serif" font-size="9" fill="#475569">faible</text>
  <circle cx="468" cy="513" r="4" fill="#64748b"/>
  <circle cx="480" cy="513" r="4" fill="#64748b"/>
  <text x="488" y="517" font-family="Inter, sans-serif" font-size="9" fill="#475569">moyenne</text>
  <circle cx="542" cy="513" r="4" fill="#64748b"/>
  <circle cx="554" cy="513" r="4" fill="#64748b"/>
  <circle cx="566" cy="513" r="4" fill="#64748b"/>
  <text x="574" y="517" font-family="Inter, sans-serif" font-size="9" fill="#475569">élevée</text>
</svg>
