<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141824;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-size="26" font-weight="bold" fill="#a6f079">
    Comparaison: Quel Framework pour Votre Équipe?
  </text>

  <!-- Table headers -->
  <rect x="20" y="70" width="150" height="40" fill="#8b9cbf" opacity="0.2"/>
  <text x="95" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#a6f079">Framework</text>

  <rect x="170" y="70" width="120" height="40" fill="#8b9cbf" opacity="0.2"/>
  <text x="230" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#a6f079">Itération</text>

  <rect x="290" y="70" width="140" height="40" fill="#8b9cbf" opacity="0.2"/>
  <text x="360" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#a6f079">Structure</text>

  <rect x="430" y="70" width="140" height="40" fill="#8b9cbf" opacity="0.2"/>
  <text x="500" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#a6f079">Complexité</text>

  <rect x="570" y="70" width="140" height="40" fill="#8b9cbf" opacity="0.2"/>
  <text x="640" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#a6f079">Équipe</text>

  <rect x="710" y="70" width="160" height="40" fill="#8b9cbf" opacity="0.2"/>
  <text x="790" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#a6f079">Meilleur pour</text>

  <rect x="870" y="70" width="310" height="40" fill="#8b9cbf" opacity="0.2"/>
  <text x="1025" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#a6f079">Attention</text>

  <!-- Row 1: Scrum -->
  <rect x="20" y="120" width="150" height="70" fill="#a6f079" opacity="0.08" stroke="#a6f079" stroke-width="1"/>
  <text x="95" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="#a6f079">Scrum</text>
  <text x="95" y="170" text-anchor="middle" font-size="9" fill="#8b9cbf">Le plus populaire</text>

  <rect x="170" y="120" width="120" height="70" fill="#a6f079" opacity="0.08"/>
  <text x="230" y="150" text-anchor="middle" font-size="11" fill="#8b9cbf">2-4 semaines</text>
  <text x="230" y="168" text-anchor="middle" font-size="9" fill="#8b9cbf">(Sprints)</text>

  <rect x="290" y="120" width="140" height="70" fill="#a6f079" opacity="0.08"/>
  <text x="360" y="150" text-anchor="middle" font-size="11" fill="#8b9cbf">Très structuré</text>
  <text x="360" y="168" text-anchor="middle" font-size="9" fill="#8b9cbf">3 rôles définis</text>

  <rect x="430" y="120" width="140" height="70" fill="#a6f079" opacity="0.08"/>
  <text x="500" y="150" text-anchor="middle" font-size="11" fill="#8b9cbf">Moyenne</text>
  <text x="500" y="168" text-anchor="middle" font-size="9" fill="#8b9cbf">À apprendre</text>

  <rect x="570" y="120" width="140" height="70" fill="#a6f079" opacity="0.08"/>
  <text x="640" y="150" text-anchor="middle" font-size="11" fill="#8b9cbf">6-15 devs</text>
  <text x="640" y="168" text-anchor="middle" font-size="9" fill="#8b9cbf">Idéal</text>

  <rect x="710" y="120" width="160" height="70" fill="#a6f079" opacity="0.08"/>
  <text x="790" y="145" text-anchor="middle" font-size="10" fill="#8b9cbf">Projets medium</text>
  <text x="790" y="160" text-anchor="middle" font-size="10" fill="#8b9cbf">avec client</text>
  <text x="790" y="175" text-anchor="middle" font-size="10" fill="#8b9cbf">engagé</text>

  <rect x="870" y="120" width="310" height="70" fill="#a6f079" opacity="0.08"/>
  <text x="1025" y="140" text-anchor="middle" font-size="9" fill="#8b9cbf">Nécessite une adoption</text>
  <text x="1025" y="153" text-anchor="middle" font-size="9" fill="#8b9cbf">stricte. Formation requise.</text>
  <text x="1025" y="166" text-anchor="middle" font-size="9" fill="#8b9cbf">Prise de décision lente</text>
  <text x="1025" y="179" text-anchor="middle" font-size="9" fill="#8b9cbf">avec beaucoup d'équipes</text>

  <!-- Row 2: Kanban -->
  <rect x="20" y="200" width="150" height="70" fill="#c792e9" opacity="0.08" stroke="#c792e9" stroke-width="1"/>
  <text x="95" y="230" text-anchor="middle" font-size="12" font-weight="bold" fill="#c792e9">Kanban</text>
  <text x="95" y="250" text-anchor="middle" font-size="9" fill="#8b9cbf">Flux continu</text>

  <rect x="170" y="200" width="120" height="70" fill="#c792e9" opacity="0.08"/>
  <text x="230" y="230" text-anchor="middle" font-size="11" fill="#8b9cbf">Aucune</text>
  <text x="230" y="248" text-anchor="middle" font-size="9" fill="#8b9cbf">(Continu)</text>

  <rect x="290" y="200" width="140" height="70" fill="#c792e9" opacity="0.08"/>
  <text x="360" y="230" text-anchor="middle" font-size="11" fill="#8b9cbf">Peu structuré</text>
  <text x="360" y="248" text-anchor="middle" font-size="9" fill="#8b9cbf">Flexible</text>

  <rect x="430" y="200" width="140" height="70" fill="#c792e9" opacity="0.08"/>
  <text x="500" y="230" text-anchor="middle" font-size="11" fill="#8b9cbf">Basse</text>
  <text x="500" y="248" text-anchor="middle" font-size="9" fill="#8b9cbf">Facile à commencer</text>

  <rect x="570" y="200" width="140" height="70" fill="#c792e9" opacity="0.08"/>
  <text x="640" y="230" text-anchor="middle" font-size="11" fill="#8b9cbf">N'importe quelle taille</text>
  <text x="640" y="248" text-anchor="middle" font-size="9" fill="#8b9cbf">Scalable</text>

  <rect x="710" y="200" width="160" height="70" fill="#c792e9" opacity="0.08"/>
  <text x="790" y="145" text-anchor="middle" font-size="10" fill="#8b9cbf">Support produits,</text>
  <text x="790" y="160" text-anchor="middle" font-size="10" fill="#8b9cbf">maintenance,</text>
  <text x="790" y="175" text-anchor="middle" font-size="10" fill="#8b9cbf">equipes DevOps</text>

  <rect x="870" y="200" width="310" height="70" fill="#c792e9" opacity="0.08"/>
  <text x="1025" y="130" text-anchor="middle" font-size="9" fill="#8b9cbf">Pas de structure peut</text>
  <text x="1025" y="143" text-anchor="middle" font-size="9" fill="#8b9cbf">causer du chaos. Nécessite</text>
  <text x="1025" y="156" text-anchor="middle" font-size="9" fill="#8b9cbf">discipline. WIP limits</text>
  <text x="1025" y="169" text-anchor="middle" font-size="9" fill="#8b9cbf">essentielles.</text>

  <!-- Row 3: Shape Up -->
  <rect x="20" y="280" width="150" height="70" fill="#ff6b9d" opacity="0.08" stroke="#ff6b9d" stroke-width="1"/>
  <text x="95" y="310" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff6b9d">Shape Up</text>
  <text x="95" y="330" text-anchor="middle" font-size="9" fill="#8b9cbf">Par Basecamp</text>

  <rect x="170" y="280" width="120" height="70" fill="#ff6b9d" opacity="0.08"/>
  <text x="230" y="310" text-anchor="middle" font-size="11" fill="#8b9cbf">6 semaines</text>
  <text x="230" y="328" text-anchor="middle" font-size="9" fill="#8b9cbf">Fixe</text>

  <rect x="290" y="280" width="140" height="70" fill="#ff6b9d" opacity="0.08"/>
  <text x="360" y="310" text-anchor="middle" font-size="11" fill="#8b9cbf">Structuré avec</text>
  <text x="360" y="328" text-anchor="middle" font-size="9" fill="#8b9cbf">phases claires</text>

  <rect x="430" y="280" width="140" height="70" fill="#ff6b9d" opacity="0.08"/>
  <text x="500" y="310" text-anchor="middle" font-size="11" fill="#8b9cbf">Moyenne</text>
  <text x="500" y="328" text-anchor="middle" font-size="9" fill="#8b9cbf">Nécessite design</text>

  <rect x="570" y="280" width="140" height="70" fill="#ff6b9d" opacity="0.08"/>
  <text x="640" y="310" text-anchor="middle" font-size="11" fill="#8b9cbf">8-12 devs</text>
  <text x="640" y="328" text-anchor="middle" font-size="9" fill="#8b9cbf">Optimal</text>

  <rect x="710" y="280" width="160" height="70" fill="#ff6b9d" opacity="0.08"/>
  <text x="790" y="305" text-anchor="middle" font-size="10" fill="#8b9cbf">Produits SaaS,</text>
  <text x="790" y="320" text-anchor="middle" font-size="10" fill="#8b9cbf">digital, besoin de</text>
  <text x="790" y="335" text-anchor="middle" font-size="10" fill="#8b9cbf">design solide</text>

  <rect x="870" y="280" width="310" height="70" fill="#ff6b9d" opacity="0.08"/>
  <text x="1025" y="300" text-anchor="middle" font-size="9" fill="#8b9cbf">Demande design très amont.</text>
  <text x="1025" y="313" text-anchor="middle" font-size="9" fill="#8b9cbf">Rôles flexibles = peut être</text>
  <text x="1025" y="326" text-anchor="middle" font-size="9" fill="#8b9cbf">confus si mal implémenté.</text>
  <text x="1025" y="339" text-anchor="middle" font-size="9" fill="#8b9cbf">Moins documenté</text>

  <!-- Row 4: XP -->
  <rect x="20" y="360" width="150" height="70" fill="#6ecf00" opacity="0.08" stroke="#6ecf00" stroke-width="1"/>
  <text x="95" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#6ecf00">XP</text>
  <text x="95" y="410" text-anchor="middle" font-size="9" fill="#8b9cbf">Hardcore coding</text>

  <rect x="170" y="360" width="120" height="70" fill="#6ecf00" opacity="0.08"/>
  <text x="230" y="390" text-anchor="middle" font-size="11" fill="#8b9cbf">1-2 semaines</text>
  <text x="230" y="408" text-anchor="middle" font-size="9" fill="#8b9cbf">(Itérations)</text>

  <rect x="290" y="360" width="140" height="70" fill="#6ecf00" opacity="0.08"/>
  <text x="360" y="390" text-anchor="middle" font-size="11" fill="#8b9cbf">Strict sur les</text>
  <text x="360" y="408" text-anchor="middle" font-size="9" fill="#8b9cbf">pratiques</text>

  <rect x="430" y="360" width="140" height="70" fill="#6ecf00" opacity="0.08"/>
  <text x="500" y="390" text-anchor="middle" font-size="11" fill="#8b9cbf">Haute</text>
  <text x="500" y="408" text-anchor="middle" font-size="9" fill="#8b9cbf">Discipline requise</text>

  <rect x="570" y="360" width="140" height="70" fill="#6ecf00" opacity="0.08"/>
  <text x="640" y="390" text-anchor="middle" font-size="11" fill="#8b9cbf">3-8 devs</text>
  <text x="640" y="408" text-anchor="middle" font-size="9" fill="#8b9cbf">Petit &amp; expert</text>

  <rect x="710" y="360" width="160" height="70" fill="#6ecf00" opacity="0.08"/>
  <text x="790" y="385" text-anchor="middle" font-size="10" fill="#8b9cbf">Code critique,</text>
  <text x="790" y="400" text-anchor="middle" font-size="10" fill="#8b9cbf">besoin de</text>
  <text x="790" y="415" text-anchor="middle" font-size="10" fill="#8b9cbf">qualité maximum</text>

  <rect x="870" y="360" width="310" height="70" fill="#6ecf00" opacity="0.08"/>
  <text x="1025" y="380" text-anchor="middle" font-size="9" fill="#8b9cbf">Burnout possible. Très</text>
  <text x="1025" y="393" text-anchor="middle" font-size="9" fill="#8b9cbf">demandant mentalement.</text>
  <text x="1025" y="406" text-anchor="middle" font-size="9" fill="#8b9cbf">Pair programming = coûts</text>
  <text x="1025" y="419" text-anchor="middle" font-size="9" fill="#8b9cbf">doublés</text>

  <!-- Row 5: Lean -->
  <rect x="20" y="440" width="150" height="70" fill="#c792e9" opacity="0.08" stroke="#c792e9" stroke-width="1"/>
  <text x="95" y="470" text-anchor="middle" font-size="12" font-weight="bold" fill="#c792e9">Lean Software</text>
  <text x="95" y="485" text-anchor="middle" font-size="9" fill="#8b9cbf">Dev</text>

  <rect x="170" y="440" width="120" height="70" fill="#c792e9" opacity="0.08"/>
  <text x="230" y="470" text-anchor="middle" font-size="11" fill="#8b9cbf">Variable</text>
  <text x="230" y="488" text-anchor="middle" font-size="9" fill="#8b9cbf">(Flexible)</text>

  <rect x="290" y="440" width="140" height="70" fill="#c792e9" opacity="0.08"/>
  <text x="360" y="470" text-anchor="middle" font-size="11" fill="#8b9cbf">Peu structuré</text>
  <text x="360" y="488" text-anchor="middle" font-size="9" fill="#8b9cbf">Principes généraux</text>

  <rect x="430" y="440" width="140" height="70" fill="#c792e9" opacity="0.08"/>
  <text x="500" y="470" text-anchor="middle" font-size="11" fill="#8b9cbf">Basse</text>
  <text x="500" y="488" text-anchor="middle" font-size="9" fill="#8b9cbf">Souple</text>

  <rect x="570" y="440" width="140" height="70" fill="#c792e9" opacity="0.08"/>
  <text x="640" y="470" text-anchor="middle" font-size="11" fill="#8b9cbf">N'importe quelle</text>
  <text x="640" y="488" text-anchor="middle" font-size="9" fill="#8b9cbf">taille</text>

  <rect x="710" y="440" width="160" height="70" fill="#c792e9" opacity="0.08"/>
  <text x="790" y="465" text-anchor="middle" font-size="10" fill="#8b9cbf">Optimisation du</text>
  <text x="790" y="480" text-anchor="middle" font-size="10" fill="#8b9cbf">flux général,</text>
  <text x="790" y="495" text-anchor="middle" font-size="10" fill="#8b9cbf">gaspillage</text>

  <rect x="870" y="440" width="310" height="70" fill="#c792e9" opacity="0.08"/>
  <text x="1025" y="460" text-anchor="middle" font-size="9" fill="#8b9cbf">Très généraliste. Doit être</text>
  <text x="1025" y="473" text-anchor="middle" font-size="9" fill="#8b9cbf">adapté à votre contexte.</text>
  <text x="1025" y="486" text-anchor="middle" font-size="9" fill="#8b9cbf">Risque de devenir du simple</text>
  <text x="1025" y="499" text-anchor="middle" font-size="9" fill="#8b9cbf">bon sens sans structure</text>

  <!-- Legend at bottom -->
  <text x="600" y="650" text-anchor="middle" font-size="11" fill="#8b9cbf">
    💡 Conseil: La plupart des équipes commencent par Scrum (le plus structuré), puis évoluent vers Kanban ou Shape Up selon leur contexte
  </text>
</svg>