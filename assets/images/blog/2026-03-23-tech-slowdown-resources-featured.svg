<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2235"/>
      <stop offset="100%" stop-color="#0d1018"/>
    </linearGradient>

    <!-- Gauge gradient: green to red -->
    <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a6f079"/>
      <stop offset="50%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#ff4d5a"/>
    </linearGradient>

    <!-- Bar gradients -->
    <linearGradient id="barRust" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e07b39"/>
      <stop offset="100%" stop-color="#f09050"/>
    </linearGradient>
    <linearGradient id="barZig" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0a030"/>
      <stop offset="100%" stop-color="#f0c050"/>
    </linearGradient>
    <linearGradient id="barGo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00acd7"/>
      <stop offset="100%" stop-color="#40cef0"/>
    </linearGradient>
    <linearGradient id="barNode" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4d5a"/>
      <stop offset="100%" stop-color="#ff7080"/>
    </linearGradient>
    <linearGradient id="barElectron" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#e05040"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="240" y1="0" x2="240" y2="480"/>
    <line x1="480" y1="0" x2="480" y2="480"/>
    <line x1="720" y1="0" x2="720" y2="480"/>
    <line x1="960" y1="0" x2="960" y2="480"/>
  </g>

  <!-- Ambient glow top left (resources depleting) -->
  <circle cx="200" cy="150" r="180" fill="#ff4d5a" opacity="0.05" filter="url(#softglow)"/>
  <!-- Ambient glow right (low-level languages) -->
  <circle cx="1000" cy="200" r="180" fill="#e07b39" opacity="0.07" filter="url(#softglow)"/>

  <!-- =========================================== -->
  <!-- LEFT: Resource depletion gauge               -->
  <!-- =========================================== -->

  <text x="80" y="68" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#8b9cbf" letter-spacing="2">RESSOURCES DISPONIBLES</text>

  <!-- Gauge track -->
  <rect x="80" y="82" width="340" height="18" rx="9" fill="#1a1f35" stroke="#2d3450" stroke-width="1"/>
  <!-- Gauge fill: only 28% left -->
  <rect x="80" y="82" width="95" height="18" rx="9" fill="url(#gaugeGrad)"/>
  <!-- Gauge needle marker -->
  <line x1="175" y1="76" x2="175" y2="106" stroke="#ff4d5a" stroke-width="2" filter="url(#glow)"/>
  <text x="178" y="114" font-family="Arial, sans-serif" font-size="10" fill="#ff4d5a">28%</text>

  <!-- Resource items -->
  <g font-family="Arial, sans-serif" font-size="13">
    <!-- Petrole -->
    <text x="80" y="155" fill="#8b9cbf" font-weight="700">Pétrole</text>
    <rect x="80" y="162" width="340" height="10" rx="5" fill="#1a1f35"/>
    <rect x="80" y="162" width="119" height="10" rx="5" fill="#ff6b6b" opacity="0.8"/>
    <text x="426" y="172" font-family="Arial, sans-serif" font-size="11" fill="#ff6b6b">35%</text>

    <!-- Terres rares -->
    <text x="80" y="200" fill="#8b9cbf" font-weight="700">Terres rares</text>
    <rect x="80" y="207" width="340" height="10" rx="5" fill="#1a1f35"/>
    <rect x="80" y="207" width="136" height="10" rx="5" fill="#f0c040" opacity="0.8"/>
    <text x="426" y="217" font-family="Arial, sans-serif" font-size="11" fill="#f0c040">40%</text>

    <!-- Eau -->
    <text x="80" y="245" fill="#8b9cbf" font-weight="700">Eau (régions tech)</text>
    <rect x="80" y="252" width="340" height="10" rx="5" fill="#1a1f35"/>
    <rect x="80" y="252" width="78" height="10" rx="5" fill="#ff4d5a" opacity="0.8"/>
    <text x="426" y="262" font-family="Arial, sans-serif" font-size="11" fill="#ff4d5a">23%</text>

    <!-- Semi-conducteurs -->
    <text x="80" y="290" fill="#8b9cbf" font-weight="700">Semi-conducteurs</text>
    <rect x="80" y="297" width="340" height="10" rx="5" fill="#1a1f35"/>
    <rect x="80" y="297" width="153" height="10" rx="5" fill="#c792e9" opacity="0.8"/>
    <text x="426" y="307" font-family="Arial, sans-serif" font-size="11" fill="#c792e9">45%</text>
  </g>

  <!-- Energy consumption label -->
  <rect x="80" y="330" width="340" height="60" rx="8" fill="#ff4d5a" fill-opacity="0.08" stroke="#ff4d5a" stroke-width="1" stroke-opacity="0.3"/>
  <text x="100" y="353" font-family="Arial, sans-serif" font-size="12" fill="#ff6b6b" font-weight="700">1 requête IA = 10x une recherche Google</text>
  <text x="100" y="373" font-family="Arial, sans-serif" font-size="11" fill="#8b9cbf">GPT-4 training = centaines de vols transatlantiques</text>

  <!-- =========================================== -->
  <!-- DIVIDER                                      -->
  <!-- =========================================== -->
  <line x1="500" y1="40" x2="500" y2="460" stroke="#2d3050" stroke-width="1.5"/>

  <!-- =========================================== -->
  <!-- RIGHT: Language efficiency comparison        -->
  <!-- =========================================== -->

  <text x="540" y="68" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#8b9cbf" letter-spacing="2">CONSOMMATION MÉMOIRE RELATIVE</text>

  <!-- Rust bar -->
  <text x="540" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#e07b39">Rust</text>
  <rect x="640" y="94" width="460" height="22" rx="4" fill="#1a1f35"/>
  <rect x="640" y="94" width="46" height="22" rx="4" fill="url(#barRust)" filter="url(#glow)"/>
  <text x="694" y="110" font-family="Arial, sans-serif" font-size="12" fill="#e07b39" font-weight="700">1x</text>

  <!-- Zig bar -->
  <text x="540" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#f0a030">Zig</text>
  <rect x="640" y="134" width="460" height="22" rx="4" fill="#1a1f35"/>
  <rect x="640" y="134" width="55" height="22" rx="4" fill="url(#barZig)" filter="url(#glow)"/>
  <text x="703" y="150" font-family="Arial, sans-serif" font-size="12" fill="#f0a030" font-weight="700">1.2x</text>

  <!-- Go bar -->
  <text x="540" y="190" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#00acd7">Go</text>
  <rect x="640" y="174" width="460" height="22" rx="4" fill="#1a1f35"/>
  <rect x="640" y="174" width="92" height="22" rx="4" fill="url(#barGo)"/>
  <text x="740" y="190" font-family="Arial, sans-serif" font-size="12" fill="#00acd7" font-weight="700">2x</text>

  <!-- Node.js bar -->
  <text x="540" y="230" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ff6b6b">Node.js</text>
  <rect x="640" y="214" width="460" height="22" rx="4" fill="#1a1f35"/>
  <rect x="640" y="214" width="276" height="22" rx="4" fill="url(#barNode)" opacity="0.8"/>
  <text x="924" y="230" font-family="Arial, sans-serif" font-size="12" fill="#ff6b6b" font-weight="700">6x</text>

  <!-- Electron bar -->
  <text x="540" y="270" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#c0392b">Electron</text>
  <rect x="640" y="254" width="460" height="22" rx="4" fill="#1a1f35"/>
  <rect x="640" y="254" width="460" height="22" rx="4" fill="url(#barElectron)" opacity="0.7"/>
  <text x="1108" y="270" font-family="Arial, sans-serif" font-size="12" fill="#ff4d5a" font-weight="700">10x+</text>

  <!-- Rising arrow: Rust/Zig adoption -->
  <rect x="540" y="310" width="570" height="70" rx="8" fill="#e07b39" fill-opacity="0.07" stroke="#e07b39" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Arrow up -->
  <polygon points="560,365 570,340 580,365" fill="#a6f079" opacity="0.8"/>
  <line x1="570" y1="365" x2="570" y2="375" stroke="#a6f079" stroke-width="2" opacity="0.8"/>
  <text x="592" y="335" font-family="Arial, sans-serif" font-size="13" fill="#a6f079" font-weight="700">Adoption Rust en hausse de 400% (2022-2025)</text>
  <text x="592" y="358" font-family="Arial, sans-serif" font-size="11" fill="#8b9cbf">Linux kernel, Android, Windows, AWS, Meta, Mozilla</text>
  <text x="592" y="373" font-family="Arial, sans-serif" font-size="11" fill="#8b9cbf">Zig: runtime Bun, systèmes embarqués critiques</text>

  <!-- =========================================== -->
  <!-- BOTTOM TITLE BAND                            -->
  <!-- =========================================== -->
  <rect x="0" y="480" width="1200" height="150" fill="#0a0c14" opacity="0.95"/>
  <rect x="0" y="480" width="1200" height="2" fill="#a6f079" opacity="0.6"/>

  <text x="80" y="535" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#ffffff" letter-spacing="-0.5">La tech doit ralentir.</text>
  <text x="80" y="535" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#a6f079" dx="390" letter-spacing="-0.5">Rust et Zig, une des réponses.</text>
  <text x="80" y="573" font-family="Arial, sans-serif" font-size="14" fill="#8b9cbf" letter-spacing="1">PÉTROLE · TERRES RARES · EAU · SEMI-CONDUCTEURS · LOGICIEL SOBRE</text>

  <!-- sinra.app -->
  <text x="1120" y="612" font-family="Arial, sans-serif" font-size="12" fill="#c792e9" text-anchor="end" opacity="0.5">sinra.app</text>
</svg>