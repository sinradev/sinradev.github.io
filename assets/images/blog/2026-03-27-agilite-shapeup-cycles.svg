<svg viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#161929"/>
    </linearGradient>
    <linearGradient id="phase1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c792e9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c792e9" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="phase3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a6f079" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="phase4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ecf00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6ecf00" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>

  <rect width="1000" height="420" fill="url(#bg)"/>
  <ellipse cx="500" cy="250" rx="350" ry="120" fill="#ff6b9d" opacity="0.02" filter="url(#blur)"/>

  <!-- Header -->
  <text x="500" y="38" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#475569" letter-spacing="3" font-weight="500">FRAMEWORK · BASECAMP</text>
  <text x="500" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">Shape Up</text>
  <text x="500" y="88" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#475569">Un cycle de 6 semaines · Design solide en amont</text>

  <!-- Timeline base -->
  <rect x="40" y="152" width="920" height="4" rx="2" fill="#1e293b"/>

  <!-- Phase bars + labels -->
  <!-- Phase 1: Shaping -->
  <rect x="40" y="116" width="160" height="40" rx="8" fill="url(#phase1)" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.4"/>
  <text x="120" y="131" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ff6b9d" letter-spacing="1">SHAPING</text>
  <text x="120" y="147" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#475569">1-2 sem. avant</text>
  <rect x="40" y="152" width="160" height="4" rx="2" fill="#ff6b9d" opacity="0.6"/>

  <!-- Phase 2: Pitching -->
  <rect x="220" y="116" width="140" height="40" rx="8" fill="url(#phase2)" stroke="#c792e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="290" y="131" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#c792e9" letter-spacing="1">PITCHING</text>
  <text x="290" y="147" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#475569">Début cycle</text>
  <rect x="220" y="152" width="140" height="4" rx="2" fill="#c792e9" opacity="0.6"/>

  <!-- Phase 3: Building -->
  <rect x="380" y="116" width="440" height="40" rx="8" fill="url(#phase3)" stroke="#a6f079" stroke-width="1" stroke-opacity="0.4"/>
  <text x="600" y="131" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#a6f079" letter-spacing="1">BUILDING</text>
  <text x="600" y="147" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#475569">6 semaines de développement</text>
  <rect x="380" y="152" width="440" height="4" rx="2" fill="#a6f079" opacity="0.6"/>

  <!-- Phase 4: Cooldown -->
  <rect x="840" y="116" width="120" height="40" rx="8" fill="url(#phase4)" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.4"/>
  <text x="900" y="131" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#6ecf00" letter-spacing="1">COOLDOWN</text>
  <text x="900" y="147" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#475569">Entre cycles</text>
  <rect x="840" y="152" width="120" height="4" rx="2" fill="#6ecf00" opacity="0.6"/>

  <!-- Detail cards below -->
  <rect x="40" y="182" width="160" height="100" rx="8" fill="#0f1117" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.15"/>
  <text x="120" y="205" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">Conception</text>
  <text x="120" y="223" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Mockups, scope</text>
  <text x="120" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Risques identifiés</text>
  <text x="120" y="257" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Contraintes définies</text>

  <rect x="220" y="182" width="140" height="100" rx="8" fill="#0f1117" stroke="#c792e9" stroke-width="1" stroke-opacity="0.15"/>
  <text x="290" y="205" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">Validation</text>
  <text x="290" y="223" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Présentation</text>
  <text x="290" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Vote Go/No-go</text>
  <text x="290" y="257" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Budget temps</text>

  <rect x="380" y="182" width="440" height="100" rx="8" fill="#0f1117" stroke="#a6f079" stroke-width="1" stroke-opacity="0.15"/>
  <text x="600" y="205" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">Développement autonome</text>
  <text x="600" y="223" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">L'équipe s'organise librement dans le périmètre défini</text>
  <text x="600" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Pas de changement de scope en cours de cycle</text>
  <text x="600" y="257" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Si trop complexe : déscopage plutôt que report</text>

  <rect x="840" y="182" width="120" height="100" rx="8" fill="#0f1117" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.15"/>
  <text x="900" y="205" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">Pause</text>
  <text x="900" y="223" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Bug fixes</text>
  <text x="900" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Prochains</text>
  <text x="900" y="257" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">pitches</text>

  <!-- Footer note -->
  <text x="500" y="360" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#334155">Créé par <tspan fill="#475569">Basecamp</tspan> · Design amont = moins d'imprévus en développement</text>
</svg>
