<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141824;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="26" font-weight="bold" fill="#c792e9">
    Lean: Éliminer le Gaspillage
  </text>

  <!-- Subtitle -->
  <text x="500" y="65" text-anchor="middle" font-size="13" fill="#8b9cbf">
    Principes issus de la fabrication automobile (Toyota)
  </text>

  <!-- Principle 1: Value -->
  <rect x="50" y="110" width="160" height="130" rx="6" fill="#c792e9" opacity="0.2" stroke="#c792e9" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="130" cy="145" r="15" fill="#c792e9" opacity="0.3"/>
  <path d="M 125 140 L 135 140 M 130 135 L 130 150" stroke="#c792e9" stroke-width="1.5"/>
  <text x="130" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#c792e9">1. Value</text>
  <text x="130" y="215" text-anchor="middle" font-size="9" fill="#8b9cbf">Créer de la valeur</text>
  <text x="130" y="228" text-anchor="middle" font-size="9" fill="#8b9cbf">pour le client</text>

  <!-- Principle 2: Flow -->
  <rect x="240" y="110" width="160" height="130" rx="6" fill="#c792e9" opacity="0.2" stroke="#c792e9" stroke-width="1.5" filter="url(#glow)"/>
  <path d="M 300 140 L 340 140 M 335 135 L 340 140 L 335 145" stroke="#c792e9" stroke-width="2"/>
  <path d="M 300 160 L 330 160" stroke="#c792e9" stroke-width="1.5" opacity="0.5"/>
  <text x="320" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#c792e9">2. Flux</text>
  <text x="320" y="215" text-anchor="middle" font-size="9" fill="#8b9cbf">Travail qui coule</text>
  <text x="320" y="228" text-anchor="middle" font-size="9" fill="#8b9cbf">sans attentes</text>

  <!-- Principle 3: Pull -->
  <rect x="430" y="110" width="160" height="130" rx="6" fill="#c792e9" opacity="0.2" stroke="#c792e9" stroke-width="1.5" filter="url(#glow)"/>
  <path d="M 510 135 L 490 155 M 485 150 L 490 155 L 495 150" stroke="#c792e9" stroke-width="2"/>
  <circle cx="510" cy="145" r="8" fill="#c792e9" opacity="0.2"/>
  <text x="510" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#c792e9">3. Pull</text>
  <text x="510" y="215" text-anchor="middle" font-size="9" fill="#8b9cbf">L'équipe « tire »</text>
  <text x="510" y="228" text-anchor="middle" font-size="9" fill="#8b9cbf">le travail au besoin</text>

  <!-- Principle 4: Quality -->
  <rect x="620" y="110" width="160" height="130" rx="6" fill="#c792e9" opacity="0.2" stroke="#c792e9" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="700" cy="140" r="10" fill="none" stroke="#c792e9" stroke-width="2"/>
  <path d="M 695 140 L 705 150" stroke="#c792e9" stroke-width="1.5"/>
  <path d="M 705 140 L 695 150" stroke="#c792e9" stroke-width="1.5"/>
  <text x="700" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#c792e9">4. Qualité</text>
  <text x="700" y="215" text-anchor="middle" font-size="9" fill="#8b9cbf">Qualité intégrée</text>
  <text x="700" y="228" text-anchor="middle" font-size="9" fill="#8b9cbf">dès le départ</text>

  <!-- Principle 5: Continuous Improvement -->
  <rect x="810" y="110" width="160" height="130" rx="6" fill="#c792e9" opacity="0.2" stroke="#c792e9" stroke-width="1.5" filter="url(#glow)"/>
  <path d="M 880 135 L 900 160 M 880 160 L 900 135" stroke="#c792e9" stroke-width="2"/>
  <circle cx="890" cy="147" r="8" fill="none" stroke="#c792e9" stroke-width="1.5"/>
  <text x="890" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#c792e9">5. Kaizen</text>
  <text x="890" y="215" text-anchor="middle" font-size="9" fill="#8b9cbf">Amélioration</text>
  <text x="890" y="228" text-anchor="middle" font-size="9" fill="#8b9cbf">continue</text>

  <!-- Types of Waste -->
  <text x="500" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#a6f079">
    Types de Gaspillage (Muda) à Éliminer
  </text>

  <!-- Waste 1: Overproduction -->
  <g>
    <rect x="50" y="330" width="165" height="60" rx="4" fill="#ff6b9d" opacity="0.1" stroke="#ff6b9d" stroke-width="1"/>
    <text x="132" y="350" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff6b9d">Surproduction</text>
    <text x="132" y="368" text-anchor="middle" font-size="9" fill="#8b9cbf">Features non demandées</text>
    <text x="132" y="380" text-anchor="middle" font-size="8" fill="#8b9cbf" opacity="0.7">= Coûts inutiles</text>
  </g>

  <!-- Waste 2: Waiting -->
  <g>
    <rect x="235" y="330" width="165" height="60" rx="4" fill="#ff6b9d" opacity="0.1" stroke="#ff6b9d" stroke-width="1"/>
    <text x="317" y="350" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff6b9d">Attentes</text>
    <text x="317" y="368" text-anchor="middle" font-size="9" fill="#8b9cbf">Files d'attente, blocages</text>
    <text x="317" y="380" text-anchor="middle" font-size="8" fill="#8b9cbf" opacity="0.7">= Délais allongés</text>
  </g>

  <!-- Waste 3: Motion -->
  <g>
    <rect x="420" y="330" width="165" height="60" rx="4" fill="#ff6b9d" opacity="0.1" stroke="#ff6b9d" stroke-width="1"/>
    <text x="502" y="350" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff6b9d">Mouvements</text>
    <text x="502" y="368" text-anchor="middle" font-size="9" fill="#8b9cbf">Contexte switching</text>
    <text x="502" y="380" text-anchor="middle" font-size="8" fill="#8b9cbf" opacity="0.7">= Productivité réduite</text>
  </g>

  <!-- Waste 4: Defects -->
  <g>
    <rect x="605" y="330" width="165" height="60" rx="4" fill="#ff6b9d" opacity="0.1" stroke="#ff6b9d" stroke-width="1"/>
    <text x="687" y="350" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff6b9d">Défauts</text>
    <text x="687" y="368" text-anchor="middle" font-size="9" fill="#8b9cbf">Bugs, rework</text>
    <text x="687" y="380" text-anchor="middle" font-size="8" fill="#8b9cbf" opacity="0.7">= Effort dupliqué</text>
  </g>

  <!-- Waste 5: Processing -->
  <g>
    <rect x="790" y="330" width="165" height="60" rx="4" fill="#ff6b9d" opacity="0.1" stroke="#ff6b9d" stroke-width="1"/>
    <text x="872" y="350" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff6b9d">Processus</text>
    <text x="872" y="368" text-anchor="middle" font-size="9" fill="#8b9cbf">Bureaucratie inutile</text>
    <text x="872" y="380" text-anchor="middle" font-size="8" fill="#8b9cbf" opacity="0.7">= Freins administratifs</text>
  </g>

  <!-- Bottom note -->
  <text x="500" y="450" text-anchor="middle" font-size="12" fill="#8b9cbf">
    Le Lean appliqué au développement logiciel = Lean Software Development (développé par Mary &amp; Tom Poppendieck)
  </text>
</svg>