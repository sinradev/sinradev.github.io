<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif;">
  <!-- Gradient backgrounds -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141824;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a6f079;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ecf00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid overlay -->
  <g opacity="0.04" stroke="#8b9cbf" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- Central circle diagram - Agile cycle -->
  <circle cx="400" cy="240" r="120" fill="none" stroke="url(#accentGradient)" stroke-width="3" filter="url(#glow)"/>

  <!-- Inner circles for cycle phases -->
  <circle cx="400" cy="120" r="25" fill="#a6f079" opacity="0.2"/>
  <circle cx="480" cy="165" r="25" fill="#c792e9" opacity="0.2"/>
  <circle cx="480" cy="315" r="25" fill="#ff6b9d" opacity="0.2"/>
  <circle cx="400" cy="360" r="25" fill="#6ecf00" opacity="0.2"/>
  <circle cx="320" cy="315" r="25" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="320" cy="165" r="25" fill="#ff6b9d" opacity="0.2"/>

  <!-- Labels inside cycle points -->
  <text x="400" y="128" text-anchor="middle" font-size="11" fill="#a6f079" font-weight="bold">Plan</text>
  <text x="485" y="162" text-anchor="middle" font-size="11" fill="#c792e9" font-weight="bold">Design</text>
  <text x="490" y="318" text-anchor="middle" font-size="11" fill="#ff6b9d" font-weight="bold">Test</text>
  <text x="400" y="373" text-anchor="middle" font-size="11" fill="#6ecf00" font-weight="bold">Livrer</text>
  <text x="315" y="318" text-anchor="middle" font-size="11" fill="#8b5cf6" font-weight="bold">Construire</text>
  <text x="315" y="162" text-anchor="middle" font-size="11" fill="#ff6b9d" font-weight="bold">Itérer</text>

  <!-- Arrows showing cycle -->
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#a6f079"/>
    </marker>
  </defs>
  <path d="M 410 145 Q 450 150 470 170" stroke="#a6f079" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M 475 190 Q 490 250 480 310" stroke="#a6f079" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M 455 340 Q 420 370 410 360" stroke="#a6f079" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M 390 345 Q 330 370 325 310" stroke="#a6f079" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M 330 290 Q 310 230 325 170" stroke="#a6f079" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M 345 155 Q 370 140 390 150" stroke="#a6f079" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- Right side - Different frameworks -->
  <g>
    <!-- Scrum -->
    <rect x="700" y="70" width="140" height="80" rx="8" fill="#a6f079" opacity="0.15" stroke="#a6f079" stroke-width="2"/>
    <text x="770" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#a6f079">Scrum</text>
    <text x="770" y="120" text-anchor="middle" font-size="10" fill="#8b9cbf">Sprints de 2-4 sem</text>
    <text x="770" y="135" text-anchor="middle" font-size="10" fill="#8b9cbf">Rôles définis</text>

    <!-- Kanban -->
    <rect x="880" y="70" width="140" height="80" rx="8" fill="#c792e9" opacity="0.15" stroke="#c792e9" stroke-width="2"/>
    <text x="950" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#c792e9">Kanban</text>
    <text x="950" y="120" text-anchor="middle" font-size="10" fill="#8b9cbf">Flux continu</text>
    <text x="950" y="135" text-anchor="middle" font-size="10" fill="#8b9cbf">Sans itérations</text>

    <!-- Shape Up -->
    <rect x="700" y="200" width="140" height="80" rx="8" fill="#ff6b9d" opacity="0.15" stroke="#ff6b9d" stroke-width="2"/>
    <text x="770" y="225" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff6b9d">Shape Up</text>
    <text x="770" y="250" text-anchor="middle" font-size="10" fill="#8b9cbf">Cycles 6 semaines</text>
    <text x="770" y="265" text-anchor="middle" font-size="10" fill="#8b9cbf">Pitch amont</text>

    <!-- XP -->
    <rect x="880" y="200" width="140" height="80" rx="8" fill="#6ecf00" opacity="0.15" stroke="#6ecf00" stroke-width="2"/>
    <text x="950" y="225" text-anchor="middle" font-size="16" font-weight="bold" fill="#6ecf00">XP</text>
    <text x="950" y="250" text-anchor="middle" font-size="10" fill="#8b9cbf">Pair programming</text>
    <text x="950" y="265" text-anchor="middle" font-size="10" fill="#8b9cbf">TDD, CI/CD</text>
  </g>

  <!-- Dark title band at bottom -->
  <rect x="0" y="480" width="1200" height="150" fill="#0a0e14" opacity="0.95"/>

  <!-- Main title -->
  <text x="600" y="530" text-anchor="middle" font-size="48" font-weight="bold" fill="#a6f079">Histoire de l'Agilité</text>

  <!-- Subtitle -->
  <text x="600" y="560" text-anchor="middle" font-size="18" fill="#8b9cbf">Des origines Agile à ses évolutions modernes</text>

  <!-- sinra.app branding -->
  <text x="1150" y="615" text-anchor="end" font-size="12" fill="#8b9cbf" opacity="0.6">sinra.app</text>
</svg>