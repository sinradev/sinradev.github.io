<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/>
      <stop offset="60%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="20%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#c792e9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c792e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBottom" cx="60%" cy="90%" r="40%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>
    <filter id="bigblur"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="medblur"><feGaussianBlur stdDeviation="16"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowLeft)"/>
  <rect width="1200" height="630" fill="url(#glowRight)"/>
  <rect width="1200" height="630" fill="url(#glowBottom)"/>

  <!-- Fine grid -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Left decorative: concentric arcs -->
  <circle cx="180" cy="315" r="260" fill="none" stroke="#a6f079" stroke-width="1" stroke-opacity="0.06"/>
  <circle cx="180" cy="315" r="200" fill="none" stroke="#a6f079" stroke-width="1" stroke-opacity="0.09"/>
  <circle cx="180" cy="315" r="140" fill="none" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.14"/>
  <circle cx="180" cy="315" r="80" fill="none" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.22" filter="url(#glow)"/>
  <circle cx="180" cy="315" r="28" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="180" cy="315" r="7" fill="#a6f079" filter="url(#glow)"/>

  <!-- Orbital dots on inner ring -->
  <circle cx="180" cy="235" r="5" fill="#ff6b9d" filter="url(#glow)"/>
  <circle cx="260" cy="315" r="5" fill="#c792e9" filter="url(#glow)"/>
  <circle cx="180" cy="395" r="5" fill="#6ecf00" filter="url(#glow)"/>
  <circle cx="100" cy="315" r="5" fill="#a6f079" filter="url(#glow)"/>

  <!-- Connecting spokes -->
  <line x1="180" y1="287" x2="180" y2="238" stroke="#a6f079" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="208" y1="315" x2="257" y2="315" stroke="#a6f079" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="180" y1="343" x2="180" y2="392" stroke="#a6f079" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="152" y1="315" x2="103" y2="315" stroke="#a6f079" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Vertical separator -->
  <line x1="430" y1="60" x2="430" y2="570" stroke="#1e293b" stroke-width="1"/>

  <!-- Right: Main content -->
  <!-- Eyebrow label -->
  <text x="500" y="168" font-size="11" fill="#475569" letter-spacing="4" font-weight="500">PHILOSOPHIE · GESTION DE PROJET</text>

  <!-- Main title -->
  <text x="500" y="262" font-size="72" font-weight="800" fill="#f8fafc" letter-spacing="-3">Histoire</text>
  <text x="500" y="352" font-size="72" font-weight="800" letter-spacing="-3">
    <tspan fill="#a6f079">de l'</tspan><tspan fill="#f8fafc">Agilité</tspan>
  </text>

  <!-- Subtitle -->
  <text x="500" y="406" font-size="16" fill="#475569">Du Manifeste 2001 aux frameworks modernes</text>

  <!-- Divider line -->
  <line x1="500" y1="432" x2="800" y2="432" stroke="#1e293b" stroke-width="1"/>

  <!-- Framework tags -->
  <g>
    <rect x="500" y="450" width="72" height="28" rx="14" fill="#a6f079" fill-opacity="0.08" stroke="#a6f079" stroke-width="1" stroke-opacity="0.35"/>
    <text x="536" y="469" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600" letter-spacing="0.5">Scrum</text>
  </g>
  <g>
    <rect x="584" y="450" width="80" height="28" rx="14" fill="#c792e9" fill-opacity="0.08" stroke="#c792e9" stroke-width="1" stroke-opacity="0.35"/>
    <text x="624" y="469" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600" letter-spacing="0.5">Kanban</text>
  </g>
  <g>
    <rect x="676" y="450" width="92" height="28" rx="14" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.35"/>
    <text x="722" y="469" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="600" letter-spacing="0.5">Shape Up</text>
  </g>
  <g>
    <rect x="500" y="490" width="48" height="28" rx="14" fill="#6ecf00" fill-opacity="0.08" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.35"/>
    <text x="524" y="509" text-anchor="middle" font-size="10" fill="#6ecf00" font-weight="600" letter-spacing="0.5">XP</text>
  </g>
  <g>
    <rect x="560" y="490" width="58" height="28" rx="14" fill="#8b9cbf" fill-opacity="0.08" stroke="#8b9cbf" stroke-width="1" stroke-opacity="0.35"/>
    <text x="589" y="509" text-anchor="middle" font-size="10" fill="#8b9cbf" font-weight="600" letter-spacing="0.5">Lean</text>
  </g>

  <!-- Decorative top-right corner dots -->
  <circle cx="1090" cy="80" r="3" fill="#c792e9" opacity="0.6"/>
  <circle cx="1110" cy="60" r="2" fill="#c792e9" opacity="0.4"/>
  <circle cx="1130" cy="80" r="2" fill="#a6f079" opacity="0.4"/>
  <circle cx="1150" cy="55" r="3" fill="#a6f079" opacity="0.5"/>
  <circle cx="1070" cy="100" r="2" fill="#ff6b9d" opacity="0.4"/>
  <circle cx="1160" cy="100" r="2" fill="#ff6b9d" opacity="0.3"/>

  <!-- sinra.app -->
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#1e293b" letter-spacing="1">sinra.app</text>
</svg>
