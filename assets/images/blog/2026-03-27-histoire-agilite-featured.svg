<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, sans-serif;">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080b12"/>
      <stop offset="100%" stop-color="#0f1420"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="42%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#a6f079" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a6f079" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="80%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#c792e9" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c792e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#centerGlow)"/>
  <rect width="1200" height="630" fill="url(#rightGlow)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Central ring -->
  <circle cx="380" cy="310" r="180" fill="none" stroke="#a6f079" stroke-width="1" stroke-opacity="0.2" filter="url(#softglow)"/>
  <circle cx="380" cy="310" r="120" fill="none" stroke="#a6f079" stroke-width="1.5" stroke-opacity="0.35"/>
  <circle cx="380" cy="310" r="6" fill="#a6f079" filter="url(#softglow)"/>

  <!-- Orbital dots around the ring -->
  <circle cx="380" cy="130" r="8" fill="#ff6b9d" filter="url(#tinyglow)"/>
  <circle cx="380" cy="490" r="8" fill="#6ecf00" filter="url(#tinyglow)"/>
  <circle cx="200" cy="310" r="8" fill="#c792e9" filter="url(#tinyglow)"/>
  <circle cx="560" cy="310" r="8" fill="#a6f079" filter="url(#tinyglow)"/>
  <circle cx="253" cy="183" r="5" fill="#8b9cbf" filter="url(#tinyglow)"/>
  <circle cx="253" cy="437" r="5" fill="#8b9cbf" filter="url(#tinyglow)"/>
  <circle cx="507" cy="183" r="5" fill="#8b9cbf" filter="url(#tinyglow)"/>
  <circle cx="507" cy="437" r="5" fill="#8b9cbf" filter="url(#tinyglow)"/>

  <!-- Framework labels around ring -->
  <text x="380" y="106" text-anchor="middle" font-size="11" fill="#ff6b9d" font-weight="600" letter-spacing="1">SCRUM</text>
  <text x="380" y="518" text-anchor="middle" font-size="11" fill="#6ecf00" font-weight="600" letter-spacing="1">LEAN</text>
  <text x="148" y="314" text-anchor="end" font-size="11" fill="#c792e9" font-weight="600" letter-spacing="1">KANBAN</text>
  <text x="612" y="314" text-anchor="start" font-size="11" fill="#a6f079" font-weight="600" letter-spacing="1">XP</text>
  <text x="215" y="164" text-anchor="end" font-size="10" fill="#8b9cbf" letter-spacing="0.5">SHAPE UP</text>
  <text x="555" y="164" text-anchor="start" font-size="10" fill="#8b9cbf" letter-spacing="0.5">CRYSTAL</text>

  <!-- Center label inside ring -->
  <text x="380" y="300" text-anchor="middle" font-size="11" fill="#64748b" letter-spacing="2">AGILE</text>
  <text x="380" y="325" text-anchor="middle" font-size="15" font-weight="700" fill="#a6f079">Manifeste</text>

  <!-- Right: Title block -->
  <text x="700" y="230" font-size="11" fill="#475569" letter-spacing="3" font-weight="500">GUIDE COMPLET</text>
  <text x="700" y="288" font-size="52" font-weight="800" fill="#f1f5f9" letter-spacing="-1">Histoire</text>
  <text x="700" y="348" font-size="52" font-weight="800" fill="#a6f079" letter-spacing="-1">de l'Agilité</text>

  <text x="700" y="396" font-size="16" fill="#475569">Des origines au Manifeste Agile</text>
  <text x="700" y="420" font-size="16" fill="#475569">et ses frameworks modernes</text>

  <!-- Tags -->
  <rect x="700" y="455" width="80" height="26" rx="13" fill="#a6f079" fill-opacity="0.1" stroke="#a6f079" stroke-width="1" stroke-opacity="0.4"/>
  <text x="740" y="472" text-anchor="middle" font-size="10" fill="#a6f079" font-weight="600">Scrum</text>

  <rect x="792" y="455" width="88" height="26" rx="13" fill="#c792e9" fill-opacity="0.1" stroke="#c792e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="836" y="472" text-anchor="middle" font-size="10" fill="#c792e9" font-weight="600">Kanban</text>

  <rect x="892" y="455" width="100" height="26" rx="13" fill="#ff6b9d" fill-opacity="0.1" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.4"/>
  <text x="942" y="472" text-anchor="middle" font-size="10" fill="#ff6b9d" font-weight="600">Shape Up</text>

  <rect x="700" y="491" width="56" height="26" rx="13" fill="#6ecf00" fill-opacity="0.1" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.4"/>
  <text x="728" y="508" text-anchor="middle" font-size="10" fill="#6ecf00" font-weight="600">XP</text>

  <rect x="768" y="491" width="64" height="26" rx="13" fill="#8b9cbf" fill-opacity="0.1" stroke="#8b9cbf" stroke-width="1" stroke-opacity="0.4"/>
  <text x="800" y="508" text-anchor="middle" font-size="10" fill="#8b9cbf" font-weight="600">Lean</text>

  <!-- sinra.app -->
  <text x="1165" y="608" text-anchor="end" font-size="11" fill="#334155">sinra.app</text>
</svg>
