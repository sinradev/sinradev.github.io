<svg viewBox="0 0 1000 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#161929"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <rect width="1000" height="480" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="250" cy="280" rx="200" ry="150" fill="#a6f079" opacity="0.04" filter="url(#blur)"/>
  <ellipse cx="750" cy="280" rx="200" ry="150" fill="#ff6b9d" opacity="0.04" filter="url(#blur)"/>

  <!-- Vertical divider -->
  <line x1="500" y1="100" x2="500" y2="460" stroke="#1e293b" stroke-width="1"/>

  <!-- Header -->
  <text x="500" y="38" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#475569" letter-spacing="3">ANALYSE</text>
  <text x="500" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">Pour &amp; Contre</text>

  <!-- Left: Pros -->
  <text x="250" y="102" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#a6f079" letter-spacing="2">AVANTAGES</text>

  <!-- Pro items -->
  <g>
    <rect x="50" y="120" width="390" height="68" rx="10" fill="#a6f079" fill-opacity="0.05" stroke="#a6f079" stroke-width="1" stroke-opacity="0.15"/>
    <circle cx="82" cy="154" r="12" fill="#a6f079" fill-opacity="0.15"/>
    <path d="M77 154 L80 157 L87 150" stroke="#a6f079" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="106" y="147" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">Flexibilité &amp; Adaptation</text>
    <text x="106" y="166" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Répondre aux changements du marché en temps réel</text>
  </g>
  <g>
    <rect x="50" y="200" width="390" height="68" rx="10" fill="#a6f079" fill-opacity="0.05" stroke="#a6f079" stroke-width="1" stroke-opacity="0.15"/>
    <circle cx="82" cy="234" r="12" fill="#a6f079" fill-opacity="0.15"/>
    <path d="M77 234 L80 237 L87 230" stroke="#a6f079" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="106" y="227" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">Feedback Client Rapide</text>
    <text x="106" y="246" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Validations régulières, moins de mauvaises surprises</text>
  </g>
  <g>
    <rect x="50" y="280" width="390" height="68" rx="10" fill="#a6f079" fill-opacity="0.05" stroke="#a6f079" stroke-width="1" stroke-opacity="0.15"/>
    <circle cx="82" cy="314" r="12" fill="#a6f079" fill-opacity="0.15"/>
    <path d="M77 314 L80 317 L87 310" stroke="#a6f079" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="106" y="307" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">Réduction des Risques</text>
    <text x="106" y="326" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Déploiements réguliers, problèmes détectés tôt</text>
  </g>
  <g>
    <rect x="50" y="360" width="390" height="68" rx="10" fill="#a6f079" fill-opacity="0.05" stroke="#a6f079" stroke-width="1" stroke-opacity="0.15"/>
    <circle cx="82" cy="394" r="12" fill="#a6f079" fill-opacity="0.15"/>
    <path d="M77 394 L80 397 L87 390" stroke="#a6f079" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="106" y="387" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">Moralité de l'Équipe</text>
    <text x="106" y="406" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Autonomie, sens de l'accomplissement</text>
  </g>

  <!-- Right: Cons -->
  <text x="750" y="102" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#ff6b9d" letter-spacing="2">INCONVÉNIENTS</text>

  <g>
    <rect x="560" y="120" width="390" height="68" rx="10" fill="#ff6b9d" fill-opacity="0.05" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.15"/>
    <circle cx="592" cy="154" r="12" fill="#ff6b9d" fill-opacity="0.15"/>
    <path d="M588 150 L596 158 M596 150 L588 158" stroke="#ff6b9d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="616" y="147" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">Engagement Client Requis</text>
    <text x="616" y="166" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Client peu disponible = approche cassée</text>
  </g>
  <g>
    <rect x="560" y="200" width="390" height="68" rx="10" fill="#ff6b9d" fill-opacity="0.05" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.15"/>
    <circle cx="592" cy="234" r="12" fill="#ff6b9d" fill-opacity="0.15"/>
    <path d="M588 230 L596 238 M596 230 L588 238" stroke="#ff6b9d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="616" y="227" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">Difficile à Scaler</text>
    <text x="616" y="246" font-family="Inter, sans-serif" font-size="10" fill="#64748b">6-10 devs : OK. 100+ devs : très complexe</text>
  </g>
  <g>
    <rect x="560" y="280" width="390" height="68" rx="10" fill="#ff6b9d" fill-opacity="0.05" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.15"/>
    <circle cx="592" cy="314" r="12" fill="#ff6b9d" fill-opacity="0.15"/>
    <path d="M588 310 L596 318 M596 310 L588 318" stroke="#ff6b9d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="616" y="307" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">Documentation Faible</text>
    <text x="616" y="326" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Onboarding lent, contexte business perdu</text>
  </g>
  <g>
    <rect x="560" y="360" width="390" height="68" rx="10" fill="#ff6b9d" fill-opacity="0.05" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.15"/>
    <circle cx="592" cy="394" r="12" fill="#ff6b9d" fill-opacity="0.15"/>
    <path d="M588 390 L596 398 M596 390 L588 398" stroke="#ff6b9d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="616" y="387" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">Risque de Burnout</text>
    <text x="616" y="406" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Pression de la vélocité, rythme soutenu</text>
  </g>
</svg>
