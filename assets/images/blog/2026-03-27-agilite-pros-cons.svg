<svg viewBox="0 0 1000 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141824;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="550" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="26" font-weight="bold" fill="#a6f079">
    Agilité: Pour et Contre
  </text>

  <!-- Pros Column -->
  <rect x="50" y="70" width="420" height="450" rx="6" fill="#a6f079" opacity="0.1" stroke="#a6f079" stroke-width="2"/>
  <text x="260" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="#a6f079">Avantages ✓</text>

  <!-- Pro 1 -->
  <rect x="70" y="140" width="380" height="65" rx="4" fill="#a6f079" opacity="0.08"/>
  <path d="M 80 170 L 90 180 L 105 165" stroke="#a6f079" stroke-width="2" fill="none"/>
  <text x="120" y="162" font-size="11" font-weight="bold" fill="#a6f079">Flexibilité et Adaptation</text>
  <text x="120" y="180" font-size="9" fill="#8b9cbf">Répondre rapidement aux changements</text>
  <text x="120" y="195" font-size="9" fill="#8b9cbf">et aux besoins du marché</text>

  <!-- Pro 2 -->
  <rect x="70" y="220" width="380" height="65" rx="4" fill="#a6f079" opacity="0.08"/>
  <path d="M 80 250 L 90 260 L 105 245" stroke="#a6f079" stroke-width="2" fill="none"/>
  <text x="120" y="242" font-size="11" font-weight="bold" fill="#a6f079">Feedback Client Rapide</text>
  <text x="120" y="260" font-size="9" fill="#8b9cbf">Validations régulières avec le client</text>
  <text x="120" y="275" font-size="9" fill="#8b9cbf">= moins de mauvaises surprises</text>

  <!-- Pro 3 -->
  <rect x="70" y="300" width="380" height="65" rx="4" fill="#a6f079" opacity="0.08"/>
  <path d="M 80 330 L 90 340 L 105 325" stroke="#a6f079" stroke-width="2" fill="none"/>
  <text x="120" y="322" font-size="11" font-weight="bold" fill="#a6f079">Réduction des Risques</text>
  <text x="120" y="340" font-size="9" fill="#8b9cbf">Déploiement régulier vs. un gros</text>
  <text x="120" y="355" font-size="9" fill="#8b9cbf">bang release à la fin</text>

  <!-- Pro 4 -->
  <rect x="70" y="380" width="380" height="65" rx="4" fill="#a6f079" opacity="0.08"/>
  <path d="M 80 410 L 90 420 L 105 405" stroke="#a6f079" stroke-width="2" fill="none"/>
  <text x="120" y="402" font-size="11" font-weight="bold" fill="#a6f079">Moralité de l'Équipe</text>
  <text x="120" y="420" font-size="9" fill="#8b9cbf">Autonomie, collaboration, sens d'avoir</text>
  <text x="120" y="435" font-size="9" fill="#8b9cbf">accompli quelque chose d'utile</text>

  <!-- Cons Column -->
  <rect x="530" y="70" width="420" height="450" rx="6" fill="#ff6b9d" opacity="0.1" stroke="#ff6b9d" stroke-width="2"/>
  <text x="740" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff6b9d">Inconvénients ✗</text>

  <!-- Con 1 -->
  <rect x="550" y="140" width="380" height="65" rx="4" fill="#ff6b9d" opacity="0.08"/>
  <path d="M 560 160 L 580 185 M 580 160 L 560 185" stroke="#ff6b9d" stroke-width="2"/>
  <text x="600" y="162" font-size="11" font-weight="bold" fill="#ff6b9d">Demande de l'Engagement</text>
  <text x="600" y="180" font-size="9" fill="#8b9cbf">Client très disponible, réunions</text>
  <text x="600" y="195" font-size="9" fill="#8b9cbf">fréquentes = coûts cachés</text>

  <!-- Con 2 -->
  <rect x="550" y="220" width="380" height="65" rx="4" fill="#ff6b9d" opacity="0.08"/>
  <path d="M 560 240 L 580 265 M 580 240 L 560 265" stroke="#ff6b9d" stroke-width="2"/>
  <text x="600" y="242" font-size="11" font-weight="bold" fill="#ff6b9d">Difficile à Scaler</text>
  <text x="600" y="260" font-size="9" fill="#8b9cbf">Fonctionne bien avec 6-10 devs,</text>
  <text x="600" y="275" font-size="9" fill="#8b9cbf">problématique avec 100+ devs</text>

  <!-- Con 3 -->
  <rect x="550" y="300" width="380" height="65" rx="4" fill="#ff6b9d" opacity="0.08"/>
  <path d="M 560 320 L 580 345 M 580 320 L 560 345" stroke="#ff6b9d" stroke-width="2"/>
  <text x="600" y="322" font-size="11" font-weight="bold" fill="#ff6b9d">Documentation Souvent Faible</text>
  <text x="600" y="340" font-size="9" fill="#8b9cbf">« Code is documentation » = pas de</text>
  <text x="600" y="355" font-size="9" fill="#8b9cbf">contexte business. Onboarding lent</text>

  <!-- Con 4 -->
  <rect x="550" y="380" width="380" height="65" rx="4" fill="#ff6b9d" opacity="0.08"/>
  <path d="M 560 400 L 580 425 M 580 400 L 560 425" stroke="#ff6b9d" stroke-width="2"/>
  <text x="600" y="402" font-size="11" font-weight="bold" fill="#ff6b9d">Burnout Possible</text>
  <text x="600" y="420" font-size="9" fill="#8b9cbf">Rythme soutenu, perfectionnisme,</text>
  <text x="600" y="435" font-size="9" fill="#8b9cbf">pression de la « vélocité »</text>
</svg>