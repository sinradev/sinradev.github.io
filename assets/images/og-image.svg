<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c212b"/>
      <stop offset="100%" stop-color="#141820"/>
    </linearGradient>
    <!-- Logo glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b2ccd6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b2ccd6" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip for right text area -->
    <clipPath id="rightClip">
      <rect x="480" y="0" width="720" height="630"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid texture -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Left section: logo glow halo -->
  <ellipse cx="240" cy="315" rx="210" ry="210" fill="url(#glow)"/>

  <!-- Left section: sinra-logo.svg, centered at (240, 315), 220x234 -->
  <image href="sinra-logo.svg" x="130" y="198" width="220" height="234"/>

  <!-- Vertical separator -->
  <line x1="460" y1="80" x2="460" y2="550" stroke="#ffffff" stroke-width="1" opacity="0.07"/>

  <!-- Right section: text content -->
  <!-- Brand name -->
  <text x="520" y="230" font-family="'Nunito Sans', sans-serif" font-size="96" font-weight="700" fill="#ffffff" letter-spacing="-2">sinra</text>

  <!-- Accent line -->
  <rect x="520" y="252" width="100" height="3" fill="#9FE88D" rx="2"/>

  <!-- Tagline line 1 -->
  <text x="520" y="320" font-family="'Nunito Sans', sans-serif" font-size="34" font-weight="400" fill="#b2ccd6">Project management,</text>
  <!-- Tagline line 2 -->
  <text x="520" y="365" font-family="'Nunito Sans', sans-serif" font-size="34" font-weight="400" fill="#b2ccd6">rethought.</text>

  <!-- Feature labels -->
  <text x="520" y="440" font-family="'Nunito Sans', sans-serif" font-size="18" fill="#ffffff" opacity="0.40" letter-spacing="0.5">Issues · Capabilities · Releases · Cycles</text>

  <!-- URL -->
  <text x="520" y="545" font-family="'Nunito Sans', sans-serif" font-size="16" fill="#9FE88D" opacity="0.6" letter-spacing="0.5">sinra.dev</text>
</svg>
