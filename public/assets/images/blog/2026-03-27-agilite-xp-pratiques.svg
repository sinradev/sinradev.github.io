<svg viewBox="0 0 1000 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#161929"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>
  <rect width="1000" height="480" fill="url(#bg)"/>
  <circle cx="500" cy="280" r="200" fill="#6ecf00" opacity="0.025" filter="url(#blur)"/>

  <!-- Header -->
  <text x="500" y="38" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#475569" letter-spacing="3">FRAMEWORK</text>
  <text x="500" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">Extreme Programming</text>
  <text x="500" y="88" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#475569">Qualité maximale du code · Pratiques radicales</text>

  <!-- Grid of 6 practices -->
  <!-- Row 1 -->
  <g>
    <rect x="40" y="112" width="290" height="110" rx="12" fill="#6ecf00" fill-opacity="0.04" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="75" cy="149" r="18" fill="#6ecf00" fill-opacity="0.1"/>
    <!-- Icon: two people -->
    <circle cx="70" cy="146" r="5" fill="none" stroke="#6ecf00" stroke-width="1.5"/>
    <circle cx="82" cy="146" r="5" fill="none" stroke="#6ecf00" stroke-width="1.5"/>
    <path d="M64 158 Q76 154 82 158" stroke="#6ecf00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="104" y="142" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#6ecf00">Pair Programming</text>
    <text x="60" y="176" font-family="Inter, sans-serif" font-size="10" fill="#64748b">2 devs sur 1 ordinateur.</text>
    <text x="60" y="193" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Conducteur + Navigateur.</text>
  </g>
  <g>
    <rect x="355" y="112" width="290" height="110" rx="12" fill="#6ecf00" fill-opacity="0.04" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="390" cy="149" r="18" fill="#6ecf00" fill-opacity="0.1"/>
    <!-- Icon: test check -->
    <path d="M383 146 L387 150 L397 140" stroke="#6ecf00" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="419" y="142" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#6ecf00">Test Driven Dev</text>
    <text x="375" y="176" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Tests d'abord, code ensuite.</text>
    <text x="375" y="193" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Red → Green → Refactor.</text>
  </g>
  <g>
    <rect x="670" y="112" width="290" height="110" rx="12" fill="#6ecf00" fill-opacity="0.04" stroke="#6ecf00" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="705" cy="149" r="18" fill="#6ecf00" fill-opacity="0.1"/>
    <!-- Icon: arrows loop -->
    <path d="M698 143 Q705 138 712 143" stroke="#6ecf00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M712 155 Q705 160 698 155" stroke="#6ecf00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="734" y="142" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#6ecf00">Intégration Continue</text>
    <text x="690" y="176" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Push chaque jour.</text>
    <text x="690" y="193" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Tests auto à chaque merge.</text>
  </g>

  <!-- Row 2 -->
  <g>
    <rect x="40" y="242" width="290" height="110" rx="12" fill="#a6f079" fill-opacity="0.03" stroke="#a6f079" stroke-width="1" stroke-opacity="0.15"/>
    <circle cx="75" cy="279" r="18" fill="#a6f079" fill-opacity="0.1"/>
    <!-- Icon: shared -->
    <circle cx="69" cy="276" r="4" fill="#a6f079" opacity="0.8"/>
    <circle cx="81" cy="276" r="4" fill="#a6f079" opacity="0.8"/>
    <line x1="73" y1="276" x2="77" y2="276" stroke="#a6f079" stroke-width="1.5"/>
    <text x="104" y="272" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#a6f079">Collective Ownership</text>
    <text x="60" y="306" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Tout le monde peut toucher</text>
    <text x="60" y="323" font-family="Inter, sans-serif" font-size="10" fill="#64748b">tout le code. Pas de silos.</text>
  </g>
  <g>
    <rect x="355" y="242" width="290" height="110" rx="12" fill="#a6f079" fill-opacity="0.03" stroke="#a6f079" stroke-width="1" stroke-opacity="0.15"/>
    <circle cx="390" cy="279" r="18" fill="#a6f079" fill-opacity="0.1"/>
    <!-- Icon: wrench/clean -->
    <path d="M385 274 L395 284 M387 272 L384 275 M393 281 L396 284" stroke="#a6f079" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="419" y="272" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#a6f079">Refactoring</text>
    <text x="375" y="306" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Nettoyer le code en continu</text>
    <text x="375" y="323" font-family="Inter, sans-serif" font-size="10" fill="#64748b">sans changer son comportement.</text>
  </g>
  <g>
    <rect x="670" y="242" width="290" height="110" rx="12" fill="#a6f079" fill-opacity="0.03" stroke="#a6f079" stroke-width="1" stroke-opacity="0.15"/>
    <circle cx="705" cy="279" r="18" fill="#a6f079" fill-opacity="0.1"/>
    <!-- Icon: simple shape -->
    <circle cx="705" cy="279" r="7" fill="none" stroke="#a6f079" stroke-width="1.5"/>
    <text x="734" y="272" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#a6f079">Simple Design</text>
    <text x="690" y="306" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Aussi simple que possible.</text>
    <text x="690" y="323" font-family="Inter, sans-serif" font-size="10" fill="#64748b">YAGNI. Pas d'over-engineering.</text>
  </g>

  <text x="500" y="430" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#334155" letter-spacing="2">XP POUSSE L'AGILITÉ VERS SES EXTRÊMES POUR UNE QUALITÉ MAXIMALE</text>
</svg>
