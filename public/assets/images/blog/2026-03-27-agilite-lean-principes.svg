<svg viewBox="0 0 1000 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#161929"/>
    </linearGradient>
    <linearGradient id="flowLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c792e9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c792e9" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>
  <rect width="1000" height="440" fill="url(#bg)"/>
  <ellipse cx="500" cy="260" rx="300" ry="140" fill="#c792e9" opacity="0.02" filter="url(#blur)"/>

  <!-- Header -->
  <text x="500" y="38" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#475569" letter-spacing="3">FRAMEWORK · TOYOTA</text>
  <text x="500" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">Lean Software Development</text>
  <text x="500" y="88" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#475569">Éliminer le gaspillage · Maximiser la valeur</text>

  <!-- 5 principles as horizontal flow -->
  <!-- Connecting line -->
  <line x1="90" y1="210" x2="910" y2="210" stroke="#1e293b" stroke-width="2"/>

  <!-- Principle 1 -->
  <g>
    <circle cx="90" cy="210" r="22" fill="#0f1117" stroke="#c792e9" stroke-width="1.5"/>
    <text x="90" y="215" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#c792e9">1</text>
    <text x="90" y="252" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">Value</text>
    <text x="90" y="268" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Valeur client</text>
  </g>
  <!-- Principle 2 -->
  <g>
    <circle cx="278" cy="210" r="22" fill="#0f1117" stroke="#c792e9" stroke-width="1.5"/>
    <text x="278" y="215" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#c792e9">2</text>
    <text x="278" y="252" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">Value Stream</text>
    <text x="278" y="268" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Cartographier le flux</text>
  </g>
  <!-- Principle 3 -->
  <g>
    <circle cx="500" cy="210" r="26" fill="#0f1117" stroke="#c792e9" stroke-width="2"/>
    <text x="500" y="215" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#c792e9">3</text>
    <text x="500" y="255" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">Flow</text>
    <text x="500" y="271" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Flux sans attentes</text>
  </g>
  <!-- Principle 4 -->
  <g>
    <circle cx="722" cy="210" r="22" fill="#0f1117" stroke="#c792e9" stroke-width="1.5"/>
    <text x="722" y="215" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#c792e9">4</text>
    <text x="722" y="252" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">Pull</text>
    <text x="722" y="268" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Tirer le travail</text>
  </g>
  <!-- Principle 5 -->
  <g>
    <circle cx="910" cy="210" r="22" fill="#0f1117" stroke="#c792e9" stroke-width="1.5"/>
    <text x="910" y="215" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#c792e9">5</text>
    <text x="910" y="252" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">Kaizen</text>
    <text x="910" y="268" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Amélioration continue</text>
  </g>

  <!-- Waste section -->
  <text x="500" y="310" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#475569" letter-spacing="2" font-weight="500">GASPILLAGES À ÉLIMINER (MUDA)</text>

  <!-- 5 wastes as small pills -->
  <rect x="40" y="326" width="170" height="34" rx="17" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.3"/>
  <text x="125" y="348" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#ff6b9d">Surproduction</text>

  <rect x="224" y="326" width="150" height="34" rx="17" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.3"/>
  <text x="299" y="348" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#ff6b9d">Attentes</text>

  <rect x="388" y="326" width="224" height="34" rx="17" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.3"/>
  <text x="500" y="348" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#ff6b9d">Contexte switching</text>

  <rect x="626" y="326" width="150" height="34" rx="17" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.3"/>
  <text x="701" y="348" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#ff6b9d">Défauts</text>

  <rect x="790" y="326" width="170" height="34" rx="17" fill="#ff6b9d" fill-opacity="0.08" stroke="#ff6b9d" stroke-width="1" stroke-opacity="0.3"/>
  <text x="875" y="348" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#ff6b9d">Bureaucratie</text>

  <text x="500" y="410" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#334155" letter-spacing="2">INSPIRÉ DE TOYOTA · ADAPTÉ AU LOGICIEL PAR MARY &amp; TOM POPPENDIECK</text>
</svg>
