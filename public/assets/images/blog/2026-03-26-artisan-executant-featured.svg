<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141824;stop-opacity:1" />
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b9cbf" stroke-width="0.5" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Subtle accent shapes -->
  <circle cx="150" cy="100" r="80" fill="#c792e9" opacity="0.08"/>
  <circle cx="1050" cy="550" r="120" fill="#a6f079" opacity="0.08"/>

  <!-- Left: Craftsman/Artisan -->
  <g>
    <!-- Hands crafting -->
    <circle cx="200" cy="180" r="35" fill="#8b9cbf" opacity="0.6"/>
    <circle cx="280" cy="200" r="30" fill="#8b9cbf" opacity="0.7"/>
    <!-- Tools -->
    <rect x="150" y="250" width="8" height="60" fill="#a6f079" transform="rotate(-20 154 280)"/>
    <rect x="290" y="240" width="8" height="50" fill="#a6f079" transform="rotate(25 294 265)"/>
    <!-- "Artisan" label -->
    <text x="240" y="330" font-family="sans-serif" font-size="24" font-weight="700" fill="#a6f079" text-anchor="middle">Artisan</text>
    <text x="240" y="360" font-family="sans-serif" font-size="14" fill="#8b9cbf" text-anchor="middle" opacity="0.8">Expertise</text>
  </g>

  <!-- Center: Executor/Machine -->
  <g>
    <!-- Repetitive motion, mechanical -->
    <rect x="500" y="140" width="100" height="120" fill="none" stroke="#c792e9" stroke-width="3" opacity="0.6"/>
    <rect x="520" y="160" width="60" height="80" fill="#c792e9" opacity="0.3"/>
    <!-- Arrows showing repetition -->
    <path d="M 600 200 L 650 200" stroke="#ff6b9d" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M 600 220 L 650 220" stroke="#ff6b9d" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M 600 240 L 650 240" stroke="#ff6b9d" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <!-- "Executor" label -->
    <text x="600" y="330" font-family="sans-serif" font-size="24" font-weight="700" fill="#ff6b9d" text-anchor="middle">Exécutant</text>
    <text x="600" y="360" font-family="sans-serif" font-size="14" fill="#8b9cbf" text-anchor="middle" opacity="0.8">Vitesse</text>
  </g>

  <!-- Right: AI/Replacement -->
  <g>
    <!-- Neural network style nodes -->
    <circle cx="880" cy="150" r="20" fill="#a6f079" opacity="0.7"/>
    <circle cx="950" cy="180" r="20" fill="#a6f079" opacity="0.8"/>
    <circle cx="1000" cy="150" r="20" fill="#a6f079" opacity="0.7"/>
    <circle cx="920" cy="240" r="20" fill="#6ecf00" opacity="0.9"/>
    <!-- Connections -->
    <line x1="880" y1="150" x2="920" y2="240" stroke="#a6f079" stroke-width="2" opacity="0.5"/>
    <line x1="950" y1="180" x2="920" y2="240" stroke="#a6f079" stroke-width="2" opacity="0.5"/>
    <line x1="1000" y1="150" x2="920" y2="240" stroke="#a6f079" stroke-width="2" opacity="0.5"/>
    <!-- "AI" label -->
    <text x="940" y="330" font-family="sans-serif" font-size="24" font-weight="700" fill="#6ecf00" text-anchor="middle">IA</text>
    <text x="940" y="360" font-family="sans-serif" font-size="14" fill="#8b9cbf" text-anchor="middle" opacity="0.8">Remplacement</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff6b9d"/>
    </marker>
  </defs>

  <!-- Title band at bottom -->
  <rect x="0" y="480" width="1200" height="150" fill="#000000" opacity="0.4"/>

  <!-- Title -->
  <text x="600" y="530" font-family="sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1">De l'artisan au simple exécutant</text>

  <!-- Subtitle -->
  <text x="600" y="570" font-family="sans-serif" font-size="18" fill="#a6f079" text-anchor="middle">Comment le développeur a perdu son statut</text>

  <!-- Branding: sinra.app -->
  <g opacity="0.5">
    <rect x="1050" y="570" width="130" height="40" fill="#a6f079" rx="4"/>
    <text x="1115" y="596" font-family="sans-serif" font-size="16" font-weight="600" fill="#141824" text-anchor="middle">sinra.app</text>
  </g>
</svg>
