name: Lighthouse CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.160.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --minify --baseURL "http://localhost:1313/"

      - name: Start Hugo server
        run: hugo server --port 1313 --bind 0.0.0.0 &
        env:
          HUGO_ENVIRONMENT: production

      - name: Wait for server
        run: sleep 5

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: "./.github/lighthouse-ci.json"
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Comment PR with Lighthouse results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const resultsPath = './lhci_reports/manifest.json';

            if (fs.existsSync(resultsPath)) {
              const manifest = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              const lhciResults = manifest.results[0].summary;

              const scores = {
                performance: Math.round(lhciResults.performance * 100),
                accessibility: Math.round(lhciResults.accessibility * 100),
                'best-practices': Math.round(lhciResults['best-practices'] * 100),
                seo: Math.round(lhciResults.seo * 100),
              };

              const getEmoji = (score) => {
                if (score >= 90) return '✅';
                if (score >= 80) return '⚠️';
                return '❌';
              };

              const comment = "## 🔦 Lighthouse CI Results\n\n" +
                "| Metric | Score | Status |\n" +
                "|--------|-------|--------|\n" +
                "| Performance | " + scores.performance + "/100 | " + getEmoji(scores.performance) + " |\n" +
                "| Accessibility | " + scores.accessibility + "/100 | " + getEmoji(scores.accessibility) + " |\n" +
                "| Best Practices | " + scores['best-practices'] + "/100 | " + getEmoji(scores['best-practices']) + " |\n" +
                "| SEO | " + scores.seo + "/100 | " + getEmoji(scores.seo) + " |\n\n" +
                "**Thresholds**: Performance >=90, Accessibility >=95, Best Practices >=90, SEO >=90\n\n" +
                "[View detailed report](" + manifest.results[0].url + ")";

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
